<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 756" role="img" aria-label="6.7.1 Microarchitectural Analysis: Pipeline Stage Decomposition">
  <defs>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5b6679"/>
    </marker>
  </defs>
  <rect width="1080" height="756" fill="#ffffff"/>
  <text x="36" y="32" style="font:600 14px 'Fraunces',serif;fill:#0b1220">6.7.1 Microarchitectural Analysis: Pipeline Stage Decomposition</text>
  <text x="36" y="52" style="font:italic 11px 'Fraunces',serif;fill:#5b6679">Semantic visualization of measured microarchitectural behavior</text>

    <g transform="translate(40,86)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">1-Stage Pipeline Timing Decomposition (Case 49, measured)</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">┌─── TMA 2D Load ────────────────────────── ~479 cyc ───┐ · UTMALDG.2D: descriptor decode + L2 read + smem DMA</text>
    </g>    <line x1="540" y1="150" x2="540" y2="172" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,176)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">┌─── mbarrier Wait ──────────────────────── ~5 cyc ─────┐</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">SYNCS.PHASECHK.TRANS64.TRYWAIT · ┌─── ldmatrix.x4 ───────────────────────── ~33 cyc ─────┐</text>
    </g>    <line x1="540" y1="240" x2="540" y2="262" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,266)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">LDSM.16.M88.4: smem → register (4 fragments)</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">┌─── mma.sync (1 MMA per tile) ─────────── ~29 cyc ─────┐ · HMMA.16816.F32</text>
    </g>    <line x1="540" y1="330" x2="540" y2="352" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,356)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">┌─── mbarrier reinit + overhead ─────────── ~62 cyc ────┐</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">SYNCS.EXCH.64 + SYNCS.ARRIVE + loop control · Total: 479 + 5 + 33 + 29 + 62 = 608 cyc ✓ (matches measured)</text>
    </g>    <line x1="540" y1="420" x2="540" y2="442" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,446)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">With 2-stage double buffering:</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">TMA(i+1) overlaps with ldmatrix(i) + MMA(i) + barrier(i) · Effective per-tile: max(479, 33+29+62) = max(479, 124) = 479 </text>
    </g>    <line x1="540" y1="510" x2="540" y2="532" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,536)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">BUT: with warmup amortization and steady-state overlap:</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">Measured: 322 cyc (1.89x) — less than theoretical because · the first tile&#x27;s TMA isn&#x27;t overlapped with anything.</text>
    </g>    <line x1="540" y1="600" x2="540" y2="622" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,626)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">With 3-stage triple buffering:</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">Two TMA loads in flight simultaneously:</text>
    </g>
</svg>
