<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 680" role="img" aria-label="6.2.4a DSMEM Fabric Topology Evidence: Shared Bus vs Point-to-Point vs Crossbar">
  <defs>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5b6679"/>
    </marker>
  </defs>
  <rect width="1080" height="680" fill="#ffffff"/>

  <!-- Title -->
  <text x="36" y="30" style="font:600 14px 'Fraunces',serif;fill:#0b1220">6.2.4a DSMEM Fabric Topology: Three-Hypothesis Elimination via BW Scaling</text>
  <text x="36" y="48" style="font:italic 11px 'Fraunces',serif;fill:#5b6679">Per-CTA BW constancy (8.23→8.23→8.15 GB/s for 2/4/8 CTAs) eliminates shared bus, confirms point-to-point/crossbar</text>

  <!-- ═══════════════ THREE HYPOTHESES SIDE BY SIDE ═══════════════ -->

  <!-- Hypothesis 1: Shared Bus (REJECTED) -->
  <g transform="translate(36,66)">
    <rect x="0" y="0" width="320" height="310" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
    <text x="160" y="22" style="font:700 11px 'Fraunces',serif;fill:#991b1b" text-anchor="middle">Hypothesis A: Shared Bus</text>
    <text x="160" y="38" style="font:italic 9px 'JetBrains Mono',monospace;fill:#dc2626" text-anchor="middle">All CTAs share one channel</text>

    <!-- Bus diagram -->
    <g transform="translate(20,52)">
      <!-- Single horizontal bus -->
      <rect x="20" y="50" width="260" height="8" rx="2" fill="#fca5a5"/>
      <text x="150" y="46" style="font:600 8px 'JetBrains Mono',monospace;fill:#dc2626" text-anchor="middle">SHARED BUS</text>
      <!-- CTAs hanging off bus -->
      <rect x="30" y="66" width="40" height="24" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="0.8"/><text x="50" y="82" style="font:600 7px 'JetBrains Mono',monospace;fill:#991b1b" text-anchor="middle">CTA0</text>
      <rect x="80" y="66" width="40" height="24" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="0.8"/><text x="100" y="82" style="font:600 7px 'JetBrains Mono',monospace;fill:#991b1b" text-anchor="middle">CTA1</text>
      <rect x="130" y="66" width="40" height="24" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="0.8"/><text x="150" y="82" style="font:600 7px 'JetBrains Mono',monospace;fill:#991b1b" text-anchor="middle">CTA2</text>
      <text x="185" y="82" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">...</text>
      <rect x="200" y="66" width="40" height="24" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="0.8"/><text x="220" y="82" style="font:600 7px 'JetBrains Mono',monospace;fill:#991b1b" text-anchor="middle">CTA7</text>
      <!-- Connection lines -->
      <line x1="50" y1="58" x2="50" y2="66" stroke="#fca5a5" stroke-width="1"/>
      <line x1="100" y1="58" x2="100" y2="66" stroke="#fca5a5" stroke-width="1"/>
      <line x1="150" y1="58" x2="150" y2="66" stroke="#fca5a5" stroke-width="1"/>
      <line x1="220" y1="58" x2="220" y2="66" stroke="#fca5a5" stroke-width="1"/>
    </g>

    <!-- Prediction vs measurement -->
    <g transform="translate(20,170)">
      <text x="0" y="14" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Prediction:</text>
      <text x="0" y="30" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  Per-CTA BW decreases with N</text>
      <text x="0" y="46" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  8 CTAs: 8.2/4 ≈ 2.0 GB/s each</text>
      <text x="0" y="66" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Measured:</text>
      <text x="0" y="82" style="font:700 9px 'JetBrains Mono',monospace;fill:#dc2626">  8.15 GB/s per CTA (constant!)</text>
    </g>

    <!-- REJECTED stamp -->
    <g transform="translate(80,262)">
      <rect x="0" y="0" width="160" height="30" rx="4" fill="#dc2626"/>
      <text x="80" y="20" style="font:700 12px 'Fraunces',serif;fill:#ffffff" text-anchor="middle">✗ REJECTED</text>
    </g>
  </g>

  <!-- Hypothesis 2: Point-to-Point Mesh (CONFIRMED) -->
  <g transform="translate(376,66)">
    <rect x="0" y="0" width="320" height="310" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
    <text x="160" y="22" style="font:700 11px 'Fraunces',serif;fill:#166534" text-anchor="middle">Hypothesis B: Point-to-Point Mesh</text>
    <text x="160" y="38" style="font:italic 9px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">Each CTA pair has dedicated channel</text>

    <!-- Mesh diagram -->
    <g transform="translate(20,52)">
      <!-- CTAs in grid with cross-links -->
      <rect x="50" y="10" width="40" height="24" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="0.8"/><text x="70" y="26" style="font:600 7px 'JetBrains Mono',monospace;fill:#166534" text-anchor="middle">CTA0</text>
      <rect x="130" y="10" width="40" height="24" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="0.8"/><text x="150" y="26" style="font:600 7px 'JetBrains Mono',monospace;fill:#166534" text-anchor="middle">CTA1</text>
      <rect x="210" y="10" width="40" height="24" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="0.8"/><text x="230" y="26" style="font:600 7px 'JetBrains Mono',monospace;fill:#166534" text-anchor="middle">CTA2</text>
      <rect x="50" y="60" width="40" height="24" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="0.8"/><text x="70" y="76" style="font:600 7px 'JetBrains Mono',monospace;fill:#166534" text-anchor="middle">CTA3</text>
      <rect x="130" y="60" width="40" height="24" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="0.8"/><text x="150" y="76" style="font:600 7px 'JetBrains Mono',monospace;fill:#166534" text-anchor="middle">CTA4</text>
      <rect x="210" y="60" width="40" height="24" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="0.8"/><text x="230" y="76" style="font:600 7px 'JetBrains Mono',monospace;fill:#166534" text-anchor="middle">CTA5</text>
      <!-- Dedicated links -->
      <line x1="90" y1="22" x2="130" y2="22" stroke="#16a34a" stroke-width="1.5"/>
      <line x1="170" y1="22" x2="210" y2="22" stroke="#16a34a" stroke-width="1.5"/>
      <line x1="90" y1="72" x2="130" y2="72" stroke="#16a34a" stroke-width="1.5"/>
      <line x1="170" y1="72" x2="210" y2="72" stroke="#16a34a" stroke-width="1.5"/>
      <line x1="70" y1="34" x2="70" y2="60" stroke="#16a34a" stroke-width="1.5"/>
      <line x1="150" y1="34" x2="150" y2="60" stroke="#16a34a" stroke-width="1.5"/>
      <line x1="230" y1="34" x2="230" y2="60" stroke="#16a34a" stroke-width="1.5"/>
      <text x="150" y="102" style="font:600 8px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">Independent dedicated links</text>
    </g>

    <!-- Prediction vs measurement -->
    <g transform="translate(20,170)">
      <text x="0" y="14" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Prediction:</text>
      <text x="0" y="30" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  Per-CTA BW stays CONSTANT</text>
      <text x="0" y="46" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  8 CTAs: still ~8.2 GB/s each</text>
      <text x="0" y="66" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Measured:</text>
      <text x="0" y="82" style="font:700 9px 'JetBrains Mono',monospace;fill:#16a34a">  8.15 GB/s per CTA ✓ (matches!)</text>
    </g>

    <!-- CONFIRMED stamp -->
    <g transform="translate(80,262)">
      <rect x="0" y="0" width="160" height="30" rx="4" fill="#16a34a"/>
      <text x="80" y="20" style="font:700 12px 'Fraunces',serif;fill:#ffffff" text-anchor="middle">✓ CONFIRMED</text>
    </g>
  </g>

  <!-- Hypothesis 3: Crossbar (CONSISTENT) -->
  <g transform="translate(716,66)">
    <rect x="0" y="0" width="328" height="310" rx="10" fill="#eff6ff" stroke="#1e40af" stroke-width="1.2"/>
    <text x="164" y="22" style="font:700 11px 'Fraunces',serif;fill:#1e3a8a" text-anchor="middle">Hypothesis C: Non-Blocking Crossbar</text>
    <text x="164" y="38" style="font:italic 9px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">Full crossbar switch with switching latency</text>

    <!-- Crossbar diagram -->
    <g transform="translate(20,52)">
      <!-- Central switch box -->
      <rect x="80" y="20" width="120" height="70" rx="4" fill="#dbeafe" stroke="#1e40af" stroke-width="1"/>
      <text x="140" y="44" style="font:700 8px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">CROSSBAR</text>
      <text x="140" y="58" style="font:500 7px 'JetBrains Mono',monospace;fill:#6b7280" text-anchor="middle">N×N switch</text>
      <text x="140" y="72" style="font:500 7px 'JetBrains Mono',monospace;fill:#6b7280" text-anchor="middle">(non-blocking)</text>
      <!-- Left CTAs -->
      <rect x="10" y="24" width="48" height="16" rx="2" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.6"/><text x="34" y="36" style="font:600 6px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">CTA0</text>
      <rect x="10" y="44" width="48" height="16" rx="2" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.6"/><text x="34" y="56" style="font:600 6px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">CTA1</text>
      <rect x="10" y="64" width="48" height="16" rx="2" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.6"/><text x="34" y="76" style="font:600 6px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">CTA2</text>
      <!-- Right CTAs -->
      <rect x="222" y="24" width="48" height="16" rx="2" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.6"/><text x="246" y="36" style="font:600 6px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">CTA5</text>
      <rect x="222" y="44" width="48" height="16" rx="2" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.6"/><text x="246" y="56" style="font:600 6px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">CTA6</text>
      <rect x="222" y="64" width="48" height="16" rx="2" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.6"/><text x="246" y="76" style="font:600 6px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">CTA7</text>
      <!-- Links -->
      <line x1="58" y1="32" x2="80" y2="32" stroke="#93c5fd" stroke-width="1"/>
      <line x1="58" y1="52" x2="80" y2="52" stroke="#93c5fd" stroke-width="1"/>
      <line x1="58" y1="72" x2="80" y2="72" stroke="#93c5fd" stroke-width="1"/>
      <line x1="200" y1="32" x2="222" y2="32" stroke="#93c5fd" stroke-width="1"/>
      <line x1="200" y1="52" x2="222" y2="52" stroke="#93c5fd" stroke-width="1"/>
      <line x1="200" y1="72" x2="222" y2="72" stroke="#93c5fd" stroke-width="1"/>
    </g>

    <!-- Prediction vs measurement -->
    <g transform="translate(20,170)">
      <text x="0" y="14" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Prediction:</text>
      <text x="0" y="30" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  Per-CTA BW constant (ring OK)</text>
      <text x="0" y="46" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  May drop under all-to-all</text>
      <text x="0" y="66" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Measured:</text>
      <text x="0" y="82" style="font:700 9px 'JetBrains Mono',monospace;fill:#1e40af">  All-to-all = 68% of ring BW ✓</text>
    </g>

    <!-- CONSISTENT stamp -->
    <g transform="translate(80,262)">
      <rect x="0" y="0" width="160" height="30" rx="4" fill="#1e40af"/>
      <text x="80" y="20" style="font:700 12px 'Fraunces',serif;fill:#ffffff" text-anchor="middle">✓ CONSISTENT</text>
    </g>
  </g>

  <!-- ═══════════════ BOTTOM: BW Scaling Data ═══════════════ -->
  <g transform="translate(36,394)">
    <rect x="0" y="0" width="1006" height="268" rx="10" fill="#fafafa" stroke="#d1d5db" stroke-width="0.8"/>
    <text x="20" y="24" style="font:600 12px 'Fraunces',serif;fill:#0b1220">Measured BW Scaling Evidence &amp; Conclusion</text>

    <!-- Left: BW data -->
    <g transform="translate(20,40)">
      <rect x="0" y="0" width="480" height="210" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
      <text x="10" y="18" style="font:700 9px 'JetBrains Mono',monospace;fill:#0b1220">Per-CTA BW Constancy (v4.u32, ring pattern)</text>
      <line x1="10" y1="24" x2="470" y2="24" stroke="#e5e7eb" stroke-width="0.6"/>
      <text x="10" y="42" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  2 CTAs:  8.23 GB/s per CTA   (16.46 / 2)</text>
      <text x="10" y="58" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  4 CTAs:  8.23 GB/s per CTA   (32.9 / 4)</text>
      <text x="10" y="74" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  8 CTAs:  8.15 GB/s per CTA   (65.2 / 8)</text>
      <text x="10" y="92" style="font:700 9px 'JetBrains Mono',monospace;fill:#16a34a">  Variance: &lt;1% → independent channels confirmed</text>
      <line x1="10" y1="102" x2="470" y2="102" stroke="#e5e7eb" stroke-width="0.6"/>
      <text x="10" y="120" style="font:700 9px 'JetBrains Mono',monospace;fill:#0b1220">Vector width scaling (2-CTA pair):</text>
      <text x="10" y="138" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  u32 (4B):    1.12 GB/s</text>
      <text x="10" y="154" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  v4.u32 (16B): 16.46 GB/s  (14.7× scalar)</text>
      <line x1="10" y1="164" x2="470" y2="164" stroke="#e5e7eb" stroke-width="0.6"/>
      <text x="10" y="182" style="font:700 9px 'JetBrains Mono',monospace;fill:#0b1220">Aggregate BW (8-CTA, v4.u32):</text>
      <text x="10" y="198" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  Ring: 72.7 GB/s | All-to-all: 49.6 GB/s (68% of ring)</text>
    </g>

    <!-- Right: Conclusion -->
    <g transform="translate(520,40)">
      <rect x="0" y="0" width="466" height="210" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="0.8"/>
      <text x="10" y="18" style="font:700 10px 'JetBrains Mono',monospace;fill:#166534">Topology Conclusion</text>
      <line x1="10" y1="26" x2="456" y2="26" stroke="#86efac" stroke-width="0.6"/>
      <text x="10" y="46" style="font:600 9px 'JetBrains Mono',monospace;fill:#166534">DSMEM uses point-to-point or crossbar topology</text>
      <text x="10" y="62" style="font:600 9px 'JetBrains Mono',monospace;fill:#166534">with independent per-CTA-pair channels.</text>
      <text x="10" y="80" style="font:700 9px 'JetBrains Mono',monospace;fill:#dc2626">Definitively NOT a shared bus.</text>
      <line x1="10" y1="92" x2="456" y2="92" stroke="#86efac" stroke-width="0.6"/>
      <text x="10" y="112" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Additional evidence (directional asymmetry):</text>
      <text x="10" y="130" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">• Even-ranked CTAs: ~4% more cycles than odd-ranked</text>
      <text x="10" y="146" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">• Suggests upstream/downstream routing difference</text>
      <text x="10" y="162" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">• Physical wires may form ring, logical topology is P2P</text>
      <line x1="10" y1="174" x2="456" y2="174" stroke="#86efac" stroke-width="0.6"/>
      <text x="10" y="192" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">• All-to-all 68% of ring → cross-traffic congestion</text>
      <text x="10" y="206" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">  Consistent with crossbar having non-zero switching latency</text>
    </g>
  </g>
</svg>
