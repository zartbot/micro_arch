<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 700" role="img" aria-label="6.2.3a Cluster Barrier Hardware Decomposition: Full (371 cyc) vs Relaxed (85 cyc)">
  <defs>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5b6679"/>
    </marker>
  </defs>
  <rect width="1080" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="36" y="30" style="font:600 14px 'Fraunces',serif;fill:#0b1220">6.2.3a Cluster Barrier SASS Decomposition: Full (371 cyc) vs Relaxed (85 cyc)</text>
  <text x="36" y="48" style="font:italic 11px 'Fraunces',serif;fill:#5b6679">MEMBAR.ALL.GPU accounts for 77% of full barrier cost — applications tolerating relaxed ordering save 4.4×</text>

  <!-- ═══════════════ LEFT: Full barrier.cluster ═══════════════ -->
  <g transform="translate(36,66)">
    <rect x="0" y="0" width="490" height="420" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
    <text x="245" y="22" style="font:700 12px 'Fraunces',serif;fill:#991b1b" text-anchor="middle">Full barrier.cluster (371 cyc)</text>
    <text x="245" y="38" style="font:italic 9px 'JetBrains Mono',monospace;fill:#dc2626" text-anchor="middle">barrier.cluster.arrive + barrier.cluster.wait (default semantics)</text>

    <!-- MEMBAR.ALL.GPU — dominant cost -->
    <g transform="translate(20,54)">
      <rect x="0" y="0" width="450" height="80" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
      <text x="10" y="18" style="font:700 11px 'JetBrains Mono',monospace;fill:#991b1b">MEMBAR.ALL.GPU</text>
      <text x="260" y="18" style="font:700 11px 'JetBrains Mono',monospace;fill:#dc2626">~286 cyc</text>
      <text x="340" y="18" style="font:600 9px 'JetBrains Mono',monospace;fill:#6b7280">(77%)</text>
      <line x1="10" y1="26" x2="440" y2="26" stroke="#fca5a5" stroke-width="0.6"/>
      <text x="10" y="42" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">① Drain SM's L1 write buffer to L2</text>
      <text x="10" y="56" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">② Wait for ACK from all 12 L2 partitions (GXBAR round-trip)</text>
      <text x="10" y="70" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">③ Invalidate L1 cache entries</text>
      <!-- Cost bar -->
      <rect x="10" y="76" width="430" height="3" rx="1" fill="#dc2626" opacity="0.3"/>
      <rect x="10" y="76" width="332" height="3" rx="1" fill="#dc2626"/>
    </g>

    <!-- ERRBAR -->
    <g transform="translate(20,144)">
      <rect x="0" y="0" width="450" height="32" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="0.8"/>
      <text x="10" y="20" style="font:700 10px 'JetBrains Mono',monospace;fill:#374151">ERRBAR</text>
      <text x="260" y="20" style="font:700 10px 'JetBrains Mono',monospace;fill:#6b7280">~1 cyc</text>
      <text x="310" y="20" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">Warp-level error barrier</text>
    </g>

    <!-- CGAERRBAR -->
    <g transform="translate(20,182)">
      <rect x="0" y="0" width="450" height="32" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="0.8"/>
      <text x="10" y="20" style="font:700 10px 'JetBrains Mono',monospace;fill:#374151">CGAERRBAR</text>
      <text x="260" y="20" style="font:700 10px 'JetBrains Mono',monospace;fill:#6b7280">~1 cyc</text>
      <text x="310" y="20" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">Cluster-level error barrier</text>
    </g>

    <!-- UCGABAR_ARV -->
    <g transform="translate(20,222)">
      <rect x="0" y="0" width="450" height="44" rx="6" fill="#eff6ff" stroke="#1e40af" stroke-width="1"/>
      <text x="10" y="18" style="font:700 10px 'JetBrains Mono',monospace;fill:#1e40af">UCGABAR_ARV</text>
      <text x="260" y="18" style="font:700 10px 'JetBrains Mono',monospace;fill:#1e40af">~40 cyc</text>
      <text x="10" y="36" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">CGA controller arrive notification (SM2SM fabric)</text>
    </g>

    <!-- UCGABAR_WAIT -->
    <g transform="translate(20,274)">
      <rect x="0" y="0" width="450" height="44" rx="6" fill="#eff6ff" stroke="#1e40af" stroke-width="1"/>
      <text x="10" y="18" style="font:700 10px 'JetBrains Mono',monospace;fill:#1e40af">UCGABAR_WAIT</text>
      <text x="260" y="18" style="font:700 10px 'JetBrains Mono',monospace;fill:#1e40af">~40 cyc</text>
      <text x="10" y="36" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">CGA controller wait for all CTAs (blocks warp)</text>
    </g>

    <!-- CCTL.IVALL -->
    <g transform="translate(20,326)">
      <rect x="0" y="0" width="450" height="32" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
      <text x="10" y="20" style="font:700 10px 'JetBrains Mono',monospace;fill:#374151">CCTL.IVALL</text>
      <text x="260" y="20" style="font:700 10px 'JetBrains Mono',monospace;fill:#6b7280">~2 cyc</text>
      <text x="310" y="20" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">L1 invalidation (0 marginal)</text>
    </g>

    <!-- Total -->
    <g transform="translate(20,370)">
      <rect x="0" y="0" width="450" height="36" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
      <text x="10" y="24" style="font:700 12px 'JetBrains Mono',monospace;fill:#991b1b">TOTAL</text>
      <text x="260" y="24" style="font:700 12px 'JetBrains Mono',monospace;fill:#dc2626">~371 cyc</text>
    </g>
  </g>

  <!-- ═══════════════ RIGHT: Relaxed barrier.cluster ═══════════════ -->
  <g transform="translate(550,66)">
    <rect x="0" y="0" width="490" height="420" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
    <text x="245" y="22" style="font:700 12px 'Fraunces',serif;fill:#166534" text-anchor="middle">Relaxed barrier.cluster (85 cyc)</text>
    <text x="245" y="38" style="font:italic 9px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">barrier.cluster.arrive.relaxed + barrier.cluster.wait (no MEMBAR)</text>

    <!-- No MEMBAR — savings highlighted -->
    <g transform="translate(20,54)">
      <rect x="0" y="0" width="450" height="80" rx="6" fill="#ecfdf5" stroke="#16a34a" stroke-width="1" stroke-dasharray="6,3"/>
      <text x="225" y="36" style="font:700 12px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">MEMBAR.ALL.GPU — SKIPPED</text>
      <text x="225" y="56" style="font:600 10px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">Saves 286 cycles (77% of full cost)</text>
      <text x="225" y="72" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151" text-anchor="middle">No L2 coherence drain → tolerates relaxed memory ordering</text>
    </g>

    <!-- UCGABAR_ARV -->
    <g transform="translate(20,150)">
      <rect x="0" y="0" width="450" height="60" rx="6" fill="#eff6ff" stroke="#1e40af" stroke-width="1"/>
      <text x="10" y="18" style="font:700 10px 'JetBrains Mono',monospace;fill:#1e40af">UCGABAR_ARV</text>
      <text x="320" y="18" style="font:700 10px 'JetBrains Mono',monospace;fill:#1e40af">~40 cyc</text>
      <text x="10" y="36" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">Centralized CGA controller: arrive notification</text>
      <text x="10" y="50" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">Increments per-phase counter via SM2SM sideband</text>
    </g>

    <!-- UCGABAR_WAIT -->
    <g transform="translate(20,220)">
      <rect x="0" y="0" width="450" height="60" rx="6" fill="#eff6ff" stroke="#1e40af" stroke-width="1"/>
      <text x="10" y="18" style="font:700 10px 'JetBrains Mono',monospace;fill:#1e40af">UCGABAR_WAIT</text>
      <text x="320" y="18" style="font:700 10px 'JetBrains Mono',monospace;fill:#1e40af">~40 cyc</text>
      <text x="10" y="36" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">Wait until counter == cluster_size</text>
      <text x="10" y="50" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">All waiting warps released simultaneously (broadcast)</text>
    </g>

    <!-- CCTL.IVALL -->
    <g transform="translate(20,290)">
      <rect x="0" y="0" width="450" height="32" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
      <text x="10" y="20" style="font:700 10px 'JetBrains Mono',monospace;fill:#374151">CCTL.IVALL</text>
      <text x="320" y="20" style="font:700 10px 'JetBrains Mono',monospace;fill:#6b7280">~2 cyc</text>
      <text x="370" y="20" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">L1 invalidation</text>
    </g>

    <!-- Total -->
    <g transform="translate(20,336)">
      <rect x="0" y="0" width="450" height="36" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
      <text x="10" y="24" style="font:700 12px 'JetBrains Mono',monospace;fill:#166534">TOTAL</text>
      <text x="320" y="24" style="font:700 12px 'JetBrains Mono',monospace;fill:#16a34a">~85 cyc</text>
      <text x="370" y="24" style="font:600 10px 'JetBrains Mono',monospace;fill:#16a34a">(4.4× faster)</text>
    </g>

    <!-- O(1) scaling evidence -->
    <g transform="translate(20,382)">
      <rect x="0" y="0" width="450" height="28" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="0.6"/>
      <text x="225" y="18" style="font:700 9px 'JetBrains Mono',monospace;fill:#166534" text-anchor="middle">O(1) scaling: 85 cyc constant for 2, 4, and 8 CTAs → centralized HW counter</text>
    </g>
  </g>

  <!-- ═══════════════ BOTTOM: CGA Controller Model ═══════════════ -->
  <g transform="translate(36,504)">
    <rect x="0" y="0" width="1006" height="178" rx="10" fill="#fafafa" stroke="#d1d5db" stroke-width="0.8"/>
    <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#0b1220">CGA Controller Hardware Model (Inferred from O(1) Scaling)</text>

    <!-- Left: mechanism diagram -->
    <g transform="translate(20,36)">
      <rect x="0" y="0" width="480" height="126" rx="6" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="10" y="18" style="font:700 9px 'JetBrains Mono',monospace;fill:#1e40af">Centralized Counter Mechanism</text>
      <line x1="10" y1="24" x2="470" y2="24" stroke="#c7d2fe" stroke-width="0.6"/>
      <text x="10" y="42" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">1. Each CTA: UCGABAR_ARV → increment counter (SM2SM sideband)</text>
      <text x="10" y="58" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">2. Counter reaches cluster_size → broadcast release signal</text>
      <text x="10" y="74" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">3. All UCGABAR_WAIT stalls simultaneously unblock</text>
      <line x1="10" y1="82" x2="470" y2="82" stroke="#c7d2fe" stroke-width="0.6"/>
      <text x="10" y="100" style="font:600 9px 'JetBrains Mono',monospace;fill:#1e40af">Evidence: constant 85 cyc for N=2,4,8</text>
      <text x="10" y="116" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">Tree-reduction would scale O(log N): 2→4 CTAs would add ~40 cyc — NOT observed</text>
    </g>

    <!-- Right: practical implications -->
    <g transform="translate(520,36)">
      <rect x="0" y="0" width="466" height="126" rx="6" fill="#FFF7ED" stroke="#c2410c" stroke-width="0.8"/>
      <text x="10" y="18" style="font:700 9px 'JetBrains Mono',monospace;fill:#c2410c">Practical Implications</text>
      <line x1="10" y1="24" x2="456" y2="24" stroke="#fdba74" stroke-width="0.6"/>
      <text x="10" y="42" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">• ALWAYS use relaxed when cross-CTA visibility not needed</text>
      <text x="10" y="58" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">• Only 6-8 useful ALU cyc fit between ARV and WAIT</text>
      <text x="10" y="74" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">  (SMSP pipeline depth — warp stalls at WAIT entry)</text>
      <text x="10" y="92" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">• MEMBAR cost == standalone fence.acq_rel.gpu (286 cyc)</text>
      <text x="10" y="108" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">• Patent basis: US20230289242A1 (HW-accelerated barrier)</text>
      <text x="10" y="122" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">  Claim: "SM-to-SM sideband for O(1) synchronization"</text>
    </g>
  </g>
</svg>
