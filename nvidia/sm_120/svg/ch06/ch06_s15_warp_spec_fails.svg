<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" role="img" aria-label="6.7.2 Why Warp Specialization Fails on SM_120: SM_100/110 vs SM_120 architectural comparison">
  <defs>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5b6679"/>
    </marker>
    <marker id="ar-green" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#16a34a"/>
    </marker>
    <marker id="ar-red" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="1080" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="36" y="28" style="font:600 14px 'Fraunces',serif;fill:#0b1220">6.7.2 Why Warp Specialization Fails on SM_120</text>
  <text x="36" y="46" style="font:italic 11px 'Fraunces',serif;fill:#5b6679">SM_100/110: warp specialization ESSENTIAL (wgmma+TM) | SM_120: COUNTERPRODUCTIVE (mma.sync+RF, −68–73%)</text>

  <!-- ═══════════════ LEFT: SM_100/110 Model (warp spec works) ═══════════════ -->
  <g transform="translate(36,62)">
    <rect x="0" y="0" width="490" height="340" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
    <text x="245" y="22" style="font:700 12px 'Fraunces',serif;fill:#166534" text-anchor="middle">SM_100/SM_110: wgmma + Tensor Memory</text>
    <text x="245" y="38" style="font:600 10px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">Warp Specialization = ESSENTIAL</text>

    <!-- Data path diagram -->
    <g transform="translate(20,54)">
      <!-- Producer warpgroup -->
      <rect x="0" y="0" width="170" height="110" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="0.8"/>
      <text x="85" y="18" style="font:700 9px 'JetBrains Mono',monospace;fill:#166534" text-anchor="middle">Producer Warpgroup</text>
      <line x1="10" y1="24" x2="160" y2="24" stroke="#86efac" stroke-width="0.6"/>
      <text x="10" y="42" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">Issues: TMA loads</text>
      <text x="10" y="56" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">Target: Tensor Memory</text>
      <text x="10" y="72" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">Path: Global → TM</text>
      <text x="10" y="86" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">(bypasses smem+RF)</text>
      <text x="10" y="102" style="font:700 8px 'JetBrains Mono',monospace;fill:#16a34a">TC idle: OK (no TC work)</text>

      <!-- Consumer warpgroup -->
      <rect x="0" y="122" width="170" height="110" rx="6" fill="#dbeafe" stroke="#1e40af" stroke-width="0.8"/>
      <text x="85" y="140" style="font:700 9px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">Consumer Warpgroup</text>
      <line x1="10" y1="146" x2="160" y2="146" stroke="#c7d2fe" stroke-width="0.6"/>
      <text x="10" y="164" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">Issues: wgmma/tcgen05</text>
      <text x="10" y="178" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">Source: Tensor Memory</text>
      <text x="10" y="192" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">Path: TM → TC → RF</text>
      <text x="10" y="208" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">(no ldmatrix needed)</text>
      <text x="10" y="224" style="font:700 8px 'JetBrains Mono',monospace;fill:#1e40af">TC busy: 100% utilization</text>

      <!-- Tensor Memory in the middle-right -->
      <rect x="210" y="50" width="230" height="140" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="0.8"/>
      <text x="325" y="70" style="font:700 10px 'JetBrains Mono',monospace;fill:#92400e" text-anchor="middle">Tensor Memory (TM)</text>
      <line x1="220" y1="78" x2="430" y2="78" stroke="#fde68a" stroke-width="0.6"/>
      <text x="220" y="96" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">Dedicated operand buffer</text>
      <text x="220" y="112" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">TMA writes DIRECTLY here</text>
      <text x="220" y="128" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">wgmma reads DIRECTLY here</text>
      <text x="220" y="148" style="font:700 8px 'JetBrains Mono',monospace;fill:#92400e">→ No smem/RF bottleneck</text>
      <text x="220" y="164" style="font:700 8px 'JetBrains Mono',monospace;fill:#92400e">→ Producer ≠ Consumer HW</text>

      <!-- Arrows -->
      <line x1="170" y1="50" x2="210" y2="80" stroke="#16a34a" stroke-width="1.2" marker-end="url(#ar-green)"/>
      <text x="185" y="58" style="font:500 6px 'JetBrains Mono',monospace;fill:#16a34a">TMA→TM</text>
      <line x1="210" y1="160" x2="170" y2="180" stroke="#1e40af" stroke-width="1.2" marker-end="url(#ar)"/>
      <text x="175" y="155" style="font:500 6px 'JetBrains Mono',monospace;fill:#1e40af">TM→wgmma</text>
    </g>

    <!-- Key benefit -->
    <g transform="translate(20,296)">
      <rect x="0" y="0" width="450" height="30" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="0.6"/>
      <text x="225" y="12" style="font:700 9px 'JetBrains Mono',monospace;fill:#166534" text-anchor="middle">Producer and Consumer operate on DIFFERENT hardware resources</text>
      <text x="225" y="24" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151" text-anchor="middle">→ True parallelism: TMA fills TM while wgmma consumes TM</text>
    </g>
  </g>

  <!-- ═══════════════ RIGHT: SM_120 Model (warp spec fails) ═══════════════ -->
  <g transform="translate(546,62)">
    <rect x="0" y="0" width="498" height="340" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
    <text x="249" y="22" style="font:700 12px 'Fraunces',serif;fill:#991b1b" text-anchor="middle">SM_120: mma.sync + Register File</text>
    <text x="249" y="38" style="font:600 10px 'JetBrains Mono',monospace;fill:#dc2626" text-anchor="middle">Warp Specialization = COUNTERPRODUCTIVE (−68–73%)</text>

    <!-- Data path diagram -->
    <g transform="translate(20,54)">
      <!-- All warps can do everything -->
      <rect x="0" y="0" width="170" height="130" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="0.8"/>
      <text x="85" y="18" style="font:700 9px 'JetBrains Mono',monospace;fill:#991b1b" text-anchor="middle">Every Warp (4 total)</text>
      <line x1="10" y1="24" x2="160" y2="24" stroke="#fca5a5" stroke-width="0.6"/>
      <text x="10" y="42" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">Can issue: TMA + ldmatrix</text>
      <text x="10" y="56" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">Can issue: mma.sync</text>
      <text x="10" y="72" style="font:600 8px 'JetBrains Mono',monospace;fill:#374151">TC + LSU co-issue = 100%</text>
      <text x="10" y="90" style="font:700 8px 'JetBrains Mono',monospace;fill:#dc2626">Dedicating to "load only"</text>
      <text x="10" y="104" style="font:700 8px 'JetBrains Mono',monospace;fill:#dc2626">WASTES its TC time slot</text>
      <text x="10" y="120" style="font:700 8px 'JetBrains Mono',monospace;fill:#dc2626">(−50% TC utilization)</text>

      <!-- Data path: TMA → smem → ldmatrix → RF → MMA -->
      <g transform="translate(190,0)">
        <rect x="0" y="0" width="268" height="200" rx="6" fill="#fff" stroke="#e5e7eb" stroke-width="0.8"/>
        <text x="134" y="18" style="font:700 9px 'JetBrains Mono',monospace;fill:#374151" text-anchor="middle">Mandatory Serial Data Path</text>
        <line x1="10" y1="24" x2="258" y2="24" stroke="#e5e7eb" stroke-width="0.6"/>

        <!-- Path blocks -->
        <rect x="20" y="34" width="80" height="24" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="0.6"/>
        <text x="60" y="50" style="font:700 8px 'JetBrains Mono',monospace;fill:#166534" text-anchor="middle">TMA</text>
        <line x1="100" y1="46" x2="118" y2="46" stroke="#5b6679" stroke-width="1" marker-end="url(#ar)"/>

        <rect x="120" y="34" width="60" height="24" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="0.6"/>
        <text x="150" y="50" style="font:700 7px 'JetBrains Mono',monospace;fill:#92400e" text-anchor="middle">smem</text>
        <line x1="180" y1="46" x2="196" y2="46" stroke="#5b6679" stroke-width="1" marker-end="url(#ar)"/>

        <rect x="198" y="34" width="56" height="24" rx="3" fill="#dbeafe" stroke="#1e40af" stroke-width="0.6"/>
        <text x="226" y="50" style="font:700 7px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">ldm</text>

        <!-- Second row -->
        <line x1="226" y1="58" x2="226" y2="72" stroke="#5b6679" stroke-width="1" marker-end="url(#ar)"/>
        <rect x="190" y="74" width="60" height="24" rx="3" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.6"/>
        <text x="220" y="90" style="font:700 7px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">RF</text>
        <line x1="190" y1="86" x2="174" y2="86" stroke="#5b6679" stroke-width="1" marker-end="url(#ar)"/>

        <rect x="100" y="74" width="72" height="24" rx="3" fill="#dc2626" fill-opacity="0.08" stroke="#dc2626" stroke-width="0.6"/>
        <text x="136" y="90" style="font:700 7px 'JetBrains Mono',monospace;fill:#991b1b" text-anchor="middle">mma.sync</text>

        <!-- Key difference callout -->
        <rect x="10" y="110" width="248" height="88" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="0.6"/>
        <text x="20" y="128" style="font:700 8px 'JetBrains Mono',monospace;fill:#991b1b">No Tensor Memory on SM_120!</text>
        <text x="20" y="144" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">Every warp MUST do:</text>
        <text x="20" y="158" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">  TMA → smem → ldmatrix → RF → MMA</text>
        <text x="20" y="174" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151">Split P/C adds __syncthreads +259 cyc</text>
        <text x="20" y="188" style="font:700 8px 'JetBrains Mono',monospace;fill:#dc2626">→ Same HW needed by both roles</text>
      </g>
    </g>

    <!-- Measured throughput loss -->
    <g transform="translate(20,270)">
      <rect x="0" y="0" width="458" height="56" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="0.6"/>
      <text x="229" y="14" style="font:700 9px 'JetBrains Mono',monospace;fill:#991b1b" text-anchor="middle">Measured Throughput Loss (Case 33, S9)</text>
      <text x="10" y="32" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">All-compute (4 warps): 0.0384 mma/cyc</text>
      <text x="290" y="32" style="font:700 9px 'JetBrains Mono',monospace;fill:#16a34a">baseline</text>
      <text x="10" y="48" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">Warp-spec (2P+2C): 0.0102 mma/cyc</text>
      <text x="290" y="48" style="font:700 9px 'JetBrains Mono',monospace;fill:#dc2626">−73% throughput</text>
    </g>
  </g>

  <!-- ═══════════════ BOTTOM: Cost Breakdown & Root Cause ═══════════════ -->
  <g transform="translate(36,420)">
    <rect x="0" y="0" width="1006" height="280" rx="10" fill="#fafafa" stroke="#d1d5db" stroke-width="0.8"/>
    <text x="20" y="24" style="font:600 12px 'Fraunces',serif;fill:#0b1220">Root Cause Analysis: Two Compounding Loss Factors</text>

    <!-- Factor 1: TC slot waste -->
    <g transform="translate(20,44)">
      <rect x="0" y="0" width="470" height="220" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="0.8"/>
      <text x="10" y="18" style="font:700 10px 'JetBrains Mono',monospace;fill:#991b1b">Factor 1: Producer Warps Waste TC Slots (−50%)</text>
      <line x1="10" y1="26" x2="460" y2="26" stroke="#fca5a5" stroke-width="0.6"/>

      <!-- 4-warp schedule visualization -->
      <text x="10" y="46" style="font:600 8px 'JetBrains Mono',monospace;fill:#374151">Scheduler time slots (4 warps × 4 SMSP):</text>

      <!-- Normal: all warps compute -->
      <text x="10" y="66" style="font:600 8px 'JetBrains Mono',monospace;fill:#16a34a">All-compute:</text>
      <rect x="110" y="56" width="80" height="16" rx="2" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-width="0.6"/>
      <text x="150" y="68" style="font:700 7px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">W0:MMA</text>
      <rect x="194" y="56" width="80" height="16" rx="2" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-width="0.6"/>
      <text x="234" y="68" style="font:700 7px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">W1:MMA</text>
      <rect x="278" y="56" width="80" height="16" rx="2" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-width="0.6"/>
      <text x="318" y="68" style="font:700 7px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">W2:MMA</text>
      <rect x="362" y="56" width="80" height="16" rx="2" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-width="0.6"/>
      <text x="402" y="68" style="font:700 7px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">W3:MMA</text>

      <!-- Warp-specialized: 2P + 2C -->
      <text x="10" y="96" style="font:600 8px 'JetBrains Mono',monospace;fill:#dc2626">2P+2C:</text>
      <rect x="110" y="86" width="80" height="16" rx="2" fill="#dc2626" fill-opacity="0.1" stroke="#dc2626" stroke-width="0.6"/>
      <text x="150" y="98" style="font:700 7px 'JetBrains Mono',monospace;fill:#dc2626" text-anchor="middle">P0:TMA</text>
      <rect x="194" y="86" width="80" height="16" rx="2" fill="#dc2626" fill-opacity="0.1" stroke="#dc2626" stroke-width="0.6"/>
      <text x="234" y="98" style="font:700 7px 'JetBrains Mono',monospace;fill:#dc2626" text-anchor="middle">P1:TMA</text>
      <rect x="278" y="86" width="80" height="16" rx="2" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-width="0.6"/>
      <text x="318" y="98" style="font:700 7px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">C0:MMA</text>
      <rect x="362" y="86" width="80" height="16" rx="2" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-width="0.6"/>
      <text x="402" y="98" style="font:700 7px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">C1:MMA</text>

      <!-- TC idle markers -->
      <text x="130" y="114" style="font:700 7px 'JetBrains Mono',monospace;fill:#dc2626">TC IDLE</text>
      <text x="214" y="114" style="font:700 7px 'JetBrains Mono',monospace;fill:#dc2626">TC IDLE</text>

      <line x1="10" y1="124" x2="460" y2="124" stroke="#fca5a5" stroke-width="0.6"/>
      <text x="10" y="142" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">On SM_120: TC + LSU co-issue = 100% overlap</text>
      <text x="10" y="158" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">→ A "producer-only" warp wastes its TC slot entirely</text>
      <text x="10" y="174" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">→ 2P+2C = only 2/4 TC slots used = 50% TC throughput</text>
      <text x="10" y="192" style="font:700 9px 'JetBrains Mono',monospace;fill:#dc2626">On SM_100: wgmma reads from TM, not RF — producer</text>
      <text x="10" y="206" style="font:700 9px 'JetBrains Mono',monospace;fill:#dc2626">CANNOT compute (different HW), so no waste!</text>
    </g>

    <!-- Factor 2: Sync overhead -->
    <g transform="translate(510,44)">
      <rect x="0" y="0" width="476" height="220" rx="6" fill="#ffffff" stroke="#d97706" stroke-width="0.8"/>
      <text x="10" y="18" style="font:700 10px 'JetBrains Mono',monospace;fill:#92400e">Factor 2: __syncthreads Serialization (+259 cyc)</text>
      <line x1="10" y1="26" x2="466" y2="26" stroke="#fde68a" stroke-width="0.6"/>

      <!-- Timeline comparison -->
      <text x="10" y="46" style="font:600 8px 'JetBrains Mono',monospace;fill:#374151">Without warp spec (all warps interleave freely):</text>
      <rect x="10" y="52" width="380" height="16" rx="2" fill="#16a34a" fill-opacity="0.1" stroke="#16a34a" stroke-width="0.6"/>
      <text x="200" y="64" style="font:700 7px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">TMA(i+1) ‖ ldm(i) ‖ MMA(i) — no sync needed</text>

      <text x="10" y="86" style="font:600 8px 'JetBrains Mono',monospace;fill:#374151">With warp spec (P/C must sync each phase):</text>
      <rect x="10" y="92" width="160" height="16" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="0.6"/>
      <text x="90" y="104" style="font:700 7px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">Producer: TMA</text>
      <rect x="170" y="92" width="50" height="16" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="0.8"/>
      <text x="195" y="104" style="font:700 7px 'JetBrains Mono',monospace;fill:#d97706" text-anchor="middle">SYNC</text>
      <rect x="220" y="92" width="160" height="16" rx="2" fill="#dbeafe" stroke="#1e40af" stroke-width="0.6"/>
      <text x="300" y="104" style="font:700 7px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">Consumer: ldm+MMA</text>
      <rect x="380" y="92" width="50" height="16" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="0.8"/>
      <text x="405" y="104" style="font:700 7px 'JetBrains Mono',monospace;fill:#d97706" text-anchor="middle">SYNC</text>

      <line x1="10" y1="118" x2="466" y2="118" stroke="#fde68a" stroke-width="0.6"/>
      <text x="10" y="136" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">__syncthreads cost per iteration: 259 cyc</text>
      <text x="10" y="154" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">→ Two sync points per tile: after produce, after consume</text>
      <text x="10" y="172" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">→ Kills the overlap that software pipelining achieves</text>
      <text x="10" y="192" style="font:700 9px 'JetBrains Mono',monospace;fill:#92400e">Combined loss: −50% (TC waste) × −18% (sync) = −73%</text>
      <text x="10" y="210" style="font:700 9px 'JetBrains Mono',monospace;fill:#dc2626">Result: 0.0384 → 0.0102 mma/cyc</text>
    </g>
  </g>
</svg>
