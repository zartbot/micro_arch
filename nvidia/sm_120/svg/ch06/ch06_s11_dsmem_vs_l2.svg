<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 640" role="img" aria-label="6.3 DSMEM vs L2 Fabric Comparison: Raw Latency vs Synchronized Communication">
  <defs>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5b6679"/>
    </marker>
  </defs>
  <rect width="1080" height="640" fill="#ffffff"/>

  <!-- Title -->
  <text x="36" y="28" style="font:600 14px 'Fraunces',serif;fill:#0b1220">6.3 Dual-Fabric Decision Map: DSMEM (SM2SM) vs L2 (GXBAR)</text>
  <text x="36" y="46" style="font:italic 11px 'Fraunces',serif;fill:#5b6679">L2 wins 4.5× on raw data reads; DSMEM wins 3.5–26× on synchronized producer-consumer patterns</text>

  <!-- ═══════════════ TOP ROW: Two domains side by side ═══════════════ -->

  <!-- LEFT: Raw Data Access (L2 wins) -->
  <g transform="translate(36,62)">
    <rect x="0" y="0" width="490" height="260" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
    <text x="245" y="22" style="font:700 12px 'Fraunces',serif;fill:#166534" text-anchor="middle">Raw Data Access (No Sync Required)</text>
    <text x="245" y="38" style="font:600 10px 'JetBrains Mono',monospace;fill:#16a34a" text-anchor="middle">→ L2 wins at EVERY payload size</text>

    <!-- Bar chart: L2 vs DSMEM latency -->
    <g transform="translate(30,54)">
      <!-- 4B read -->
      <text x="0" y="14" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">4B read:</text>
      <rect x="80" y="2" width="30" height="14" rx="2" fill="#16a34a"/><text x="115" y="14" style="font:700 8px 'JetBrains Mono',monospace;fill:#16a34a">49.5</text>
      <rect x="80" y="20" width="136" height="14" rx="2" fill="#dc2626" opacity="0.7"/><text x="220" y="32" style="font:700 8px 'JetBrains Mono',monospace;fill:#dc2626">225</text>
      <text x="260" y="22" style="font:500 7px 'JetBrains Mono',monospace;fill:#6b7280">L2 4.5× faster</text>

      <!-- 128B read -->
      <text x="0" y="56" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">128B read:</text>
      <rect x="80" y="44" width="46" height="14" rx="2" fill="#16a34a"/><text x="130" y="56" style="font:700 8px 'JetBrains Mono',monospace;fill:#16a34a">151</text>
      <rect x="80" y="62" width="200" height="14" rx="2" fill="#dc2626" opacity="0.7"/><text x="284" y="74" style="font:700 8px 'JetBrains Mono',monospace;fill:#dc2626">659</text>
      <text x="320" y="64" style="font:500 7px 'JetBrains Mono',monospace;fill:#6b7280">L2 4.4× faster</text>

      <!-- 1KB read -->
      <text x="0" y="98" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">1KB read:</text>
      <rect x="80" y="86" width="100" height="14" rx="2" fill="#16a34a"/><text x="184" y="98" style="font:700 8px 'JetBrains Mono',monospace;fill:#16a34a">2310</text>
      <rect x="80" y="104" width="345" height="14" rx="2" fill="#dc2626" opacity="0.7"/><text x="430" y="116" style="font:700 8px 'JetBrains Mono',monospace;fill:#dc2626">7978</text>

      <!-- Legend -->
      <rect x="80" y="132" width="12" height="12" rx="2" fill="#16a34a"/>
      <text x="96" y="142" style="font:600 8px 'JetBrains Mono',monospace;fill:#16a34a">L2 (GXBAR)</text>
      <rect x="180" y="132" width="12" height="12" rx="2" fill="#dc2626" opacity="0.7"/>
      <text x="196" y="142" style="font:600 8px 'JetBrains Mono',monospace;fill:#dc2626">DSMEM (SM2SM)</text>
    </g>

    <!-- Key callout -->
    <g transform="translate(30,216)">
      <rect x="0" y="0" width="430" height="30" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="0.6"/>
      <text x="215" y="12" style="font:700 9px 'JetBrains Mono',monospace;fill:#166534" text-anchor="middle">No crossover point exists at any payload size (4B–1KB)</text>
      <text x="215" y="24" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151" text-anchor="middle">Use L2 when ONLY data is needed, without ordering guarantees</text>
    </g>
  </g>

  <!-- RIGHT: Synchronized Communication (DSMEM wins) -->
  <g transform="translate(546,62)">
    <rect x="0" y="0" width="498" height="260" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="1.2"/>
    <text x="249" y="22" style="font:700 12px 'Fraunces',serif;fill:#1e3a8a" text-anchor="middle">Synchronized Communication (Data + Signal)</text>
    <text x="249" y="38" style="font:600 10px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">→ DSMEM wins 3.5–26× with native barriers</text>

    <!-- Bar chart: DSMEM vs L2 for sync patterns -->
    <g transform="translate(20,54)">
      <!-- Sync notification -->
      <text x="0" y="14" style="font:600 8px 'JetBrains Mono',monospace;fill:#374151">Sync notify:</text>
      <rect x="90" y="2" width="16" height="14" rx="2" fill="#1e40af"/><text x="110" y="14" style="font:700 8px 'JetBrains Mono',monospace;fill:#1e40af">86</text>
      <rect x="90" y="20" width="360" height="14" rx="2" fill="#dc2626" opacity="0.5"/><text x="455" y="32" style="font:700 8px 'JetBrains Mono',monospace;fill:#dc2626">2242</text>
      <text x="130" y="29" style="font:600 8px 'JetBrains Mono',monospace;fill:#fff">DSMEM 26× faster</text>

      <!-- mbarrier bilateral -->
      <text x="0" y="56" style="font:600 8px 'JetBrains Mono',monospace;fill:#374151">Bilateral sync:</text>
      <rect x="90" y="44" width="26" height="14" rx="2" fill="#1e40af"/><text x="120" y="56" style="font:700 8px 'JetBrains Mono',monospace;fill:#1e40af">160</text>
      <rect x="90" y="62" width="318" height="14" rx="2" fill="#dc2626" opacity="0.5"/><text x="413" y="74" style="font:700 8px 'JetBrains Mono',monospace;fill:#dc2626">1977</text>
      <text x="145" y="71" style="font:600 8px 'JetBrains Mono',monospace;fill:#fff">12.4×</text>

      <!-- Data + signal pipeline -->
      <text x="0" y="98" style="font:600 8px 'JetBrains Mono',monospace;fill:#374151">Data+signal:</text>
      <rect x="90" y="86" width="76" height="14" rx="2" fill="#1e40af"/><text x="170" y="98" style="font:700 8px 'JetBrains Mono',monospace;fill:#1e40af">952/iter</text>
      <rect x="90" y="104" width="268" height="14" rx="2" fill="#dc2626" opacity="0.5"/><text x="363" y="116" style="font:700 8px 'JetBrains Mono',monospace;fill:#dc2626">3312/iter</text>
      <text x="215" y="114" style="font:600 8px 'JetBrains Mono',monospace;fill:#fff">3.5×</text>

      <!-- Barrier scaling -->
      <text x="0" y="140" style="font:600 8px 'JetBrains Mono',monospace;fill:#374151">Barrier (8CTA):</text>
      <rect x="90" y="128" width="14" height="14" rx="2" fill="#1e40af"/><text x="108" y="140" style="font:700 8px 'JetBrains Mono',monospace;fill:#1e40af">86 O(1)</text>
      <rect x="90" y="146" width="318" height="14" rx="2" fill="#dc2626" opacity="0.5"/><text x="413" y="158" style="font:700 8px 'JetBrains Mono',monospace;fill:#dc2626">1977</text>
      <text x="170" y="156" style="font:600 8px 'JetBrains Mono',monospace;fill:#fff">23× + O(1) vs O(N)</text>

      <!-- Legend -->
      <rect x="90" y="172" width="12" height="12" rx="2" fill="#1e40af"/>
      <text x="106" y="182" style="font:600 8px 'JetBrains Mono',monospace;fill:#1e40af">DSMEM (SM2SM)</text>
      <rect x="210" y="172" width="12" height="12" rx="2" fill="#dc2626" opacity="0.5"/>
      <text x="226" y="182" style="font:600 8px 'JetBrains Mono',monospace;fill:#dc2626">L2 (polling/acq-rel)</text>
    </g>

    <!-- Key callout -->
    <g transform="translate(20,216)">
      <rect x="0" y="0" width="458" height="30" rx="4" fill="#eff6ff" stroke="#1e40af" stroke-width="0.6"/>
      <text x="229" y="12" style="font:700 9px 'JetBrains Mono',monospace;fill:#1e3a8a" text-anchor="middle">DSMEM advantage = native barrier + fire-and-forget stores</text>
      <text x="229" y="24" style="font:500 8px 'JetBrains Mono',monospace;fill:#374151" text-anchor="middle">Use DSMEM for producer-consumer, KV sharing, split-K reduction</text>
    </g>
  </g>

  <!-- ═══════════════ BOTTOM: Decision Framework ═══════════════ -->
  <g transform="translate(36,342)">
    <rect x="0" y="0" width="1006" height="280" rx="10" fill="#fafafa" stroke="#d1d5db" stroke-width="0.8"/>
    <text x="20" y="24" style="font:600 13px 'Fraunces',serif;fill:#0b1220">Architectural Decision Framework: "Sync Domain" Choice</text>

    <!-- Decision tree -->
    <g transform="translate(20,44)">
      <rect x="0" y="0" width="540" height="230" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
      <text x="10" y="18" style="font:700 10px 'JetBrains Mono',monospace;fill:#0b1220">When to use which fabric:</text>
      <line x1="10" y1="26" x2="530" y2="26" stroke="#e5e7eb" stroke-width="0.6"/>

      <!-- Decision 1 -->
      <rect x="10" y="34" width="520" height="28" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="0.6"/>
      <text x="18" y="52" style="font:600 9px 'JetBrains Mono',monospace;fill:#166534">Data only, no ordering needed</text>
      <text x="300" y="52" style="font:700 9px 'JetBrains Mono',monospace;fill:#16a34a">→ L2 global loads (4.5× lower latency)</text>

      <!-- Decision 2 -->
      <rect x="10" y="68" width="520" height="28" rx="3" fill="#eff6ff" stroke="#1e40af" stroke-width="0.6"/>
      <text x="18" y="86" style="font:600 9px 'JetBrains Mono',monospace;fill:#1e3a8a">Data + synchronization together</text>
      <text x="300" y="86" style="font:700 9px 'JetBrains Mono',monospace;fill:#1e40af">→ DSMEM + cluster barrier (3.5× faster)</text>

      <!-- Decision 3 -->
      <rect x="10" y="102" width="520" height="28" rx="3" fill="#eff6ff" stroke="#1e40af" stroke-width="0.6"/>
      <text x="18" y="120" style="font:600 9px 'JetBrains Mono',monospace;fill:#1e3a8a">Inter-SM sync notification</text>
      <text x="300" y="120" style="font:700 9px 'JetBrains Mono',monospace;fill:#1e40af">→ barrier.cluster.relaxed (26× vs L2 flag)</text>

      <!-- Decision 4 -->
      <rect x="10" y="136" width="520" height="28" rx="3" fill="#eff6ff" stroke="#1e40af" stroke-width="0.6"/>
      <text x="18" y="154" style="font:600 9px 'JetBrains Mono',monospace;fill:#1e3a8a">Producer-consumer pipeline</text>
      <text x="300" y="154" style="font:700 9px 'JetBrains Mono',monospace;fill:#1e40af">→ st.async.shared::cluster + mbarrier</text>

      <!-- Decision 5 -->
      <rect x="10" y="170" width="520" height="28" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="0.6"/>
      <text x="18" y="188" style="font:600 9px 'JetBrains Mono',monospace;fill:#166534">Bulk operand tile loading (GEMM/Attn)</text>
      <text x="300" y="188" style="font:700 9px 'JetBrains Mono',monospace;fill:#16a34a">→ TMA via L2/GXBAR (BW-optimized)</text>

      <!-- Never -->
      <rect x="10" y="204" width="520" height="19" rx="2" fill="#fef2f2" stroke="#dc2626" stroke-width="0.4"/>
      <text x="18" y="216" style="font:700 8px 'JetBrains Mono',monospace;fill:#dc2626">NEVER: L2 acquire/release for inter-SM sync (26× slower than cluster barrier)</text>
    </g>

    <!-- Right: Key numbers -->
    <g transform="translate(580,44)">
      <rect x="0" y="0" width="406" height="230" rx="6" fill="#FFF7ED" stroke="#c2410c" stroke-width="0.8"/>
      <text x="10" y="18" style="font:700 10px 'JetBrains Mono',monospace;fill:#c2410c">Critical Parameters Summary</text>
      <line x1="10" y1="26" x2="396" y2="26" stroke="#fdba74" stroke-width="0.6"/>

      <text x="10" y="46" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">SM2SM (DSMEM) fabric:</text>
      <text x="10" y="62" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  Latency: 85 (sync) – 220 (read) cyc</text>
      <text x="10" y="78" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  BW: ~8.2 GB/s/CTA pair</text>
      <text x="10" y="94" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  Ordering: Per-pair FIFO, native barrier</text>
      <text x="10" y="110" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  Scaling: Linear with cluster size</text>

      <line x1="10" y1="120" x2="396" y2="120" stroke="#fdba74" stroke-width="0.6"/>
      <text x="10" y="140" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">GXBAR (L2) fabric:</text>
      <text x="10" y="156" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  Latency: 49.5 (4B cached) – 354 (RT) cyc</text>
      <text x="10" y="172" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  BW: 13,768 GB/s aggregate</text>
      <text x="10" y="188" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  Ordering: Full cache coherence (MEMBAR=286 cyc)</text>
      <text x="10" y="204" style="font:500 9px 'JetBrains Mono',monospace;fill:#374151">  Scaling: Constant (shared crossbar)</text>

      <line x1="10" y1="214" x2="396" y2="214" stroke="#fdba74" stroke-width="0.6"/>
    </g>
  </g>
</svg>
