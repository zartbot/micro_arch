<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 756" role="img" aria-label="6.1.5a Microarchitectural Analysis: The Multicast Emulation Mechanism">
  <defs>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5b6679"/>
    </marker>
  </defs>
  <rect width="1080" height="756" fill="#ffffff"/>
  <text x="36" y="32" style="font:600 14px 'Fraunces',serif;fill:#0b1220">6.1.5a Microarchitectural Analysis: The Multicast Emulation Mechanism</text>
  <text x="36" y="52" style="font:italic 11px 'Fraunces',serif;fill:#5b6679">Semantic visualization of measured microarchitectural behavior</text>

    <g transform="translate(40,86)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">TMA Multicast: Hardware vs Software Paths</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">SM_100 (Hardware multicast — GB100/GB102): · CTA 0: UTMALDG.1D.MC [desc], mask=0x3</text>
    </g>    <line x1="540" y1="150" x2="540" y2="172" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,176)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">TMA Engine → L2 Read (single) → LRC multicast table</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">▼                   ▼                   ▼ · CTA 0 smem          CTA 1 smem          CTA N smem</text>
    </g>    <line x1="540" y1="240" x2="540" y2="262" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,266)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">(via DMA)           (via DMA)           (via DMA)</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">Cost: 1 × TMA_latency (single L2 read, hardware distributes) · SM_120 (Software emulation — GB202):</text>
    </g>    <line x1="540" y1="330" x2="540" y2="352" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,356)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">CTA 0: CALL.ABS.NOINC (trap to firmware routine)</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">Firmware: for each target CTA in mask: · unicast TMA load → local smem</text>
    </g>    <line x1="540" y1="420" x2="540" y2="442" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,446)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">memcpy local smem → target CTA via DSMEM</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">Cost: K × (TMA_unicast + DSMEM_copy) where K = popcount(mask) · Measured emulation cost model:</text>
    </g>    <line x1="540" y1="510" x2="540" y2="532" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,536)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">Marginal cost: ~4,142 cyc/byte  (from linear regression)</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">Base overhead: ~97,000 cyc      (firmware dispatch + setup) · Why 4,142 cyc/byte (not ~0.1 cyc/byte for unicast TMA):</text>
    </g>    <line x1="540" y1="600" x2="540" y2="622" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,626)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">Each byte must traverse TWO data paths:</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">1. L2 → local smem via TMA unicast (~0.06 cyc/byte)</text>
    </g>
</svg>
