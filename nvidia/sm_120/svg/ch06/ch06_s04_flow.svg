      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">Step 3: SM-to-SM fabric transit      ~145 cyc (one-way visibility latency)</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">Step 4: Remote smem read             ~34 cyc  (target SM&#x27;s shared memory) · Step 5: Response return transit      ~34 cyc</text>
    </g>    <line x1="540" y1="330" x2="540" y2="352" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,356)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">Total estimated: 4 + 8 + 145 + 34 + 34 = 225 cyc ✓</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">The 145-cyc one-way visibility is the SM2SM fabric transit time. · This is CONSTANT regardless of:</text>
    </g>    <line x1="540" y1="420" x2="540" y2="442" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,446)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">- Cluster size (2, 4, or 8 CTAs): 0% variance (topology-invariant)</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">- Target distance (adjacent vs cross-GPC): identical · Implication: SM2SM is a dedicated point-to-point mesh, NOT a shar</text>
    </g>    <line x1="540" y1="510" x2="540" y2="532" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,536)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
