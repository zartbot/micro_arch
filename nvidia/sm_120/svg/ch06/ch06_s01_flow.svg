      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">MEMBAR.ALL.GPU       ~286 cyc   ← L2 coherence drain (GXBAR round-trip) · ERRBAR               ~1 cyc     ← Warp-level e</text>
    </g>    <line x1="540" y1="150" x2="540" y2="172" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,176)">
      <rect x="0" y="0" width="1000" height="64" rx="10" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">CGAERRBAR            ~1 cyc     ← Cluster-level error barrier</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">UCGABAR_ARV          ~40 cyc    ← CGA controller arrive notification · UCGABAR_WAIT         ~40 cyc    ← CGA controller </text>
    </g>    <line x1="540" y1="240" x2="540" y2="262" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,266)">
