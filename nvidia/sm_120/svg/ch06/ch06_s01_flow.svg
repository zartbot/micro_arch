      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">CCTL.IVALL           ~2 cyc     ← L1 cache invalidation (0 marginal)</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">Total:               ~371 cyc · Relaxed barrier.cluster SASS Decomposition</text>
    </g>    <line x1="540" y1="330" x2="540" y2="352" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
    <g transform="translate(40,356)">
