      <text x="20" y="22" style="font:600 12px 'Fraunces',serif;fill:#1e40af">UCGABAR_ARV          ~40 cyc    ← CGA controller arrive</text>
      <text x="20" y="44" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679">UCGABAR_WAIT         ~40 cyc    ← CGA controller wait · CCTL.IVALL           ~2 cyc     ← L1 invalidation</text>
    </g>    <line x1="540" y1="420" x2="540" y2="442" stroke="#5b6679" stroke-width="1.2" marker-end="url(#ar)"/>
