<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 576" role="img" aria-label="6.2.3a Microarchitectural Analysis: Cluster Barrier Hardware Decomposition">
