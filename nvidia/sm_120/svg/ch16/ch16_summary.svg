  <!-- ═══════════════ KEY DISCOVERIES PANEL ═══════════════ -->
  <rect x="36" y="556" width="500" height="190" rx="8" fill="#ffffff" stroke="#e6e4da"/>
  <text x="56" y="578" style="font:600 9px 'JetBrains Mono',monospace;letter-spacing:0.08em;fill:#1e40af">KEY ARCHITECTURAL DISCOVERIES</text>

  <text x="56" y="600" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220">L1: 89 KB default, fully associative (710+ way)</text>
  <text x="56" y="618" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220">L1 + Tex: 1:1 byte displacement (24KB tex = -24KB L1)</text>
  <text x="56" y="636" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220">Carveout: functional, 64+ KB smem disables L1</text>
  <text x="56" y="654" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220">FP64: 4 EU/SM (1 per-SMSP), 0.0625 DFMA/cyc/SM</text>
  <text x="56" y="672" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220">Scheduler: DEFER_BLOCKING + instant SB switch</text>
  <text x="56" y="690" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220">L2 hash: bit 10, period 8, 4.77x worst adversarial</text>
  <text x="56" y="708" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220">Power: clock-gated pipes, 0 ns startup latency</text>
  <text x="56" y="726" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220">Const cache: ~4-8 KB effective, separate from I$</text>

