  <circle cx="60" cy="796" r="3" fill="#6d28d9"/>
  <text x="72" y="800" style="font:500 11px 'IBM Plex Sans',sans-serif;fill:#2a3548">L1 capacity = 89 KB (not 48 or 96) — use this for ALL analytical models and roofline</text>
  <circle cx="60" cy="818" r="3" fill="#6d28d9"/>
  <text x="72" y="822" style="font:500 11px 'IBM Plex Sans',sans-serif;fill:#2a3548">GDDR7 is closed-page — no row-buffer hit benefit exists; "3x conflict" is 4-way bank group effect</text>
  <circle cx="60" cy="840" r="3" fill="#6d28d9"/>
  <text x="72" y="844" style="font:500 11px 'IBM Plex Sans',sans-serif;fill:#2a3548">FP64: 4 EU/SM confirmed — prior 2-EU reading was sparse-lane-mask dispatch artifact, not real sharing</text>
  <circle cx="60" cy="862" r="3" fill="#6d28d9"/>
  <text x="72" y="866" style="font:500 11px 'IBM Plex Sans',sans-serif;fill:#2a3548">Scheduler DEFER_BLOCKING: barrier-blocked warps never impede ready-warp dispatch (7 cyc barrier)</text>
  <circle cx="60" cy="884" r="3" fill="#6d28d9"/>
  <text x="72" y="888" style="font:500 11px 'IBM Plex Sans',sans-serif;fill:#2a3548">Power model: clock gating (not power gating) at pipe level — zero startup, FMA+TC co-issue = +0.004 W/SM</text>
  <circle cx="60" cy="906" r="3" fill="#6d28d9"/>
  <text x="72" y="910" style="font:500 11px 'IBM Plex Sans',sans-serif;fill:#2a3548">L2 XOR hash granularity = 1024B — power-of-2 strides always safe; worst adversarial only 4.77x (not 12x)</text>
