<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" role="img"
     aria-label="4.9 TensorCore Resource Cliff — log-scale penalty bars sorted by magnitude, ILP staircase, and design priority">
  <defs>
    <style><![CDATA[
      .eyebrow{font:600 11px "JetBrains Mono",monospace;letter-spacing:0.14em;text-transform:uppercase}
      .title  {font:500 18px "Fraunces",serif;fill:#0b1220;letter-spacing:-0.02em}
      .ttl    {font:600 11px "JetBrains Mono",monospace;letter-spacing:0.04em}
      .lbl    {font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .lbl-sm {font:500 9px "JetBrains Mono",monospace;fill:#5b6679;letter-spacing:0.03em;text-transform:uppercase}
      .val    {font:600 13px "Fraunces",serif;fill:#0b1220}
      .note   {font:500 10.5px "IBM Plex Sans",sans-serif;fill:#2a3548}
      .note-em{font:600 10.5px "IBM Plex Sans",sans-serif;fill:#e11d48}
      .note-gr{font:600 10.5px "IBM Plex Sans",sans-serif;fill:#16a34a}
      .cyc-val{font:500 9px "JetBrains Mono",monospace;fill:#5b6679}
      .bar-lbl{font:600 9px "JetBrains Mono",monospace;fill:#ffffff}
    ]]></style>
  </defs>

  <rect width="1080" height="720" fill="#fcfbf6"/>

  <!-- Header -->
  <g transform="translate(36,24)">
    <rect x="0" y="0" width="3" height="40" fill="#e11d48"/>
    <text x="14" y="14" class="eyebrow" fill="#e11d48">§4.9 · RESOURCE CLIFF ANALYSIS</text>
    <text x="14" y="36" class="title">Performance Penalty Map (Log Scale) — From +6% to 24.2×</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- LOG-SCALE HORIZONTAL BAR CHART -->
  <!-- X-axis: log10 scale, 1× to 25× -->
  <!-- Chart area: x=220 to x=920, width=700px -->
  <!-- log10(1)=0, log10(25)=1.398; scale = 700/1.398 = 500.7 px per log unit -->
  <!-- bar_width = log10(penalty) * 500.7 -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(36,78)">
    <text x="0" y="0" class="ttl" fill="#e11d48">PENALTY MAGNITUDE (LOG SCALE) — SORTED BY SEVERITY</text>

    <g transform="translate(0,18)">
      <rect x="0" y="0" width="1008" height="330" rx="10" fill="#ffffff" stroke="#e6e4da"/>

      <!-- X-axis grid lines and labels -->
      <!-- x_offset = 220; scale: log10(val)*500.7 -->
      <!-- 1× = 0px, 2× = 150.7px, 5× = 349.8px, 10× = 500.7px, 25× = 699.8px -->
      <line x1="220" y1="20" x2="220" y2="296" stroke="#d1d0c7" stroke-width="0.8"/>
      <text x="220" y="312" class="cyc-val" text-anchor="middle">1×</text>
      <line x1="371" y1="20" x2="371" y2="296" stroke="#f0efe8" stroke-width="0.5"/>
      <text x="371" y="312" class="cyc-val" text-anchor="middle">2×</text>
      <line x1="570" y1="20" x2="570" y2="296" stroke="#f0efe8" stroke-width="0.5"/>
      <text x="570" y="312" class="cyc-val" text-anchor="middle">5×</text>
      <line x1="721" y1="20" x2="721" y2="296" stroke="#f0efe8" stroke-width="0.5"/>
      <text x="721" y="312" class="cyc-val" text-anchor="middle">10×</text>
      <line x1="920" y1="20" x2="920" y2="296" stroke="#f0efe8" stroke-width="0.5"/>
      <text x="920" y="312" class="cyc-val" text-anchor="middle">25×</text>

      <!-- Row 1: INT4 emulation 24.19× (log10(24.19)=1.384 → 692px) -->
      <g transform="translate(0,22)">
        <text x="10" y="14" class="note">INT4 emulation</text>
        <text x="10" y="26" class="cyc-val">384 vs 15.88 cyc [case_79]</text>
        <rect x="220" y="2" width="692" height="24" rx="3" fill="#e11d48" opacity="0.7"/>
        <text x="230" y="18" class="bar-lbl">24.2×</text>
        <text x="922" y="18" class="val" fill="#e11d48">24.2×</text>
      </g>

      <!-- Row 2: Sparse w/o ordered_metadata 15.0× (log10(15)=1.176 → 588px) -->
      <g transform="translate(0,56)">
        <text x="10" y="14" class="note">Sparse (no ::ordered_meta)</text>
        <text x="10" y="26" class="cyc-val">16.25→243.79 cyc [S19/c13]</text>
        <rect x="220" y="2" width="588" height="24" rx="3" fill="#e11d48" opacity="0.6"/>
        <text x="230" y="18" class="bar-lbl">15.0×</text>
        <text x="818" y="18" class="val" fill="#e11d48">15.0×</text>
      </g>

      <!-- Row 3: Cold start 13.1× (log10(13.1)=1.117 → 559px) -->
      <g transform="translate(0,90)">
        <text x="10" y="14" class="note">TC cold start (power-gated)</text>
        <text x="10" y="26" class="cyc-val">29→~380 cyc [case_120]</text>
        <rect x="220" y="2" width="559" height="24" rx="3" fill="#e11d48" opacity="0.5"/>
        <text x="230" y="18" class="bar-lbl">13.1×</text>
        <text x="789" y="18" class="val" fill="#e11d48">13.1×</text>
      </g>

      <!-- Row 4: ILP 1→2 gain 1.71× (log10(1.71)=0.233 → 117px) — shown as GAIN -->
      <g transform="translate(0,130)">
        <text x="10" y="14" class="note">ILP 1→2 (pipeline overlap)</text>
        <text x="10" y="26" class="cyc-val">28.78→16.87 cyc [case_8]</text>
        <rect x="220" y="2" width="117" height="24" rx="3" fill="#16a34a" opacity="0.6"/>
        <text x="230" y="18" class="bar-lbl">1.71× gain</text>
        <text x="345" y="18" class="val" fill="#16a34a">+71%</text>
      </g>

      <!-- Row 5: ILP 2→4 gain 1.06× (log10(1.06)=0.025 → 13px) -->
      <g transform="translate(0,160)">
        <text x="10" y="14" class="note">ILP 2→4 (bubble fill)</text>
        <text x="10" y="26" class="cyc-val">16.87→15.88 cyc [case_8]</text>
        <rect x="220" y="2" width="13" height="24" rx="3" fill="#16a34a" opacity="0.4"/>
        <text x="240" y="18" class="val" fill="#16a34a">+6%</text>
      </g>

      <!-- Row 6: QMMA.SF co-issue -21pp (penalty ~1.42× effective; log10(1.42)=0.152 → 76px) -->
      <g transform="translate(0,194)">
        <text x="10" y="14" class="note">QMMA.SF co-issue reduction</text>
        <text x="10" y="26" class="cyc-val">93.6%→50.7% FFMA [case_66]</text>
        <rect x="220" y="2" width="76" height="24" rx="3" fill="#f59e0b" opacity="0.5"/>
        <text x="230" y="18" style="font:600 9px 'JetBrains Mono',monospace;fill:#5b3300">-21pp</text>
        <text x="304" y="18" class="val" fill="#92400e">1.42×</text>
      </g>

      <!-- Row 7: Register spill +12% (1.12×; log10(1.12)=0.049 → 25px) -->
      <g transform="translate(0,224)">
        <text x="10" y="14" class="note">Register spill onset</text>
        <text x="10" y="26" class="cyc-val">15.99→17.87 cyc [case_5]</text>
        <rect x="220" y="2" width="25" height="24" rx="3" fill="#f59e0b" opacity="0.4"/>
        <text x="252" y="18" class="val" fill="#92400e">+12%</text>
      </g>

      <!-- Row 8: Cross-format switch +6% (1.06×; log10(1.06)=0.025 → 13px) -->
      <g transform="translate(0,254)">
        <text x="10" y="14" class="note">OMMA↔QMMA format switch</text>
        <text x="10" y="26" class="cyc-val">15.59→16.53 cyc [case_62]</text>
        <rect x="220" y="2" width="13" height="24" rx="3" fill="#f59e0b" opacity="0.3"/>
        <text x="240" y="18" class="val" fill="#92400e">+6%</text>
      </g>

      <!-- Row 9-11: Zero-cost (no bar) -->
      <g transform="translate(0,284)">
        <text x="10" y="14" class="note-gr">f16/f32 accum = 0 · Scale 16↔128 = 0 · Block-scale = 0</text>
        <text x="500" y="14" class="cyc-val">[case_181, case_170, case_48-57] — choose freely, zero throughput impact</text>
      </g>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ILP STAIRCASE MINI-CHART -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(36,434)">
    <text x="0" y="10" class="ttl" fill="#16a34a">ILP STAIRCASE: THE UNIQUE "GAIN CLIFF" (Case 8)</text>

    <g transform="translate(0,18)">
      <rect x="0" y="0" width="1008" height="100" rx="10" fill="#ffffff" stroke="#e6e4da"/>

      <!-- Staircase steps -->
      <g transform="translate(60,16)">
        <!-- ILP=1: 28.78 cyc (high, latency-bound) -->
        <rect x="0" y="0" width="180" height="30" rx="4" fill="#e11d48" opacity="0.15"/>
        <text x="8" y="14" class="lbl-sm">ILP=1</text>
        <text x="8" y="26" class="cyc-val">28.78 cyc/mma (latency-bound)</text>

        <!-- Arrow down -->
        <text x="190" y="20" class="note-gr">→</text>

        <!-- ILP=2: 16.87 cyc -->
        <rect x="210" y="14" width="180" height="30" rx="4" fill="#f59e0b" opacity="0.15"/>
        <text x="218" y="28" class="lbl-sm">ILP=2</text>
        <text x="218" y="40" class="cyc-val">16.87 cyc (1.71×, 94% utilized)</text>

        <text x="400" y="34" class="note-gr">→</text>

        <!-- ILP=4: 15.88 cyc (saturated) -->
        <rect x="420" y="20" width="180" height="30" rx="4" fill="#16a34a" opacity="0.15"/>
        <text x="428" y="34" class="lbl-sm">ILP=4 (SATURATED)</text>
        <text x="428" y="46" class="cyc-val">15.88 cyc (1.81×, 100%)</text>

        <text x="610" y="40" class="lbl">→</text>

        <!-- ILP=8: same -->
        <rect x="630" y="20" width="200" height="30" rx="4" fill="#f9f8f4" stroke="#d1d0c7" stroke-width="0.6"/>
        <text x="638" y="34" class="lbl-sm">ILP=8</text>
        <text x="638" y="46" class="cyc-val">15.88 cyc (0% gain → 2 slots only)</text>
      </g>

      <!-- Summary line -->
      <g transform="translate(60,75)">
        <text x="0" y="0" class="note">Pipeline depth = 29/15.88 = <tspan style="font-weight:700;fill:#16a34a">1.81</tspan> → 2 independent chains capture 94%; 4 chains saturate completely.</text>
        <text x="0" y="16" class="note">HMMA and QMMA show <tspan style="font-weight:700">identical</tspan> ILP scaling (format-agnostic pipeline structure).</text>
      </g>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- DESIGN PRIORITY -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(36,558)">
    <rect x="0" y="0" width="1008" height="138" rx="10" fill="#FEF3C7" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="20" y="20" class="ttl" fill="#92400e">KERNEL DESIGN PRIORITY (ordered by impact)</text>

    <g transform="translate(20,38)">
      <text x="0" y="0" class="note-em">Priority 1 — Eliminate catastrophic cliffs (design-time):</text>
      <text x="0" y="16" class="note">Use FP4 E2M1 instead of INT4 (24× fix) · Always use ::ordered_metadata for sparse (15× fix) · Pre-warm TC in prologue (13× fix)</text>

      <text x="0" y="40" class="note" style="font-weight:600;fill:#92400e">Priority 2 — Optimize gradient cliffs (compile-time):</text>
      <text x="0" y="56" class="note">Maintain ILP≥2 (captures 94% of peak) · Stay within 252 regs (avoid 12% spill) · Batch same-format MMAs (avoid 6% switch)</text>

      <text x="0" y="80" class="note-gr">Priority 3 — Free parameters (choose based on accuracy, not perf):</text>
      <text x="0" y="96" class="note">f16/f32 accumulator width · Scale granularity (16 or 128) · Block-scale vs dense MMA · Sparse metadata decode</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(36,700)">
    <line x1="0" y1="0" x2="1008" y2="0" stroke="#e6e4da" stroke-width="0.8"/>
    <text x="0" y="14" class="cyc-val">Source: [S9/case_5,8,62,66,79,120,170,181] · [S19/case_13] · All values min over 2000 trials</text>
    <text x="850" y="14" class="cyc-val">SM_120 · 2026</text>
  </g>
</svg>
