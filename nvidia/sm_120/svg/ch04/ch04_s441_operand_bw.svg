<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" role="img"
     aria-label="4.4.1 SM_120 TC Operand Bandwidth Analysis — per-MMA data volume, RF↔TC bandwidth derivation, and per-SM aggregate">
  <defs>
    <style><![CDATA[
      .eyebrow{font:600 11px "JetBrains Mono",monospace;letter-spacing:0.16em;text-transform:uppercase}
      .title  {font:500 20px "Fraunces",serif;fill:#0b1220;letter-spacing:-0.02em}
      .sub    {font:italic 12px "Fraunces",serif;fill:#5b6679}
      .ttl    {font:600 12px "JetBrains Mono",monospace;letter-spacing:0.04em}
      .lbl    {font:500 11px "JetBrains Mono",monospace;fill:#5b6679}
      .lbl-sm {font:500 10px "JetBrains Mono",monospace;fill:#5b6679;letter-spacing:0.04em;text-transform:uppercase}
      .val    {font:600 20px "Fraunces",serif;fill:#0b1220}
      .val-lg {font:600 26px "Fraunces",serif;fill:#0b1220}
      .val-sm {font:600 14px "Fraunces",serif;fill:#0b1220}
      .note   {font:500 11px "IBM Plex Sans",sans-serif;fill:#2a3548}
      .note-em{font:600 11px "IBM Plex Sans",sans-serif;fill:#e11d48}
      .note-bl{font:600 11px "IBM Plex Sans",sans-serif;fill:#2563eb}
      .cyc-lbl{font:600 10px "JetBrains Mono",monospace;fill:#0b1220}
      .cyc-val{font:500 9px "JetBrains Mono",monospace;fill:#5b6679}
      .calc   {font:500 11px "JetBrains Mono",monospace;fill:#2a3548}
      .calc-em{font:600 11px "JetBrains Mono",monospace;fill:#e11d48}
    ]]></style>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5b6679"/>
    </marker>
    <marker id="ar-red" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#e11d48"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1080" height="720" fill="#fcfbf6"/>

  <!-- Header -->
  <g transform="translate(36,28)">
    <rect x="0" y="0" width="3" height="48" fill="#e11d48"/>
    <text x="16" y="16" class="eyebrow" fill="#e11d48">§4.4.1 · OPERAND BANDWIDTH ANALYSIS</text>
    <text x="16" y="40" class="title">TC Operand Bandwidth: Per-MMA Data Volume &amp; RF↔TC Throughput</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SECTION 1: Per-MMA Operand Breakdown (visual stacked bar) -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(36,96)">
    <text x="0" y="0" class="ttl" fill="#e11d48">PER MMA (m16n8k16) · OPERAND DATA VOLUME</text>

    <!-- Visual stacked bar showing A/B/C/D proportions -->
    <g transform="translate(0,20)">
      <!-- A operand bar -->
      <rect x="0" y="0" width="314" height="44" rx="6" fill="#e11d48" opacity="0.12" stroke="#e11d48" stroke-width="1"/>
      <text x="12" y="18" class="ttl" fill="#e11d48">A operand</text>
      <text x="12" y="36" class="calc">4 regs × 32 threads × 4 B =</text>
      <text x="260" y="36" class="val-sm" fill="#e11d48">512 B</text>
      <!-- Width proportional: 512/1792 × 700 ≈ 200 -->
      <rect x="320" y="10" width="200" height="24" rx="3" fill="#e11d48" opacity="0.3"/>
      <text x="330" y="27" class="cyc-lbl" fill="#fff">512 B (28.6%)</text>

      <!-- B operand bar -->
      <rect x="0" y="54" width="314" height="44" rx="6" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="1"/>
      <text x="12" y="72" class="ttl" fill="#2563eb">B operand</text>
      <text x="12" y="90" class="calc">2 regs × 32 threads × 4 B =</text>
      <text x="260" y="90" class="val-sm" fill="#2563eb">256 B</text>
      <rect x="320" y="64" width="100" height="24" rx="3" fill="#2563eb" opacity="0.3"/>
      <text x="330" y="81" class="cyc-lbl" fill="#fff">256 B (14.3%)</text>

      <!-- C operand bar (accumulator input) -->
      <rect x="0" y="108" width="314" height="44" rx="6" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
      <text x="12" y="126" class="ttl" fill="#92400e">C accumulator (input)</text>
      <text x="12" y="144" class="calc">4 regs × 32 threads × 4 B =</text>
      <text x="260" y="144" class="val-sm" fill="#92400e">512 B</text>
      <rect x="320" y="118" width="200" height="24" rx="3" fill="#f59e0b" opacity="0.35"/>
      <text x="330" y="135" class="cyc-lbl">512 B (28.6%)</text>

      <!-- D output bar -->
      <rect x="0" y="162" width="314" height="44" rx="6" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1"/>
      <text x="12" y="180" class="ttl" fill="#16a34a">D accumulator (output)</text>
      <text x="12" y="198" class="calc">4 regs × 32 threads × 4 B =</text>
      <text x="260" y="198" class="val-sm" fill="#16a34a">512 B</text>
      <rect x="320" y="172" width="200" height="24" rx="3" fill="#16a34a" opacity="0.25"/>
      <text x="330" y="189" class="cyc-lbl">512 B (28.6%)</text>
    </g>

    <!-- Totals summary (right side) -->
    <g transform="translate(560,20)">
      <rect x="0" y="0" width="440" height="206" rx="10" fill="#ffffff" stroke="#e6e4da" stroke-width="1.2"/>
      <rect x="0" y="0" width="440" height="28" rx="10" fill="#FFF1F2"/>
      <text x="16" y="18" class="ttl" fill="#e11d48">TOTALS PER MMA</text>

      <g transform="translate(16,44)">
        <text x="0" y="0" class="lbl-sm">Input (A + B + C)</text>
        <text x="0" y="24" class="val-lg" fill="#e11d48">1,280 B</text>
        <text x="140" y="24" class="lbl">per warp per MMA</text>
      </g>

      <g transform="translate(16,92)">
        <text x="0" y="0" class="lbl-sm">Output (D)</text>
        <text x="0" y="24" class="val">512 B</text>
        <text x="100" y="24" class="lbl">per warp per MMA</text>
      </g>

      <line x1="16" y1="128" x2="424" y2="128" stroke="#e6e4da" stroke-width="0.8"/>

      <g transform="translate(16,140)">
        <text x="0" y="0" class="lbl-sm">Total RF↔TC traffic</text>
        <text x="0" y="24" class="val">1,792 B</text>
        <text x="120" y="24" class="lbl">per warp per MMA</text>
        <text x="0" y="44" class="cyc-val">= 10 input regs + 4 output regs = 14 regs × 4B × 32 threads</text>
      </g>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SECTION 2: Bandwidth Derivation -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(36,352)">
    <text x="0" y="0" class="ttl" fill="#e11d48">BANDWIDTH DERIVATION · AT 15.94 cyc/MMA THROUGHPUT</text>

    <g transform="translate(0,20)">
      <!-- Input BW -->
      <rect x="0" y="0" width="320" height="80" rx="8" fill="#ffffff" stroke="#e11d48" stroke-width="1.2"/>
      <rect x="0" y="0" width="320" height="3" rx="8" fill="#e11d48"/>
      <text x="14" y="22" class="lbl-sm">Input bandwidth (RF → TC)</text>
      <text x="14" y="46" class="calc">1,280 B ÷ 15.94 cyc =</text>
      <text x="14" y="68" class="val" fill="#e11d48">80.3 B/cyc</text>
      <text x="148" y="68" class="note-em">MEASURED ✓</text>

      <!-- Output BW -->
      <rect x="340" y="0" width="300" height="80" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
      <rect x="340" y="0" width="300" height="3" rx="8" fill="#16a34a"/>
      <text x="354" y="22" class="lbl-sm">Output bandwidth (TC → RF)</text>
      <text x="354" y="46" class="calc">512 B ÷ 15.94 cyc =</text>
      <text x="354" y="68" class="val">32.1 B/cyc</text>

      <!-- Total BW -->
      <rect x="660" y="0" width="350" height="80" rx="8" fill="#ffffff" stroke="#9333ea" stroke-width="1"/>
      <rect x="660" y="0" width="350" height="3" rx="8" fill="#9333ea"/>
      <text x="674" y="22" class="lbl-sm">Total bidirectional RF↔TC</text>
      <text x="674" y="46" class="calc">1,792 B ÷ 15.94 cyc =</text>
      <text x="674" y="68" class="val">112.4 B/cyc</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SECTION 3: Scaling to SM level -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(36,478)">
    <text x="0" y="0" class="ttl" fill="#e11d48">SCALING · SINGLE WARP → FULL SM</text>

    <g transform="translate(0,20)">
      <!-- Single warp -->
      <rect x="0" y="0" width="320" height="100" rx="10" fill="#EFF6FF" stroke="#2563eb" stroke-width="1"/>
      <text x="14" y="22" class="lbl-sm">1 Warp (1 SMSP)</text>
      <text x="14" y="50" class="val" fill="#2563eb">~267 GB/s</text>
      <text x="14" y="70" class="calc">= 112.4 B/cyc × 2.377 GHz</text>
      <text x="14" y="88" class="cyc-val">RF↔TC bandwidth per single warp at saturation</text>

      <!-- Arrow -->
      <line x1="330" y1="50" x2="380" y2="50" stroke="#5b6679" stroke-width="1.5" marker-end="url(#ar)"/>
      <text x="340" y="42" class="cyc-val">× 4 SMSP</text>

      <!-- Full SM -->
      <rect x="400" y="0" width="340" height="100" rx="10" fill="#FFF1F2" stroke="#e11d48" stroke-width="1.2"/>
      <text x="414" y="22" class="lbl-sm">4 Warps (Full SM · 4 SMSPs)</text>
      <text x="414" y="50" class="val-lg" fill="#e11d48">~1,068 GB/s</text>
      <text x="414" y="72" class="calc">= 4 × 267 GB/s</text>
      <text x="414" y="90" class="note-em">Aggregate RF↔TC bandwidth per SM</text>

      <!-- Context box -->
      <rect x="760" y="0" width="250" height="100" rx="10" fill="#ffffff" stroke="#e6e4da"/>
      <text x="774" y="22" class="lbl-sm">Context</text>
      <text x="774" y="44" class="note">HBM3e DRAM: 1,231 GB/s</text>
      <text x="774" y="62" class="note">RF↔TC per SM: 1,068 GB/s</text>
      <text x="774" y="82" class="note-em">RF↔TC ≈ 87% of DRAM BW</text>
      <text x="774" y="96" class="cyc-val">...but for a SINGLE SM out of 110</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SECTION 4: Key insight callout -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(36,618)">
    <rect x="0" y="0" width="1008" height="70" rx="10" fill="#FEF3C7" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="20" y="22" class="ttl" fill="#92400e">KEY INSIGHT: PERFECT BALANCE</text>
    <text x="20" y="44" class="note">The measured input bandwidth (80.3 B/cyc from Case 27) <tspan style="font-weight:700;fill:#e11d48">exactly matches</tspan> the calculated consumption rate (1280 B / 15.94 cyc = 80.3 B/cyc).</text>
    <text x="20" y="62" class="note">This proves RF read port bandwidth and TC execution rate are <tspan style="font-weight:700;fill:#e11d48">perfectly co-designed</tspan> — neither has surplus capacity. The TC is not faster than operand delivery.</text>
  </g>

  <!-- Footer -->
  <g transform="translate(36,700)">
    <line x1="0" y1="0" x2="1008" y2="0" stroke="#e6e4da" stroke-width="0.8"/>
    <text x="0" y="14" class="cyc-val">Source: [S9/case_27] RF→TC input rate · [S9/case_8] 15.94 cyc/mma throughput · Clock: 2.377 GHz (locked)</text>
    <text x="800" y="14" class="cyc-val">SM_120 / GB202 · 2026</text>
  </g>
</svg>
