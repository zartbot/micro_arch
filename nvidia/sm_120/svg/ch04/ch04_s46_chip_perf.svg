<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 680" role="img"
     aria-label="4.6 Chip-Level TC Performance — theoretical peak vs production library TFLOPS">
  <defs>
    <style><![CDATA[
      .eyebrow{font:600 11px "JetBrains Mono",monospace;letter-spacing:0.14em;text-transform:uppercase}
      .title  {font:500 18px "Fraunces",serif;fill:#0b1220;letter-spacing:-0.02em}
      .ttl    {font:600 11px "JetBrains Mono",monospace;letter-spacing:0.04em}
      .lbl    {font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .lbl-sm {font:500 9px "JetBrains Mono",monospace;fill:#5b6679;letter-spacing:0.03em;text-transform:uppercase}
      .val    {font:600 16px "Fraunces",serif;fill:#0b1220}
      .note   {font:500 10.5px "IBM Plex Sans",sans-serif;fill:#2a3548}
      .note-em{font:600 10.5px "IBM Plex Sans",sans-serif;fill:#e11d48}
      .note-gr{font:600 10.5px "IBM Plex Sans",sans-serif;fill:#16a34a}
      .cyc-val{font:500 9px "JetBrains Mono",monospace;fill:#5b6679}
    ]]></style>
  </defs>

  <rect width="1080" height="680" fill="#fcfbf6"/>

  <!-- Header -->
  <g transform="translate(36,24)">
    <rect x="0" y="0" width="3" height="40" fill="#e11d48"/>
    <text x="14" y="14" class="eyebrow" fill="#e11d48">§4.6 · CHIP-LEVEL PERFORMANCE ANALYSIS</text>
    <text x="14" y="36" class="title">Theoretical Peak vs Production Library: Efficiency &amp; Bottleneck Map</text>
  </g>

  <!-- Chart area -->
  <g transform="translate(36,78)">
    <text x="0" y="0" class="ttl" fill="#e11d48">TFLOPS COMPARISON (110 SM @ 2.377 GHz) · Y-max = 1500 TFLOPS</text>

    <g transform="translate(0,20)">
      <rect x="0" y="0" width="1008" height="290" rx="10" fill="#ffffff" stroke="#e6e4da"/>

      <!-- Legend -->
      <g transform="translate(800,10)">
        <rect x="0" y="0" width="14" height="12" rx="2" fill="#5b6679" opacity="0.25"/>
        <text x="20" y="10" class="cyc-val">Theoretical (2× dense for sparse)</text>
        <rect x="0" y="16" width="14" height="12" rx="2" fill="#2563eb" opacity="0.6"/>
        <text x="20" y="26" class="cyc-val">cuBLAS peak</text>
        <rect x="0" y="32" width="14" height="12" rx="2" fill="#e11d48" opacity="0.5"/>
        <text x="20" y="42" class="cyc-val">CUTLASS peak</text>
        <rect x="0" y="48" width="14" height="12" rx="2" fill="#16a34a" opacity="0.5"/>
        <text x="20" y="58" class="cyc-val">Hand-tuned sustained</text>
      </g>

      <!-- Y-axis: chart area y=34(top=1500) to y=252(bottom=0), height=218px -->
      <!-- Scale: px_height = value/1500 * 218; bar_y = 252 - px_height -->
      <text x="8" y="38" class="cyc-val">1500</text>
      <line x1="36" y1="34" x2="780" y2="34" stroke="#f0efe8" stroke-width="0.5"/>
      <text x="8" y="79" class="cyc-val">1200</text>
      <line x1="36" y1="77" x2="780" y2="77" stroke="#f0efe8" stroke-width="0.5"/>
      <text x="8" y="121" class="cyc-val">900</text>
      <line x1="36" y1="119" x2="780" y2="119" stroke="#f0efe8" stroke-width="0.5"/>
      <text x="8" y="163" class="cyc-val">600</text>
      <line x1="36" y1="161" x2="780" y2="161" stroke="#f0efe8" stroke-width="0.5"/>
      <text x="8" y="206" class="cyc-val">300</text>
      <line x1="36" y1="204" x2="780" y2="204" stroke="#f0efe8" stroke-width="0.5"/>
      <text x="8" y="255" class="cyc-val">0</text>
      <line x1="36" y1="252" x2="780" y2="252" stroke="#d1d0c7" stroke-width="0.8"/>

      <!-- BF16: Theory=268, cuBLAS=254, CUTLASS=262 -->
      <!-- h=268/1500*218=39, y=252-39=213 -->
      <g transform="translate(55,0)">
        <rect x="0" y="213" width="24" height="39" rx="2" fill="#5b6679" opacity="0.25"/>
        <rect x="27" y="215" width="24" height="37" rx="2" fill="#2563eb" opacity="0.6"/>
        <rect x="54" y="214" width="24" height="38" rx="2" fill="#e11d48" opacity="0.5"/>
        <text x="0" y="208" class="cyc-val">268</text>
        <text x="27" y="208" class="cyc-val" fill="#2563eb">254</text>
        <text x="54" y="208" class="cyc-val" fill="#e11d48">262</text>
        <text x="16" y="270" class="lbl-sm">BF16</text>
        <text x="12" y="282" class="cyc-val">97.9%</text>
      </g>

      <!-- FP8: Theory=536, cuBLAS=551, CUTLASS=504 -->
      <!-- h=536/1500*218=78, y=174; 551→80,y=172; 504→73,y=179 -->
      <g transform="translate(165,0)">
        <rect x="0" y="174" width="24" height="78" rx="2" fill="#5b6679" opacity="0.25"/>
        <rect x="27" y="172" width="24" height="80" rx="2" fill="#2563eb" opacity="0.6"/>
        <rect x="54" y="179" width="24" height="73" rx="2" fill="#e11d48" opacity="0.5"/>
        <text x="0" y="168" class="cyc-val">536</text>
        <text x="27" y="166" class="cyc-val" fill="#2563eb">551</text>
        <text x="54" y="174" class="cyc-val" fill="#e11d48">504</text>
        <text x="20" y="270" class="lbl-sm">FP8</text>
        <text x="12" y="282" class="cyc-val">102%!</text>
      </g>

      <!-- MXFP4: Theory=1070, cuBLAS=1042, CUTLASS=1077, sustained=1069 -->
      <!-- h=1070/1500*218=155, y=97 -->
      <g transform="translate(285,0)">
        <rect x="0" y="97" width="22" height="155" rx="2" fill="#5b6679" opacity="0.25"/>
        <rect x="25" y="101" width="22" height="151" rx="2" fill="#2563eb" opacity="0.6"/>
        <rect x="50" y="95" width="22" height="157" rx="2" fill="#e11d48" opacity="0.5"/>
        <rect x="75" y="97" width="22" height="155" rx="2" fill="#16a34a" opacity="0.5"/>
        <text x="-2" y="91" class="cyc-val">1070</text>
        <text x="23" y="96" class="cyc-val" fill="#2563eb">1042</text>
        <text x="48" y="89" class="cyc-val" fill="#e11d48">1077</text>
        <text x="73" y="91" class="cyc-val" fill="#16a34a">1069</text>
        <text x="24" y="270" class="lbl-sm">MXFP4</text>
        <text x="20" y="282" class="cyc-val">99.0%</text>
      </g>

      <!-- NVFP4: Theory=1070, CUTLASS=1012 -->
      <!-- h=1070→155,y=97; 1012→147,y=105 -->
      <g transform="translate(415,0)">
        <rect x="0" y="97" width="24" height="155" rx="2" fill="#5b6679" opacity="0.25"/>
        <rect x="27" y="105" width="24" height="147" rx="2" fill="#e11d48" opacity="0.5"/>
        <text x="0" y="91" class="cyc-val">1070</text>
        <text x="27" y="100" class="cyc-val" fill="#e11d48">1012</text>
        <text x="6" y="270" class="lbl-sm">NVFP4</text>
        <text x="4" y="282" class="cyc-val">94.5%</text>
      </g>

      <!-- Sparse FP8: Theory=1072 (2×536), CUTLASS=682 -->
      <!-- h=1072→156,y=96; 682→99,y=153 -->
      <g transform="translate(520,0)">
        <rect x="0" y="96" width="24" height="156" rx="2" fill="#5b6679" opacity="0.2"/>
        <rect x="27" y="153" width="24" height="99" rx="2" fill="#e11d48" opacity="0.5"/>
        <text x="0" y="90" class="cyc-val">1072</text>
        <text x="27" y="148" class="cyc-val" fill="#e11d48">682</text>
        <text x="2" y="270" class="lbl-sm">SP FP8</text>
        <text x="4" y="282" class="cyc-val">63.6%</text>
      </g>

      <!-- Sparse MXFP4: Theory=2140 (2×1070), CUTLASS=1318 -->
      <!-- 2140 exceeds Y-max 1500 → clip at top y=34, full height=218 -->
      <!-- 1318→192, y=60 -->
      <g transform="translate(625,0)">
        <rect x="0" y="34" width="24" height="218" rx="2" fill="#5b6679" opacity="0.15"/>
        <line x1="0" y1="32" x2="24" y2="32" stroke="#5b6679" stroke-width="2" stroke-dasharray="3,2"/>
        <text x="-4" y="26" class="cyc-val" fill="#5b6679">2140↑</text>
        <rect x="27" y="60" width="24" height="192" rx="2" fill="#e11d48" opacity="0.5"/>
        <text x="27" y="54" class="cyc-val" fill="#e11d48">1318</text>
        <text x="2" y="270" class="lbl-sm">SP MX4</text>
        <text x="4" y="282" class="cyc-val">61.7%</text>
      </g>
    </g>
  </g>

  <!-- Efficiency gap analysis -->
  <g transform="translate(36,410)">
    <text x="0" y="0" class="ttl" fill="#e11d48">EFFICIENCY GAP ANALYSIS: WHERE THE TFLOPS ARE LOST</text>

    <g transform="translate(0,20)">
      <rect x="0" y="0" width="1008" height="136" rx="10" fill="#ffffff" stroke="#e6e4da"/>

      <g transform="translate(16,14)">
        <rect x="0" y="0" width="300" height="108" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="0.8"/>
        <text x="12" y="16" class="ttl" fill="#16a34a">HIGH EFFICIENCY (94–102%)</text>
        <text x="12" y="36" class="note">cuBLAS FP8: 551 / 536 = 102%*</text>
        <text x="12" y="52" class="note">CUTLASS MXFP4: 1077 / 1070 = 100.6%</text>
        <text x="12" y="68" class="note">CUTLASS BF16: 262 / 268 = 97.9%</text>
        <text x="12" y="84" class="note">Grouped FP8: 521 / 536 = 97.3%</text>
        <text x="12" y="102" class="cyc-val">* &gt;100% due to clock boost during burst</text>
      </g>

      <g transform="translate(336,14)">
        <rect x="0" y="0" width="320" height="108" rx="8" fill="#FEF3C7" stroke="#f59e0b" stroke-width="0.8"/>
        <text x="12" y="16" class="ttl" fill="#92400e">MEDIUM EFFICIENCY (81–95%)</text>
        <text x="12" y="36" class="note">CUTLASS FP8 blockwise: 504 / 536 = 94.1%</text>
        <text x="12" y="52" class="note">CUTLASS NVFP4: 1012 / 1070 = 94.5%</text>
        <text x="12" y="68" class="note">Grouped NVFP4: 866 / 1070 = 81%</text>
        <text x="12" y="88" class="note-em">Bottleneck: epilogue overhead + tile</text>
        <text x="12" y="102" class="note-em">quantization + grouped scheduling</text>
      </g>

      <g transform="translate(676,14)">
        <rect x="0" y="0" width="312" height="108" rx="8" fill="#FFF1F2" stroke="#e11d48" stroke-width="0.8"/>
        <text x="12" y="16" class="ttl" fill="#e11d48">LOW EFFICIENCY (&lt; 70%)</text>
        <text x="12" y="36" class="note">Sparse FP8: 682 / 1072 = 63.6%</text>
        <text x="12" y="52" class="note">Sparse MXFP4: 1318 / 2140 = 61.7%</text>
        <text x="12" y="72" class="note-em">Bottleneck: K=256 alignment tax</text>
        <text x="12" y="88" class="note-em">+ metadata smem BW + load imbalance</text>
        <text x="12" y="102" class="cyc-val">Sparse 2:4 structural constraint limits tile sizes</text>
      </g>
    </g>
  </g>

  <!-- Key insight -->
  <g transform="translate(36,586)">
    <rect x="0" y="0" width="1008" height="62" rx="10" fill="#FEF3C7" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="20" y="18" class="ttl" fill="#92400e">KEY FINDING: SM_120 TC IS A MATURE, PRODUCTION-VERIFIED ENGINE</text>
    <text x="20" y="38" class="note">Dense formats (BF16/FP8/MXFP4) achieve 94–102% of per-SM peaks at chip level — the 4.4× data starvation is fully mitigated by SW pipelining.</text>
    <text x="20" y="54" class="note">The only efficiency gaps are in sparse workloads (alignment constraints, 61–64%) and grouped GEMM NVFP4 (scheduling overhead, 81%).</text>
  </g>

  <!-- Footer -->
  <g transform="translate(36,662)">
    <line x1="0" y1="0" x2="1008" y2="0" stroke="#e6e4da" stroke-width="0.8"/>
    <text x="0" y="14" class="cyc-val">Source: [S9/case_127-145] · Sparse theory = 2× dense measured peak · Clock: 2.377 GHz locked</text>
    <text x="850" y="14" class="cyc-val">SM_120 · 2026</text>
  </g>
</svg>
