<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 640" role="img"
     aria-label="4.5.2 TC Cold-Start Model — warm path vs cold path timing, power gating evidence">
  <defs>
    <style><![CDATA[
      .eyebrow{font:600 11px "JetBrains Mono",monospace;letter-spacing:0.14em;text-transform:uppercase}
      .title  {font:500 19px "Fraunces",serif;fill:#0b1220;letter-spacing:-0.02em}
      .ttl    {font:600 11px "JetBrains Mono",monospace;letter-spacing:0.04em}
      .lbl    {font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .lbl-sm {font:500 9px "JetBrains Mono",monospace;fill:#5b6679;letter-spacing:0.03em;text-transform:uppercase}
      .val    {font:600 18px "Fraunces",serif;fill:#0b1220}
      .val-sm {font:600 13px "Fraunces",serif;fill:#0b1220}
      .note   {font:500 10.5px "IBM Plex Sans",sans-serif;fill:#2a3548}
      .note-em{font:600 10.5px "IBM Plex Sans",sans-serif;fill:#e11d48}
      .note-gr{font:600 10.5px "IBM Plex Sans",sans-serif;fill:#16a34a}
      .cyc-val{font:500 9px "JetBrains Mono",monospace;fill:#5b6679}
      .cyc-lbl{font:600 10px "JetBrains Mono",monospace;fill:#0b1220}
    ]]></style>
    <marker id="ar" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6679"/>
    </marker>
  </defs>

  <rect width="1080" height="640" fill="#fcfbf6"/>

  <!-- Header -->
  <g transform="translate(36,24)">
    <rect x="0" y="0" width="3" height="44" fill="#e11d48"/>
    <text x="14" y="14" class="eyebrow" fill="#e11d48">§4.5.2 · TC COLD-START ARCHITECTURE</text>
    <text x="14" y="38" class="title">Power Gating Model: Warm Path vs Cold Path</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SECTION 1: Warm vs Cold path timeline comparison -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(36,84)">
    <text x="0" y="0" class="ttl" fill="#e11d48">TIMING COMPARISON</text>

    <!-- Warm Path -->
    <g transform="translate(0,22)">
      <rect x="0" y="0" width="1008" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
      <text x="16" y="18" class="ttl" fill="#16a34a">WARM PATH (TC recently active)</text>

      <!-- Timeline -->
      <g transform="translate(16,34)">
        <text x="0" y="0" class="lbl-sm">Issue</text>
        <line x1="36" y1="-3" x2="70" y2="-3" stroke="#16a34a" stroke-width="1.2" marker-end="url(#ar)"/>

        <rect x="74" y="-12" width="180" height="24" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="0.8"/>
        <text x="84" y="4" class="cyc-lbl" fill="#16a34a">Execute (29 cyc)</text>

        <line x1="258" y1="-3" x2="292" y2="-3" stroke="#16a34a" stroke-width="1.2" marker-end="url(#ar)"/>
        <text x="296" y="2" class="note-gr">Result available</text>

        <text x="520" y="2" class="val-sm" fill="#16a34a">Total: 29 cyc</text>
        <text x="700" y="2" class="note">No additional overhead</text>
      </g>
    </g>

    <!-- Cold Path -->
    <g transform="translate(0,108)">
      <rect x="0" y="0" width="1008" height="88" rx="10" fill="#FFF1F2" stroke="#e11d48" stroke-width="1"/>
      <text x="16" y="18" class="ttl" fill="#e11d48">COLD PATH (TC idle > N cycles, power-gated OFF)</text>

      <!-- Timeline -->
      <g transform="translate(16,40)">
        <text x="0" y="0" class="lbl-sm">Issue</text>
        <line x1="36" y1="-3" x2="56" y2="-3" stroke="#e11d48" stroke-width="1.2" marker-end="url(#ar)"/>

        <!-- Power-on block (large) -->
        <rect x="60" y="-14" width="440" height="28" rx="4" fill="#e11d48" opacity="0.12" stroke="#e11d48" stroke-width="1"/>
        <text x="70" y="4" class="cyc-lbl" fill="#e11d48">POWER-ON SEQUENCE (~350 cyc)</text>
        <text x="250" y="4" class="cyc-val">voltage rail stabilization + bias settling</text>

        <line x1="504" y1="-3" x2="524" y2="-3" stroke="#5b6679" stroke-width="1" marker-end="url(#ar)"/>

        <!-- Execute block -->
        <rect x="528" y="-14" width="140" height="28" rx="4" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="0.8"/>
        <text x="538" y="4" class="cyc-lbl" fill="#16a34a">Execute (29 cyc)</text>

        <line x1="672" y1="-3" x2="692" y2="-3" stroke="#5b6679" stroke-width="1" marker-end="url(#ar)"/>
        <text x="696" y="2" class="note-em">Result</text>
      </g>

      <g transform="translate(16,70)">
        <text x="520" y="0" class="val-sm" fill="#e11d48">Total: ~375–380 cyc</text>
        <text x="700" y="0" class="note-em">13× slower than warm path</text>
      </g>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SECTION 2: Evidence for Power Gating -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(36,308)">
    <text x="0" y="0" class="ttl" fill="#e11d48">EVIDENCE FOR POWER GATING</text>

    <g transform="translate(0,18)">
      <!-- 4 evidence cards -->
      <rect x="0" y="0" width="488" height="70" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <circle cx="20" cy="16" r="8" fill="#e11d48" opacity="0.15"/>
      <text x="16" y="20" class="cyc-lbl" fill="#e11d48" text-anchor="middle">1</text>
      <text x="36" y="16" class="note">~350 cyc overhead matches typical SRAM power-on latency</text>
      <text x="36" y="34" class="note">(voltage rail stabilization + transistor bias settling)</text>
      <text x="36" y="54" class="cyc-val">Consistent with clock-gated + power-gated SRAM macro wake-up times in 4nm process</text>

      <rect x="504" y="0" width="504" height="70" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <circle cx="524" cy="16" r="8" fill="#e11d48" opacity="0.15"/>
      <text x="520" y="20" class="cyc-lbl" fill="#e11d48" text-anchor="middle">2</text>
      <text x="540" y="16" class="note">Penalty is uniform across ALL TC formats</text>
      <text x="540" y="34" class="note">(HMMA / QMMA / QMMA.SF / OMMA.SF — all ~375 cyc)</text>
      <text x="540" y="54" class="cyc-val">Format-independent → infrastructure-level delay, not datapath configuration</text>

      <rect x="0" y="82" width="488" height="70" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <circle cx="20" cy="98" r="8" fill="#e11d48" opacity="0.15"/>
      <text x="16" y="102" class="cyc-lbl" fill="#e11d48" text-anchor="middle">3</text>
      <text x="36" y="98" class="note">Block-scale formats add 0 additional cold-start cost</text>
      <text x="36" y="116" class="note">→ SF broadcast hardware is always-on or shares TC power domain</text>
      <text x="36" y="136" class="cyc-val">Scale factor register path never gets power-gated independently</text>

      <rect x="504" y="82" width="504" height="70" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <circle cx="524" cy="98" r="8" fill="#e11d48" opacity="0.15"/>
      <text x="520" y="102" class="cyc-lbl" fill="#e11d48" text-anchor="middle">4</text>
      <text x="540" y="98" class="note">TC draws ~57W during sustained compute but ~0W idle</text>
      <text x="540" y="116" class="note">→ Consistent with aggressive power gating (not just clock gating)</text>
      <text x="540" y="136" class="cyc-val">Power measurement: identical across all formats at saturation [S9/case_86-92]</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SECTION 3: Implication callout -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(36,490)">
    <rect x="0" y="0" width="1008" height="110" rx="10" fill="#FEF3C7" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="20" y="20" class="ttl" fill="#92400e">KERNEL DESIGN IMPLICATION</text>

    <g transform="translate(20,40)">
      <text x="0" y="0" class="note">• Avoid frequent TC idle periods exceeding the power-gate threshold (N cycles)</text>
      <text x="0" y="20" class="note">• If first MMA is on the latency-critical path, <tspan style="font-weight:700;fill:#e11d48">pre-warm the TC</tspan> with a dummy mma.sync in kernel prologue</text>
      <text x="0" y="40" class="note">• For attention kernels with alternating softmax (ALU-only) and MMA phases: keep MMA gap &lt; N to avoid repeated cold-starts</text>
      <text x="0" y="60" class="note">• Production impact: negligible for GEMM (TC never idles), but significant for small-batch inference with short MMA bursts</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(36,618)">
    <line x1="0" y1="0" x2="1008" y2="0" stroke="#e6e4da" stroke-width="0.8"/>
    <text x="0" y="14" class="cyc-val">Source: [S9/case_71] cold-start measurement · [S9/case_86-92] power per format · All formats: uniform ~375 cyc first-issue penalty</text>
    <text x="850" y="14" class="cyc-val">SM_120 · 2026</text>
  </g>
</svg>
