<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Inter','Segoe UI',system-ui,sans-serif">
<defs>
  <style>
    .bg{fill:#fcfbf6}
    .panel{fill:#fff;stroke:#e2dfd8;stroke-width:1.2;rx:10}
    .eyebrow{font-size:9px;font-weight:700;letter-spacing:1.2px;fill:#8b7e6a;text-transform:uppercase}
    .ch-eyebrow{font-size:10px;font-weight:700;letter-spacing:1.5px;fill:#b45309;text-transform:uppercase}
    .title-lg{font-size:18px;font-weight:700;fill:#0b1220;letter-spacing:-0.3px}
    .subtitle{font-size:12px;font-style:italic;fill:#5b6679}
    .kpi{font-size:24px;font-weight:800;letter-spacing:-0.5px}
    .kpi-unit{font-size:11px;font-weight:600;fill:#5b6679}
    .kpi-sm{font-size:15px;font-weight:700;fill:#1a1a1a}
    .lbl{font-size:10.5px;fill:#444}
    .lbl-bold{font-size:10.5px;font-weight:700;fill:#1a1a1a}
    .lbl-mono{font-size:10px;font-family:'JetBrains Mono','Fira Code',monospace;fill:#333}
    .lbl-sm{font-size:9px;fill:#6b7280}
    .tag{font-size:8.5px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase}
    .divider{stroke:#e2dfd8;stroke-width:0.8}
    .bar-amber{fill:#d97706;opacity:0.8}
    .bar-green{fill:#059669;opacity:0.8}
    .bar-red{fill:#dc2626;opacity:0.7}
    .bar-blue{fill:#2563eb;opacity:0.8}
    .bar-teal{fill:#0891b2;opacity:0.8}
    .insight-bg{fill:#fffbeb;stroke:#fcd34d;stroke-width:1;rx:8}
  </style>
</defs>
<rect width="1280" height="720" class="bg"/>

<!-- Header -->
<rect x="30" y="16" width="4" height="48" rx="2" fill="#b45309"/>
<text x="46" y="34" class="ch-eyebrow">CHAPTER 09 · SM_120 / GB202 BLACKWELL</text>
<text x="46" y="54" class="title-lg">Power, Thermal &amp; Efficiency — Executive Summary</text>

<!-- KPI Row: 4 cards -->
<rect x="30" y="74" width="290" height="74" class="panel"/>
<rect x="30" y="74" width="290" height="3.5" rx="10" fill="#dc2626" opacity="0.7"/>
<text x="48" y="96" class="eyebrow" style="fill:#dc2626">MAX POWER OBSERVED</text>
<text x="48" y="124" class="kpi" style="fill:#dc2626">232 W</text>
<text x="130" y="124" class="kpi-unit">/ 350 W TDP (66%)</text>
<text x="48" y="140" class="lbl-sm">118 W headroom never utilized · Case 10</text>

<rect x="335" y="74" width="290" height="74" class="panel"/>
<rect x="335" y="74" width="290" height="3.5" rx="10" fill="#059669" opacity="0.7"/>
<text x="353" y="96" class="eyebrow" style="fill:#059669">PEAK EFFICIENCY</text>
<text x="353" y="124" class="kpi" style="fill:#059669">9.49</text>
<text x="420" y="124" class="kpi-unit">TOPS/W (Sparse INT8)</text>
<text x="353" y="140" class="lbl-sm">864× range from FP64 (0.011) · Case 17</text>

<rect x="640" y="74" width="290" height="74" class="panel"/>
<rect x="640" y="74" width="290" height="3.5" rx="10" fill="#2563eb" opacity="0.7"/>
<text x="658" y="96" class="eyebrow" style="fill:#2563eb">DVFS SWEET SPOT</text>
<text x="658" y="124" class="kpi" style="fill:#2563eb">1500</text>
<text x="730" y="124" class="kpi-unit">MHz · 0.49 TFLOPS/W</text>
<text x="658" y="140" class="lbl-sm">32% better than max clock · Cases 3, 11</text>

<rect x="945" y="74" width="305" height="74" class="panel"/>
<rect x="945" y="74" width="305" height="3.5" rx="10" fill="#d97706" opacity="0.7"/>
<text x="963" y="96" class="eyebrow" style="fill:#d97706">THERMAL HEADROOM</text>
<text x="963" y="124" class="kpi" style="fill:#d97706">27°C</text>
<text x="1048" y="124" class="kpi-unit">below 92°C throttle</text>
<text x="963" y="140" class="lbl-sm">Max 65°C @ 10 min sustained · No throttle ever</text>

<!-- Main content: 3 panels -->
<!-- Panel A: Power Hierarchy (stacked horizontal bars) -->
<rect x="30" y="164" width="400" height="310" class="panel"/>
<text x="50" y="188" class="tag" style="fill:#dc2626">POWER STATE HIERARCHY</text>
<text x="50" y="206" class="lbl-bold">Chip Power by Workload Type (W)</text>

<!-- Bars proportional to power (scale: 350W = full width 340px) -->
<text x="50" y="230" class="lbl-mono" style="font-size:9px">Idle (pre-CUDA)</text>
<rect x="165" y="220" width="6" height="14" rx="2" fill="#94a3b8" opacity="0.6"/>
<text x="175" y="230" class="lbl-mono" style="font-size:9px">6.6 W</text>

<text x="50" y="252" class="lbl-mono" style="font-size:9px">CUDA context</text>
<rect x="165" y="242" width="47" height="14" rx="2" fill="#94a3b8"/>
<text x="216" y="252" class="lbl-mono" style="font-size:9px">48.4 W</text>

<text x="50" y="274" class="lbl-mono" style="font-size:9px">TC MX-FP4</text>
<rect x="165" y="264" width="87" height="14" rx="2" fill="#059669" opacity="0.7"/>
<text x="256" y="274" class="lbl-mono" style="font-size:9px;fill:#059669">89 W</text>

<text x="50" y="296" class="lbl-mono" style="font-size:9px">TC FP16 MMA</text>
<rect x="165" y="286" width="105" height="14" rx="2" fill="#059669"/>
<text x="274" y="296" class="lbl-mono" style="font-size:9px;fill:#059669">108 W</text>

<text x="50" y="318" class="lbl-mono" style="font-size:9px">FP16 HFMA2</text>
<rect x="165" y="308" width="127" height="14" rx="2" fill="#d97706" opacity="0.6"/>
<text x="296" y="318" class="lbl-mono" style="font-size:9px">131 W</text>

<text x="50" y="340" class="lbl-mono" style="font-size:9px">FP32 FFMA</text>
<rect x="165" y="330" width="139" height="14" rx="2" class="bar-red"/>
<text x="308" y="340" class="lbl-mono" style="font-size:9px;fill:#dc2626">143 W</text>

<text x="50" y="362" class="lbl-mono" style="font-size:9px">INT32 IMAD</text>
<rect x="165" y="352" width="159" height="14" rx="2" class="bar-red" style="opacity:0.9"/>
<text x="328" y="362" class="lbl-mono" style="font-size:9px;fill:#dc2626">164 W</text>

<text x="50" y="384" class="lbl-mono" style="font-size:9px">Boost sustained</text>
<rect x="165" y="374" width="225" height="14" rx="2" fill="#7c3aed" opacity="0.7"/>
<text x="394" y="384" class="lbl-mono" style="font-size:9px;fill:#7c3aed">232 W</text>

<!-- TDP marker -->
<line x1="165" y1="395" x2="165" y2="410" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
<rect x="165" y="397" width="260" height="14" rx="2" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>
<text x="320" y="408" text-anchor="middle" class="lbl-sm" style="fill:#dc2626">TDP = 350 W (never reached)</text>

<text x="50" y="440" class="lbl">TC workloads: 89–113 W (25–32% TDP)</text>
<text x="50" y="456" class="lbl">CUDA cores: 123–164 W (35–47% TDP)</text>
<text x="50" y="468" class="lbl-sm">TC paradoxically cooler: 2.18× TFLOPS at 0.76× power vs FP32</text>

<!-- Panel B: Efficiency Bands (log-scale visualization) -->
<rect x="445" y="164" width="400" height="310" class="panel"/>
<text x="465" y="188" class="tag" style="fill:#059669">EFFICIENCY HIERARCHY (864× SPAN)</text>
<text x="465" y="206" class="lbl-bold">TFLOPS/W by Precision &amp; Compute Unit</text>

<!-- Log-scale bars (0.011 to 9.49) -->
<rect x="465" y="220" width="320" height="14" rx="2" fill="#059669" opacity="0.9"/>
<text x="470" y="230" class="lbl-mono" style="font-size:9px;fill:#fff">Sparse INT8 TC</text>
<text x="790" y="230" class="lbl-bold" style="fill:#059669">9.49</text>

<rect x="465" y="240" width="232" height="14" rx="2" fill="#059669" opacity="0.75"/>
<text x="470" y="250" class="lbl-mono" style="font-size:9px;fill:#fff">Dense INT8 TC</text>
<text x="702" y="250" class="lbl-bold" style="fill:#059669">5.04</text>

<rect x="465" y="260" width="135" height="14" rx="2" fill="#0891b2" opacity="0.8"/>
<text x="470" y="270" class="lbl-mono" style="font-size:9px;fill:#fff">NVFP4 OMMA.SF</text>
<text x="605" y="270" class="lbl-bold" style="fill:#0891b2">2.36</text>

<rect x="465" y="280" width="123" height="14" rx="2" fill="#0891b2" opacity="0.65"/>
<text x="470" y="290" class="lbl-mono" style="font-size:9px;fill:#fff">INT8 TC</text>
<text x="593" y="290" class="lbl-bold" style="fill:#0891b2">2.24</text>

<rect x="465" y="300" width="118" height="14" rx="2" fill="#2563eb" opacity="0.7"/>
<text x="470" y="310" class="lbl-mono" style="font-size:9px;fill:#fff">FP16 TC</text>
<text x="588" y="310" class="lbl-bold" style="fill:#2563eb">2.08</text>

<rect x="465" y="320" width="70" height="14" rx="2" fill="#6366f1" opacity="0.6"/>
<text x="470" y="330" class="lbl-mono" style="font-size:9px;fill:#fff">MXFP4</text>
<text x="540" y="330" class="lbl-bold" style="fill:#6366f1">1.18</text>

<rect x="465" y="340" width="55" height="14" rx="2" fill="#8b5cf6" opacity="0.5"/>
<text x="555" y="350" class="lbl-mono" style="font-size:9px">INT8 CUDA</text>
<text x="525" y="350" class="lbl-bold" style="fill:#8b5cf6">  0.95</text>

<rect x="465" y="360" width="30" height="14" rx="2" fill="#d97706" opacity="0.5"/>
<text x="500" y="370" class="lbl-mono" style="font-size:9px">TF32 TC</text>
<text x="558" y="370" class="lbl-mono" style="font-size:9px">0.54</text>

<rect x="465" y="380" width="23" height="14" rx="2" class="bar-red" style="opacity:0.5"/>
<text x="493" y="390" class="lbl-mono" style="font-size:9px">FP16/BF16 CUDA</text>
<text x="575" y="390" class="lbl-mono" style="font-size:9px">0.44–0.48</text>

<rect x="465" y="400" width="18" height="14" rx="2" class="bar-red" style="opacity:0.4"/>
<text x="488" y="410" class="lbl-mono" style="font-size:9px">FP32 FFMA</text>
<text x="558" y="410" class="lbl-mono" style="font-size:9px">0.39</text>

<rect x="465" y="420" width="3" height="14" rx="1" class="bar-red" style="opacity:0.3"/>
<text x="473" y="430" class="lbl-mono" style="font-size:9px">FP64 DFMA</text>
<text x="543" y="430" class="lbl-mono" style="font-size:9px">0.011</text>

<line x1="460" y1="446" x2="830" y2="446" class="divider"/>
<text x="465" y="458" class="lbl">Power constant across TC formats (~89–113 W)</text>
<text x="465" y="468" class="lbl-sm">OPs/instruction scales → efficiency scales proportionally</text>

<!-- Panel C: DVFS + Thermal -->
<rect x="860" y="164" width="390" height="310" class="panel"/>
<text x="880" y="188" class="tag" style="fill:#2563eb">DVFS: PERFECT LINEARITY</text>
<text x="880" y="206" class="lbl-bold">Throughput vs Frequency (101–102% ideal)</text>

<!-- Simplified DVFS curve representation -->
<!-- X axis: frequency, Y axis: efficiency -->
<line x1="900" y1="380" x2="1220" y2="380" stroke="#e2dfd8" stroke-width="1"/>
<line x1="900" y1="220" x2="900" y2="380" stroke="#e2dfd8" stroke-width="1"/>

<!-- Efficiency curve (peaks at ~1500, drops at high freq) -->
<polyline points="910,340 950,305 1000,260 1040,230 1060,225 1080,228 1110,245 1140,270 1170,290 1200,305" fill="none" stroke="#2563eb" stroke-width="2.5"/>

<!-- Peak marker -->
<circle cx="1060" cy="225" r="5" fill="#2563eb"/>
<text x="1060" y="215" text-anchor="middle" class="lbl-bold" style="fill:#2563eb;font-size:9px">0.49 TFLOPS/W</text>
<text x="1060" y="395" text-anchor="middle" class="lbl-mono" style="font-size:8px">1500</text>

<!-- Freq labels -->
<text x="910" y="395" class="lbl-mono" style="font-size:8px">575</text>
<text x="1200" y="395" class="lbl-mono" style="font-size:8px">2606</text>
<text x="880" y="230" class="lbl-sm" style="writing-mode:tb">TFLOPS/W</text>
<text x="1050" y="410" class="lbl-sm">Core Clock (MHz)</text>

<!-- Sweet spot annotation -->
<rect x="1010" y="418" width="165" height="36" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
<text x="1018" y="434" class="lbl-mono" style="font-size:9px;fill:#1e40af">@1500 MHz: 41.5T, 85W</text>
<text x="1018" y="448" class="lbl-mono" style="font-size:9px;fill:#1e40af">32% better than max clk</text>

<!-- Key findings strip -->
<rect x="970" y="290" width="3" height="80" rx="1" fill="#d97706" opacity="0.5"/>
<text x="980" y="295" class="lbl" style="font-size:9.5px">• 574→2606 MHz: zero pipeline hazards</text>
<text x="980" y="313" class="lbl" style="font-size:9.5px">• No clock wall until ~2610 MHz</text>
<text x="980" y="331" class="lbl" style="font-size:9.5px">• Memory: 3 discrete GDDR7 bins</text>
<text x="980" y="349" class="lbl" style="font-size:9.5px">• Peak DRAM: 1112 GB/s (87% spec)</text>
<text x="980" y="367" class="lbl" style="font-size:9.5px">• Power ∝ V²f → efficiency ∝ 1/V²</text>

<!-- Bottom insight strip -->
<rect x="30" y="490" width="1220" height="220" class="insight-bg"/>
<text x="52" y="514" class="tag" style="fill:#b45309;font-size:10px">KEY ARCHITECTURAL INSIGHTS</text>

<!-- 2x3 grid of insights -->
<g transform="translate(52,530)">
  <circle cx="5" cy="8" r="3" fill="#b45309"/>
  <text x="16" y="12" class="lbl" style="font-size:10.5px"><tspan font-weight="700">TC cooler than CUDA at 4× throughput</tspan> — MMA FP16: 108W/235T vs FFMA: 143W/58T</text>

  <circle cx="5" cy="34" r="3" fill="#b45309"/>
  <text x="16" y="38" class="lbl" style="font-size:10.5px"><tspan font-weight="700">All TC formats ≈ same power</tspan> — 89–113 W regardless of precision; TOPS scales with ops/instr</text>

  <circle cx="5" cy="60" r="3" fill="#b45309"/>
  <text x="16" y="64" class="lbl" style="font-size:10.5px"><tspan font-weight="700">Clock gating (not power gating)</tspan> — zero startup penalty; FMA: 0.23 W/SM, MMA: 0.15 W/SM</text>

  <circle cx="5" cy="86" r="3" fill="#b45309"/>
  <text x="16" y="90" class="lbl" style="font-size:10.5px"><tspan font-weight="700">Sparse INT8: 2.0× at +6% power</tspan> — native 2:4 sparsity confirmed; 929 TOPS @ 98W</text>

  <circle cx="5" cy="112" r="3" fill="#b45309"/>
  <text x="16" y="116" class="lbl" style="font-size:10.5px"><tspan font-weight="700">350W TDP never reached (max 66%)</tspan> — budget for NVLink + burst; PCIe SKU cannot exercise it</text>

  <circle cx="5" cy="138" r="3" fill="#b45309"/>
  <text x="16" y="142" class="lbl" style="font-size:10.5px"><tspan font-weight="700">NVFP4 = 2× MXFP4 at same 89W</tspan> — k=64 tile processes twice the K-dim per instruction</text>

  <circle cx="5" cy="164" r="3" fill="#b45309"/>
  <text x="16" y="168" class="lbl" style="font-size:10.5px"><tspan font-weight="700">Cluster scheduling: +1.4% power only</tspan> — multicast TMA pays no meaningful efficiency penalty</text>
</g>
</svg>
