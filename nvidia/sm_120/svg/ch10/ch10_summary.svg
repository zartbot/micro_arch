    <text x="14" y="66" style="font:500 9px 'JetBrains Mono',monospace;fill:#5b6679">H2D pinned, 88.9% theoretical</text>
    <text x="14" y="84" style="font:500 9px 'JetBrains Mono',monospace;fill:#0b1220">Bidir: 101.3 GB/s (1.79x)</text>
