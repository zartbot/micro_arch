  <rect x="236" y="156" width="120" height="44" rx="6" fill="#eff6ff" stroke="#1e40af" stroke-width="1"/>
  <text x="296" y="174" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679" text-anchor="middle">CTA 12, 13</text>
  <text x="296" y="192" style="font:600 12px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">SM 22, 23</text>

  <!-- GPC 2: CTA 14,15 → SM 42,43 -->
  <rect x="384" y="156" width="120" height="44" rx="6" fill="#f0fdf4" stroke="#76b900" stroke-width="1"/>
  <text x="444" y="174" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679" text-anchor="middle">CTA 14, 15</text>
  <text x="444" y="192" style="font:600 12px 'JetBrains Mono',monospace;fill:#76b900" text-anchor="middle">SM 42, 43</text>

  <!-- GPC 3: CTA 16,17 → SM 62,63 -->
  <rect x="532" y="156" width="120" height="44" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text x="592" y="174" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679" text-anchor="middle">CTA 16, 17</text>
  <text x="592" y="192" style="font:600 12px 'JetBrains Mono',monospace;fill:#ea580c" text-anchor="middle">SM 62, 63</text>

