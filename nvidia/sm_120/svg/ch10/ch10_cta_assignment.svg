  <text x="36" y="232" style="font:600 11px 'JetBrains Mono',monospace;fill:#0b1220">Wave 0, TPC 2:</text>

  <rect x="88" y="216" width="120" height="44" rx="6" fill="#f5f1ff" stroke="#6d28d9" stroke-width="1"/>
