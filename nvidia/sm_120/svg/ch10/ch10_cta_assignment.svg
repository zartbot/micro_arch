  <!-- Background -->
  <rect width="1080" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="36" y="32" style="font:600 15px 'Fraunces',serif;fill:#0b1220">CTA Assignment Map — GPC-Aware Stride-20 Round-Robin</text>
  <text x="36" y="52" style="font:italic 11px 'Fraunces',serif;fill:#5b6679">First 40 CTAs mapped to SM IDs across 10 GPCs (110 SMs total, 2 SMs/TPC, 11 TPCs/GPC)</text>

  <!-- ═══════════════ GPC HEADER ROW ═══════════════ -->
  <text x="36" y="82" style="font:600 12px 'Fraunces',serif;fill:#5b6679">GPC:</text>
  <!-- GPC labels across the top -->
  <text x="148" y="82" style="font:600 11px 'JetBrains Mono',monospace;fill:#6d28d9" text-anchor="middle">GPC 0</text>
  <text x="296" y="82" style="font:600 11px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">GPC 1</text>
  <text x="444" y="82" style="font:600 11px 'JetBrains Mono',monospace;fill:#76b900" text-anchor="middle">GPC 2</text>
  <text x="592" y="82" style="font:600 11px 'JetBrains Mono',monospace;fill:#ea580c" text-anchor="middle">GPC 3</text>
  <text x="740" y="82" style="font:600 11px 'JetBrains Mono',monospace;fill:#e11d48" text-anchor="middle">GPC 4</text>

  <!-- ═══════════════ ROW 0: CTAs 0-9 ═══════════════ -->
  <text x="36" y="112" style="font:600 11px 'JetBrains Mono',monospace;fill:#0b1220">Wave 0, TPC 0:</text>

  <!-- GPC 0: CTA 0,1 → SM 0,1 -->
  <rect x="88" y="96" width="120" height="44" rx="6" fill="#f5f1ff" stroke="#6d28d9" stroke-width="1"/>
  <text x="148" y="114" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679" text-anchor="middle">CTA 0, 1</text>
  <text x="148" y="132" style="font:600 12px 'JetBrains Mono',monospace;fill:#6d28d9" text-anchor="middle">SM 0, 1</text>

  <!-- GPC 1: CTA 2,3 → SM 20,21 -->
  <rect x="236" y="96" width="120" height="44" rx="6" fill="#eff6ff" stroke="#1e40af" stroke-width="1"/>
  <text x="296" y="114" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679" text-anchor="middle">CTA 2, 3</text>
  <text x="296" y="132" style="font:600 12px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">SM 20, 21</text>

  <!-- GPC 2: CTA 4,5 → SM 40,41 -->
