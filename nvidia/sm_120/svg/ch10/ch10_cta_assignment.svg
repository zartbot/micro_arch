  <rect x="680" y="156" width="120" height="44" rx="6" fill="#fef2f2" stroke="#e11d48" stroke-width="1"/>
  <text x="740" y="174" style="font:500 10px 'JetBrains Mono',monospace;fill:#5b6679" text-anchor="middle">CTA 18, 19</text>
  <text x="740" y="192" style="font:600 12px 'JetBrains Mono',monospace;fill:#e11d48" text-anchor="middle">SM 82, 83</text>

