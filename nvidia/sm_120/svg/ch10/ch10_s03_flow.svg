<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 680" role="img"
     aria-label="griddepcontrol (PDL) vs cudaStreamWaitEvent — Inter-Kernel Signal Path Comparison">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6679"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#76b900"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6d28d9"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e11d48"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1080" height="680" fill="#ffffff"/>

  <!-- Title -->
  <text x="36" y="32" style="font:600 15px 'Fraunces',serif;fill:#0b1220">griddepcontrol (PDL) vs cudaStreamWaitEvent</text>
  <text x="36" y="52" style="font:italic 11px 'Fraunces',serif;fill:#5b6679">Inter-kernel dependency signal path comparison — on-device vs host-mediated pipeline</text>

  <!-- ═══════════════ PATH A: griddepcontrol (On-Device) ═══════════════ -->
  <text x="36" y="82" style="font:600 13px 'Fraunces',serif;fill:#76b900">Path A: griddepcontrol (On-Device, 544 ns min)</text>

  <!-- Kernel A box -->
  <rect x="40" y="96" width="340" height="180" rx="8" fill="#f0fdf4" stroke="#76b900" stroke-width="1.2"/>
  <text x="56" y="118" style="font:600 12px 'JetBrains Mono',monospace;fill:#76b900">Kernel A (Producer)</text>
  <!-- compute -->
  <rect x="60" y="130" width="300" height="28" rx="4" fill="#ecfccb" stroke="#84cc16" stroke-width="0.6"/>
  <text x="210" y="148" style="font:500 11px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">... compute ...</text>
  <!-- LAUNCH_DEPENDENTS -->
  <rect x="60" y="168" width="300" height="32" rx="4" fill="#76b900"/>
  <text x="210" y="188" style="font:600 11px 'JetBrains Mono',monospace;fill:#fff" text-anchor="middle">GRIDDEPCONTROL.LAUNCH_DEPENDENTS</text>
  <text x="210" y="208" style="font:500 9px 'JetBrains Mono',monospace;fill:#213210" text-anchor="middle">7.9 cyc (~3 ns)</text>
  <!-- PREEXIT -->
  <rect x="60" y="212" width="300" height="28" rx="4" fill="#ecfccb" stroke="#84cc16" stroke-width="0.6"/>
  <text x="210" y="230" style="font:500 11px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">GRIDDEPCONTROL.PREEXIT</text>
  <!-- cleanup -->
  <rect x="60" y="248" width="300" height="20" rx="4" fill="#f7fee7"/>
  <text x="210" y="262" style="font:italic 9px 'JetBrains Mono',monospace;fill:#5b6679" text-anchor="middle">warp cleanup &amp; exit</text>

  <!-- GPU Command Processor -->
  <rect x="430" y="152" width="180" height="64" rx="8" fill="#eff6ff" stroke="#1e40af" stroke-width="1.2"/>
  <text x="520" y="174" style="font:600 11px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">GPU Command</text>
  <text x="520" y="192" style="font:600 11px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">Processor</text>
  <text x="520" y="208" style="font:500 9px 'JetBrains Mono',monospace;fill:#5b6679" text-anchor="middle">~480 ns dispatch</text>

  <!-- Arrow A -> CP -->
  <path d="M360,184 L422,184" stroke="#76b900" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="392" y="178" style="font:italic 9px 'Fraunces',serif;fill:#76b900" text-anchor="middle">signal</text>

  <!-- Kernel B box -->
  <rect x="660" y="96" width="340" height="180" rx="8" fill="#f0fdf4" stroke="#76b900" stroke-width="1.2"/>
  <text x="676" y="118" style="font:600 12px 'JetBrains Mono',monospace;fill:#76b900">Kernel B (Consumer)</text>
  <!-- WAIT -->
  <rect x="680" y="130" width="300" height="32" rx="4" fill="#d9f99d" stroke="#84cc16" stroke-width="0.6"/>
  <text x="830" y="150" style="font:500 11px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">GRIDDEPCONTROL.WAIT</text>
  <!-- compute -->
  <rect x="680" y="172" width="300" height="28" rx="4" fill="#ecfccb" stroke="#84cc16" stroke-width="0.6"/>
  <text x="830" y="190" style="font:500 11px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">... compute ...</text>
  <!-- first insn -->
  <rect x="680" y="210" width="300" height="28" rx="4" fill="#ecfccb" stroke="#84cc16" stroke-width="0.6"/>
  <text x="830" y="228" style="font:500 11px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">first instruction issue</text>

  <!-- Arrow CP -> B -->
  <path d="M610,184 L652,184" stroke="#76b900" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="632" y="178" style="font:italic 9px 'Fraunces',serif;fill:#76b900" text-anchor="middle">launch</text>

  <!-- Total gap annotation (Path A) -->
  <rect x="430" y="232" width="180" height="40" rx="6" fill="#f0fdf4" stroke="#76b900" stroke-width="1"/>
  <text x="520" y="250" style="font:600 11px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">Total Gap</text>
  <text x="520" y="266" style="font:600 12px 'JetBrains Mono',monospace;fill:#76b900" text-anchor="middle">544 ns (min)</text>

  <!-- ═══════════════ SEPARATOR ═══════════════ -->
  <line x1="40" y1="296" x2="1040" y2="296" stroke="#e6e4da" stroke-width="1"/>

  <!-- ═══════════════ PATH B: cudaStreamWaitEvent (Host-Mediated) ═══════════════ -->
  <text x="36" y="322" style="font:600 13px 'Fraunces',serif;fill:#e11d48">Path B: cudaStreamWaitEvent (Host-Mediated, 1312 ns min)</text>

  <!-- Kernel A completes -->
  <rect x="40" y="336" width="230" height="120" rx="8" fill="#fef2f2" stroke="#e11d48" stroke-width="1.2"/>
  <text x="56" y="358" style="font:600 12px 'JetBrains Mono',monospace;fill:#e11d48">Kernel A</text>
  <rect x="60" y="370" width="190" height="24" rx="4" fill="#fecaca"/>
  <text x="155" y="386" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">compute + EXIT</text>
  <rect x="60" y="402" width="190" height="24" rx="4" fill="#fca5a5"/>
  <text x="155" y="418" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">completion signal → Host</text>
  <text x="155" y="448" style="font:italic 9px 'JetBrains Mono',monospace;fill:#e11d48" text-anchor="middle">must fully drain first</text>

  <!-- Host CPU box -->
  <rect x="330" y="336" width="260" height="120" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2"/>
  <text x="346" y="358" style="font:600 12px 'JetBrains Mono',monospace;fill:#ea580c">Host CPU</text>
  <!-- Poll -->
  <rect x="350" y="370" width="220" height="28" rx="4" fill="#ffedd5" stroke="#ea580c" stroke-width="0.6"/>
  <text x="460" y="388" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">MMIO poll completion reg</text>
  <text x="542" y="368" style="font:600 9px 'JetBrains Mono',monospace;fill:#ea580c">~400 ns</text>
  <!-- Event record + submit -->
  <rect x="350" y="406" width="220" height="28" rx="4" fill="#ffedd5" stroke="#ea580c" stroke-width="0.6"/>
  <text x="460" y="424" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">doorbell write (launch B)</text>
  <text x="598" y="424" style="font:600 9px 'JetBrains Mono',monospace;fill:#ea580c">~370 ns</text>

  <!-- Kernel B box -->
  <rect x="650" y="336" width="230" height="120" rx="8" fill="#fef2f2" stroke="#e11d48" stroke-width="1.2"/>
  <text x="666" y="358" style="font:600 12px 'JetBrains Mono',monospace;fill:#e11d48">Kernel B</text>
  <rect x="670" y="370" width="190" height="24" rx="4" fill="#fecaca"/>
  <text x="765" y="386" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">GPU-side dispatch</text>
  <rect x="670" y="402" width="190" height="24" rx="4" fill="#fecaca"/>
  <text x="765" y="418" style="font:500 10px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">first instruction issue</text>

  <!-- Arrows Path B -->
  <path d="M270,414 L322,396" stroke="#e11d48" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>
  <text x="296" y="396" style="font:italic 9px 'Fraunces',serif;fill:#e11d48" text-anchor="middle">PCIe</text>
  <path d="M590,420 L642,396" stroke="#e11d48" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>
  <text x="616" y="401" style="font:italic 9px 'Fraunces',serif;fill:#e11d48" text-anchor="middle">PCIe</text>

  <!-- Total gap annotation (Path B) -->
  <rect x="900" y="366" width="130" height="56" rx="6" fill="#fef2f2" stroke="#e11d48" stroke-width="1"/>
  <text x="965" y="386" style="font:600 11px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">Total Gap</text>
  <text x="965" y="404" style="font:600 12px 'JetBrains Mono',monospace;fill:#e11d48" text-anchor="middle">1312 ns (min)</text>
  <text x="965" y="418" style="font:500 9px 'JetBrains Mono',monospace;fill:#5b6679" text-anchor="middle">+768 ns vs PDL</text>

  <!-- ═══════════════ COMPARISON TIMELINE ═══════════════ -->
  <line x1="40" y1="476" x2="1040" y2="476" stroke="#e6e4da" stroke-width="1"/>
  <text x="540" y="504" style="font:600 13px 'Fraunces',serif;fill:#0b1220" text-anchor="middle">Latency Comparison (ns)</text>

  <!-- Timeline axis -->
  <line x1="80" y1="530" x2="1000" y2="530" stroke="#5b6679" stroke-width="1"/>
  <!-- ticks at 0, 544, 864, 1312, 1696 -->
  <line x1="80" y1="525" x2="80" y2="535" stroke="#5b6679" stroke-width="1"/>
  <text x="80" y="548" style="font:500 9px 'JetBrains Mono',monospace;fill:#5b6679" text-anchor="middle">0</text>

  <!-- 544 ns - PDL min -->
  <line x1="375" y1="525" x2="375" y2="535" stroke="#76b900" stroke-width="1.5"/>
  <text x="375" y="548" style="font:600 9px 'JetBrains Mono',monospace;fill:#76b900" text-anchor="middle">544</text>

  <!-- 864 ns - Same-stream -->
  <line x1="548" y1="525" x2="548" y2="535" stroke="#1e40af" stroke-width="1.5"/>
  <text x="548" y="548" style="font:600 9px 'JetBrains Mono',monospace;fill:#1e40af" text-anchor="middle">864</text>

  <!-- 1312 ns - Event min -->
  <line x1="792" y1="525" x2="792" y2="535" stroke="#e11d48" stroke-width="1.5"/>
  <text x="792" y="548" style="font:600 9px 'JetBrains Mono',monospace;fill:#e11d48" text-anchor="middle">1312</text>

  <!-- 1696 ns - Event median -->
  <line x1="1000" y1="525" x2="1000" y2="535" stroke="#ea580c" stroke-width="1.5"/>
  <text x="1000" y="548" style="font:600 9px 'JetBrains Mono',monospace;fill:#ea580c" text-anchor="middle">1696</text>

  <!-- Bar: PDL -->
  <rect x="80" y="560" width="295" height="22" rx="4" fill="#76b900"/>
  <text x="228" y="575" style="font:600 10px 'JetBrains Mono',monospace;fill:#fff" text-anchor="middle">griddepcontrol (PDL) — 544 ns min</text>

  <!-- Bar: Same-stream -->
  <rect x="80" y="588" width="468" height="22" rx="4" fill="#1e40af"/>
  <text x="314" y="603" style="font:600 10px 'JetBrains Mono',monospace;fill:#fff" text-anchor="middle">Same-stream sequential — 864 ns min</text>

  <!-- Bar: cudaStreamWaitEvent -->
  <rect x="80" y="616" width="712" height="22" rx="4" fill="#e11d48"/>
  <text x="436" y="631" style="font:600 10px 'JetBrains Mono',monospace;fill:#fff" text-anchor="middle">cudaStreamWaitEvent — 1312 ns min</text>

  <!-- Delta annotation -->
  <line x1="375" y1="556" x2="375" y2="642" stroke="#76b900" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="792" y1="556" x2="792" y2="642" stroke="#e11d48" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Delta bracket -->
  <path d="M375,650 L792,650" stroke="#5b6679" stroke-width="1" fill="none"/>
  <line x1="375" y1="646" x2="375" y2="654" stroke="#5b6679" stroke-width="1"/>
  <line x1="792" y1="646" x2="792" y2="654" stroke="#5b6679" stroke-width="1"/>
  <text x="584" y="668" style="font:600 11px 'JetBrains Mono',monospace;fill:#0b1220" text-anchor="middle">768 ns saved (host round-trip eliminated)</text>
</svg>
