<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" role="img" aria-label="SM_120 FP64 Lane-Mask Dichotomy — Full-Warp vs Sparse-Lane Dispatch Paths">
  <rect width="1080" height="540" fill="#fafbfc"/>

  <!-- Title -->
  <text x="540" y="28" text-anchor="middle" style="font:700 15px 'Inter','Segoe UI',sans-serif;fill:#0f172a">FP64 Lane-Mask Dichotomy: Dispatch Path Comparison</text>
  <text x="540" y="48" text-anchor="middle" style="font:italic 11px 'Inter','Segoe UI',sans-serif;fill:#64748b">Why sparse-lane tests (lane 0 only) show +19% "contention" while full-warp tests show 0%</text>

  <!-- ═══════ Left: Full-Warp Path (correct) ═══════ -->
  <rect x="40" y="64" width="490" height="340" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="40" y="64" width="490" height="32" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="40" y="88" width="490" height="8" fill="#dcfce7"/>
  <text x="285" y="86" text-anchor="middle" style="font:700 12px 'JetBrains Mono',monospace;fill:#15803d">All 32 Lanes Active (Real DGEMM Workloads)</text>

  <!-- Dispatch flow -->
  <text x="60" y="118" style="font:600 10px 'Inter',sans-serif;fill:#166534">Dispatch Path:</text>
  <text x="60" y="136" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">SMSP scheduler → full SIMD-width dispatch</text>
  <text x="60" y="152" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">             → FP64 EU receives 32-lane DFMA</text>
  <text x="60" y="168" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">             → EU completes in 64 cyc (clean)</text>
  <text x="60" y="184" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">             → No re-arbitration overhead</text>

  <!-- Timeline -->
  <text x="60" y="210" style="font:600 10px 'Inter',sans-serif;fill:#166534">Timeline (4 warps → 4 EUs, zero contention):</text>

  <!-- Timeline bars -->
  <g transform="translate(60,220)">
    <text x="0" y="12" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">W0→EU0</text>
    <rect x="75" y="2" width="80" height="14" rx="3" fill="#16a34a" opacity="0.8"/>
    <text x="85" y="13" style="font:700 8px 'JetBrains Mono',monospace;fill:#fff">64 cyc</text>
    <rect x="157" y="2" width="80" height="14" rx="3" fill="#16a34a" opacity="0.6"/>
    <text x="167" y="13" style="font:700 8px 'JetBrains Mono',monospace;fill:#fff">64 cyc</text>
    <rect x="239" y="2" width="80" height="14" rx="3" fill="#16a34a" opacity="0.4"/>

    <text x="0" y="32" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">W1→EU1</text>
    <rect x="75" y="22" width="80" height="14" rx="3" fill="#16a34a" opacity="0.8"/>
    <rect x="157" y="22" width="80" height="14" rx="3" fill="#16a34a" opacity="0.6"/>
    <rect x="239" y="22" width="80" height="14" rx="3" fill="#16a34a" opacity="0.4"/>

    <text x="0" y="52" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">W2→EU2</text>
    <rect x="75" y="42" width="80" height="14" rx="3" fill="#16a34a" opacity="0.8"/>
    <rect x="157" y="42" width="80" height="14" rx="3" fill="#16a34a" opacity="0.6"/>
    <rect x="239" y="42" width="80" height="14" rx="3" fill="#16a34a" opacity="0.4"/>

    <text x="0" y="72" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">W3→EU3</text>
    <rect x="75" y="62" width="80" height="14" rx="3" fill="#16a34a" opacity="0.8"/>
    <rect x="157" y="62" width="80" height="14" rx="3" fill="#16a34a" opacity="0.6"/>
    <rect x="239" y="62" width="80" height="14" rx="3" fill="#16a34a" opacity="0.4"/>

    <!-- Time axis -->
    <text x="75" y="90" style="font:500 8px 'JetBrains Mono',monospace;fill:#94a3b8">0</text>
    <text x="153" y="90" style="font:500 8px 'JetBrains Mono',monospace;fill:#94a3b8">64</text>
    <text x="232" y="90" style="font:500 8px 'JetBrains Mono',monospace;fill:#94a3b8">128</text>
    <text x="314" y="90" style="font:500 8px 'JetBrains Mono',monospace;fill:#94a3b8">192 cyc</text>
  </g>

  <!-- Result box -->
  <rect x="60" y="330" width="450" height="60" rx="5" fill="#065f46" opacity="0.9"/>
  <text x="285" y="354" text-anchor="middle" style="font:700 11px 'JetBrains Mono',monospace;fill:#ffffff">Result: 63.99 cyc/DFMA @ 4W → 0% contention</text>
  <text x="285" y="374" text-anchor="middle" style="font:500 10px 'JetBrains Mono',monospace;fill:#bbf7d0">Agg = 0.0625 DFMA/cyc/SM = 4/64 (canonical)</text>

  <!-- ═══════ Right: Sparse-Lane Path (artifact) ═══════ -->
  <rect x="550" y="64" width="490" height="340" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="550" y="64" width="490" height="32" rx="10" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="550" y="88" width="490" height="8" fill="#fecaca"/>
  <text x="795" y="86" text-anchor="middle" style="font:700 12px 'JetBrains Mono',monospace;fill:#991b1b">Lane 0 Only (Measurement Artifact)</text>

  <!-- Dispatch flow -->
  <text x="570" y="118" style="font:600 10px 'Inter',sans-serif;fill:#991b1b">Dispatch Path:</text>
  <text x="570" y="136" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">SMSP scheduler detects mask=1 (sparse)</text>
  <text x="570" y="152" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">             → still allocates full warp slot</text>
  <text x="570" y="168" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#dc2626">             → adds ~12 cyc dispatch overhead</text>
  <text x="570" y="184" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">             → per-warp cost: 64 + 12 = ~76 cyc</text>

  <!-- Timeline -->
  <text x="570" y="210" style="font:600 10px 'Inter',sans-serif;fill:#991b1b">Timeline (4 warps, +19% inflated latency):</text>

  <!-- Timeline bars (wider = 76 cyc) -->
  <g transform="translate(570,220)">
    <text x="0" y="12" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">W0→EU0</text>
    <rect x="75" y="2" width="95" height="14" rx="3" fill="#dc2626" opacity="0.7"/>
    <text x="85" y="13" style="font:700 8px 'JetBrains Mono',monospace;fill:#fff">76 cyc*</text>
    <rect x="172" y="2" width="95" height="14" rx="3" fill="#dc2626" opacity="0.5"/>
    <rect x="269" y="2" width="95" height="14" rx="3" fill="#dc2626" opacity="0.3"/>

    <text x="0" y="32" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">W1→EU1</text>
    <rect x="75" y="22" width="95" height="14" rx="3" fill="#dc2626" opacity="0.7"/>
    <rect x="172" y="22" width="95" height="14" rx="3" fill="#dc2626" opacity="0.5"/>
    <rect x="269" y="22" width="95" height="14" rx="3" fill="#dc2626" opacity="0.3"/>

    <text x="0" y="52" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">W2→EU2</text>
    <rect x="75" y="42" width="95" height="14" rx="3" fill="#dc2626" opacity="0.7"/>
    <rect x="172" y="42" width="95" height="14" rx="3" fill="#dc2626" opacity="0.5"/>
    <rect x="269" y="42" width="95" height="14" rx="3" fill="#dc2626" opacity="0.3"/>

    <text x="0" y="72" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">W3→EU3</text>
    <rect x="75" y="62" width="95" height="14" rx="3" fill="#dc2626" opacity="0.7"/>
    <rect x="172" y="62" width="95" height="14" rx="3" fill="#dc2626" opacity="0.5"/>
    <rect x="269" y="62" width="95" height="14" rx="3" fill="#dc2626" opacity="0.3"/>

    <!-- Time axis -->
    <text x="75" y="90" style="font:500 8px 'JetBrains Mono',monospace;fill:#94a3b8">0</text>
    <text x="168" y="90" style="font:500 8px 'JetBrains Mono',monospace;fill:#94a3b8">76</text>
    <text x="261" y="90" style="font:500 8px 'JetBrains Mono',monospace;fill:#94a3b8">152</text>
    <text x="354" y="90" style="font:500 8px 'JetBrains Mono',monospace;fill:#94a3b8">228 cyc</text>
  </g>

  <!-- Result box -->
  <rect x="570" y="330" width="450" height="60" rx="5" fill="#7f1d1d" opacity="0.9"/>
  <text x="795" y="354" text-anchor="middle" style="font:700 11px 'JetBrains Mono',monospace;fill:#ffffff">Result: 75.99 cyc/DFMA @ 4W → +18.8% inflation</text>
  <text x="795" y="374" text-anchor="middle" style="font:500 10px 'JetBrains Mono',monospace;fill:#fecaca">Agg = 0.0526 = 4/76 (NOT 2 shared EUs — artifact only)</text>

  <!-- ═══════ Bottom: Conclusion ═══════ -->
  <rect x="40" y="420" width="1000" height="116" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="540" y="444" text-anchor="middle" style="font:700 11px 'Inter',sans-serif;fill:#1e293b">Decisive Evidence: Lane-Mask Dichotomy Controlled Experiment (8 kernel variants, single session)</text>
  <g transform="translate(60,454)">
    <text x="0" y="14" style="font:500 10px 'Inter',sans-serif;fill:#374151">• <tspan style="font-weight:700">Only variable</tspan>: lane mask (<tspan style="font-family:'JetBrains Mono',monospace;font-size:9px">if (lane != 0) return;</tspan> vs all-32-active). Chain length and #pragma unroll are null variables (kA=kB, kC=kD).</text>
    <text x="0" y="34" style="font:500 10px 'Inter',sans-serif;fill:#374151">• <tspan style="font-weight:700">All-lane (kE-kH)</tspan>: 0% contention at 4W, flat 63.99 cyc/DFMA — each warp gets its own EU with no overhead.</text>
    <text x="0" y="54" style="font:500 10px 'Inter',sans-serif;fill:#374151">• <tspan style="font-weight:700">Sparse-lane (kA-kD)</tspan>: +19% inflation at 4W — SMSP scheduler adds ~12 cyc "sparse-mask handling" before EU dispatch.</text>
    <text x="0" y="74" style="font:500 10px 'Inter',sans-serif;fill:#374151">• <tspan style="font-weight:700">Conclusion</tspan>: The apparent "2 shared EU" model (from earlier tests) was an algebraic coincidence: 4/76 ≈ 2/64×1.69. Real workloads see 4 independent EUs.</text>
  </g>
</svg>
