<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 730" role="img" aria-label="SM_120 SFU Pipeline Model — PTX rcp.approx.f32 SASS Decomposition, Critical Path, and ILP Overlap">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1080" height="730" fill="#fafbfc"/>

  <!-- Title -->
  <text x="540" y="28" text-anchor="middle" style="font:700 15px 'Inter','Segoe UI',sans-serif;fill:#0f172a">SM_120 SFU Pipeline — Why PTX rcp.approx Costs 47 Cycles (7 SASS Instructions)</text>
  <text x="540" y="48" text-anchor="middle" style="font:italic 11px 'Inter','Segoe UI',sans-serif;fill:#64748b">Range-reduction wrapper dominates: bare MUFU = 18c, full PTX expansion = 46.8c (2.6× overhead)</text>

  <!-- ═══════ Top-Left: Algorithm Background ═══════ -->
  <rect x="30" y="64" width="500" height="200" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="280" y="86" text-anchor="middle" style="font:700 11.5px 'Inter',sans-serif;fill:#1d4ed8">Why rcp.approx Needs a Wrapper: The Algorithm</text>

  <g transform="translate(46,96)">
    <text x="0" y="14" style="font:600 10px 'Inter',sans-serif;fill:#1e293b">MUFU.RCP computes 1/x using a minimax polynomial lookup table:</text>
    <text x="0" y="34" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">  result ≈ LUT[mantissa_bits] × 2^(-exponent)</text>
    <text x="0" y="56" style="font:600 10px 'Inter',sans-serif;fill:#1e293b">But the hardware LUT has a limited input range [1.0, 2.0):</text>
    <text x="0" y="76" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">  • Subnormals (|x| &lt; 2^-126) → overflow, must be pre-scaled</text>
    <text x="0" y="92" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">  • Large values (|x| &gt; 2^126) → underflow, must be pre-scaled</text>
    <text x="0" y="112" style="font:600 10px 'Inter',sans-serif;fill:#991b1b">ptxas inserts range-reduction + post-correction wrapper:</text>
    <text x="0" y="132" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">  scaled_x = x × scale_factor      (bring into LUT range)</text>
    <text x="0" y="148" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">  raw_rcp  = MUFU.RCP(scaled_x)    (hardware lookup)</text>
    <text x="0" y="164" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">  result   = raw_rcp × scale_factor (undo scaling)</text>
  </g>

  <!-- ═══════ Top-Right: SASS Decomposition Pipeline ═══════ -->
  <rect x="548" y="64" width="502" height="200" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="799" y="86" text-anchor="middle" style="font:700 11.5px 'Inter',sans-serif;fill:#991b1b">SASS Decomposition (7 instructions, 3 pipes)</text>

  <g transform="translate(564,96)">
    <!-- Instruction list with pipe colors -->
    <rect x="0" y="0" width="470" height="18" rx="3" fill="#dcfce7" opacity="0.5"/>
    <text x="4" y="13" style="font:600 9px 'JetBrains Mono',monospace;fill:#166534">[1] FSETP.GEU.AND P0  (subnormal test)</text>
    <text x="330" y="13" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#6b7280">→ pipe_fmalite  4c</text>

    <rect x="0" y="20" width="470" height="18" rx="3" fill="#dcfce7" opacity="0.5"/>
    <text x="4" y="33" style="font:600 9px 'JetBrains Mono',monospace;fill:#166534">[2] FSETP.GT.AND  P1  (overflow test)</text>
    <text x="330" y="33" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#6b7280">→ pipe_fmalite  4c</text>

    <rect x="0" y="40" width="470" height="18" rx="3" fill="#fef9c3" opacity="0.5"/>
    <text x="4" y="53" style="font:600 9px 'JetBrains Mono',monospace;fill:#854d0e">[3] FSEL (scale factor select if subnormal)</text>
    <text x="330" y="53" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#6b7280">→ pipe_fmaheavy 5c</text>

    <rect x="0" y="60" width="470" height="18" rx="3" fill="#fef9c3" opacity="0.5"/>
    <text x="4" y="73" style="font:600 9px 'JetBrains Mono',monospace;fill:#854d0e">[4] FSEL (scale factor select if overflow)</text>
    <text x="330" y="73" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#6b7280">→ pipe_fmaheavy 5c</text>

    <rect x="0" y="80" width="470" height="18" rx="3" fill="#dbeafe" opacity="0.5"/>
    <text x="4" y="93" style="font:600 9px 'JetBrains Mono',monospace;fill:#1e40af">[5] FMUL (pre-scale: x × scale_factor)</text>
    <text x="330" y="93" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#6b7280">→ pipe_fma      4c</text>

    <rect x="0" y="100" width="470" height="18" rx="3" fill="#ede9fe" opacity="0.7"/>
    <text x="4" y="113" style="font:700 9px 'JetBrains Mono',monospace;fill:#5b21b6">[6] MUFU.RCP (hardware reciprocal LUT)</text>
    <text x="330" y="113" style="font:700 8.5px 'JetBrains Mono',monospace;fill:#5b21b6">→ pipe_xu      18c</text>

    <rect x="0" y="120" width="470" height="18" rx="3" fill="#dbeafe" opacity="0.5"/>
    <text x="4" y="133" style="font:600 9px 'JetBrains Mono',monospace;fill:#1e40af">[7] FMUL (post-scale: raw_rcp × scale)</text>
    <text x="330" y="133" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#6b7280">→ pipe_fma      4c</text>

    <text x="0" y="160" style="font:italic 9px 'Inter',sans-serif;fill:#6b7280">Critical path: FSETP→FSEL→FMUL→MUFU→FMUL = 4+5+4+18+4 = 35c minimum</text>
  </g>

