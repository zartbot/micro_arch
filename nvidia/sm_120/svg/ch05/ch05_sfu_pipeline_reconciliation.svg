  <!-- Data points and line (cyc/op: 46.8, 23.94, 12.66, 9.68, 8.43) -->
  <!-- Y mapping: 50c=524, 8c=680; range=42c maps to 156px; scale = 156/42 = 3.71 px/cyc -->
  <!-- ILP=1: 46.8c → 524 + (50-46.8)*3.71 = 524+11.9 = 536 -->
  <!-- ILP=2: 23.94c → 524 + (50-23.94)*3.71 = 524+96.6 = 621 -->
  <!-- ILP=4: 12.66c → 524 + (50-12.66)*3.71 = 524+138.5 = 663 -->
  <!-- ILP=6: 9.68c → 524 + (50-9.68)*3.71 = 524+149.6 = 674 -->
  <!-- ILP=8: 8.43c → 524 + (50-8.43)*3.71 = 524+154.2 = 678 -->
