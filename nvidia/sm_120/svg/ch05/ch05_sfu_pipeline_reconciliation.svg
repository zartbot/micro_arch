      <text x="202" y="12" text-anchor="middle" style="font:700 7.5px 'JetBrains Mono',monospace;fill:#fff">MUFU.RCP (18c)</text>
      <rect x="274" y="0" width="30" height="16" rx="2" fill="#2563eb" opacity="0.7"/>
      <text x="289" y="12" text-anchor="middle" style="font:600 7px 'JetBrains Mono',monospace;fill:#fff">FMUL</text>
    </g>

    <!-- Chain 2 -->
    <g transform="translate(184,90)">
      <text x="-132" y="12" text-anchor="end" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Chain 2</text>
      <rect x="30" y="0" width="36" height="16" rx="2" fill="#16a34a" opacity="0.7"/>
      <text x="48" y="12" text-anchor="middle" style="font:600 7px 'JetBrains Mono',monospace;fill:#fff">FSETP</text>
      <rect x="68" y="0" width="30" height="16" rx="2" fill="#ca8a04" opacity="0.7"/>
      <text x="83" y="12" text-anchor="middle" style="font:600 7px 'JetBrains Mono',monospace;fill:#fff">FSEL</text>
