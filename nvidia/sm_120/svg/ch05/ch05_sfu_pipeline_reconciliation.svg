    <text x="510" y="22" text-anchor="middle" style="font:700 12px 'Inter',sans-serif;fill:#1e293b">Pipeline Overlap at ILP=8 — Why Effective Depth = 5.6</text>

    <!-- Timeline axis -->
    <line x1="30" y1="180" x2="990" y2="180" stroke="#94a3b8" stroke-width="1"/>
    <text x="510" y="196" text-anchor="middle" style="font:500 8.5px 'Inter',sans-serif;fill:#6b7280">Time (cycles) →</text>

    <!-- Chain 0 -->
    <g transform="translate(40,38)">
      <text x="12" y="12" text-anchor="end" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Chain 0</text>
      <rect x="30" y="0" width="36" height="16" rx="2" fill="#16a34a" opacity="0.7"/>
      <text x="48" y="12" text-anchor="middle" style="font:600 7px 'JetBrains Mono',monospace;fill:#fff">FSETP</text>
