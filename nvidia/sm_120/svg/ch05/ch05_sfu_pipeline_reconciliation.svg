      <text x="289" y="12" text-anchor="middle" style="font:600 7px 'JetBrains Mono',monospace;fill:#fff">FMUL</text>
    </g>

    <!-- Annotations -->
    <text x="670" y="60" style="font:italic 9px 'Inter',sans-serif;fill:#6b7280">Chain spacing ≈ 8.43 cyc (XU saturated issue rate)</text>
    
    <text x="670" y="98" style="font:600 9.5px 'Inter',sans-serif;fill:#1e293b">Key: wrapper FMAs of chain N</text>
    <text x="670" y="114" style="font:600 9.5px 'Inter',sans-serif;fill:#1e293b">overlap with MUFU of chain N-1 on separate P0 pipe → free!</text>

    <!-- Legend -->
    <g transform="translate(690,136)">
      <rect x="0" y="0" width="12" height="10" rx="2" fill="#16a34a" opacity="0.7"/>
