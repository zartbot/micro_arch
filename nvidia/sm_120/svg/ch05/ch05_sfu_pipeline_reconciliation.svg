  <!-- ═══════ Bottom: ILP Scaling Curve ═══════ -->
  <rect x="30" y="486" width="500" height="235" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="280" y="508" text-anchor="middle" style="font:700 11.5px 'Inter',sans-serif;fill:#166534">ILP Scaling Curve (measured)</text>

  <!-- Y-axis -->
  <line x1="80" y1="524" x2="80" y2="680" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="70" y="530" text-anchor="end" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">50c</text>
  <text x="70" y="569" text-anchor="end" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">40c</text>
  <text x="70" y="608" text-anchor="end" style="font:500 8px 'JetBrains Mono',monospace;fill:#6b7280">25c</text>
