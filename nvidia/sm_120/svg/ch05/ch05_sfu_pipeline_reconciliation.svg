    <!-- Chain 4 -->
    <g transform="translate(328,142)">
      <text x="-276" y="12" text-anchor="end" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Chain 4</text>
      <rect x="30" y="0" width="36" height="16" rx="2" fill="#16a34a" opacity="0.7"/>
      <text x="48" y="12" text-anchor="middle" style="font:600 7px 'JetBrains Mono',monospace;fill:#fff">FSETP</text>
