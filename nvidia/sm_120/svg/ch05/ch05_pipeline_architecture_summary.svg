  <line x1="380" y1="96" x2="130" y2="118" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="440" y1="96" x2="310" y2="118" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="520" y1="96" x2="490" y2="118" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="580" y1="96" x2="640" y2="118" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
