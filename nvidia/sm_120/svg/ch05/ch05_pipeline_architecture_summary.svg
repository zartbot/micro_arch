  <!-- ═══════ Latency Spectrum (right side) ═══════ -->
  <rect x="550" y="278" width="500" height="180" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="800" y="298" text-anchor="middle" style="font:700 11px 'Inter',sans-serif;fill:#1e293b">Latency Spectrum (log scale, 2–422 cyc)</text>

  <!-- Log-scale bars -->
  <g transform="translate(570,310)">
    <rect x="0" y="0" width="18" height="12" rx="2" fill="#16a34a" opacity="0.85"/>
    <text x="24" y="10" style="font:600 8.5px 'JetBrains Mono',monospace;fill:#374151">2c   IADD3</text>

    <rect x="0" y="18" width="36" height="12" rx="2" fill="#16a34a" opacity="0.7"/>
    <text x="42" y="28" style="font:600 8.5px 'JetBrains Mono',monospace;fill:#374151">4c   FFMA / IMAD / LOP3 / SHF</text>

    <rect x="0" y="36" width="50" height="12" rx="2" fill="#2563eb" opacity="0.7"/>
    <text x="56" y="46" style="font:600 8.5px 'JetBrains Mono',monospace;fill:#374151">7.5c CVT (f16↔f32)</text>

    <rect x="0" y="54" width="66" height="12" rx="2" fill="#d97706" opacity="0.7"/>
    <text x="72" y="64" style="font:600 8.5px 'JetBrains Mono',monospace;fill:#374151">18c  MUFU (bare)</text>

    <rect x="0" y="72" width="82" height="12" rx="2" fill="#dc2626" opacity="0.7"/>
    <text x="88" y="82" style="font:600 8.5px 'JetBrains Mono',monospace;fill:#374151">29c  SHFL.sync</text>

    <rect x="0" y="90" width="108" height="12" rx="2" fill="#d97706" opacity="0.5"/>
    <text x="114" y="100" style="font:600 8.5px 'JetBrains Mono',monospace;fill:#374151">44c  MUFU.RCP (PTX wrapper)</text>

    <rect x="0" y="108" width="150" height="12" rx="2" fill="#7c3aed" opacity="0.7"/>
    <text x="156" y="118" style="font:600 8.5px 'JetBrains Mono',monospace;fill:#374151">64c  DFMA (non-pipelined)</text>

    <rect x="0" y="126" width="460" height="12" rx="2" fill="#475569" opacity="0.5"/>
    <text x="200" y="136" style="font:600 8.5px 'JetBrains Mono',monospace;fill:#374151">422c div.u64 (subroutine call)</text>
  </g>

  <!-- ═══════ Architectural Implications (bottom) ═══════ -->
  <rect x="30" y="474" width="1020" height="232" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="540" y="498" text-anchor="middle" style="font:700 12px 'Inter',sans-serif;fill:#15803d">Key Architectural Implications for Kernel Optimization</text>

  <g transform="translate(50,510)">
    <text x="0" y="14" style="font:500 10px 'Inter',sans-serif;fill:#374151"><tspan style="font-weight:700;color:#166534">1. Dual-pipe co-issue is free parallelism:</tspan> IADD3 (address math) and FFMA (compute) execute simultaneously at 2.0 aggregate ops/cyc. Interleave them in GEMM mainloops.</text>

    <text x="0" y="42" style="font:500 10px 'Inter',sans-serif;fill:#374151"><tspan style="font-weight:700">2. Shallow pipelines → low register pressure:</tspan> INT saturates at ILP=2 (2 regs), FP32 at ILP=4 (4 regs). Much shallower than Ampere/Hopper (ILP=4–8).</text>

    <text x="0" y="70" style="font:500 10px 'Inter',sans-serif;fill:#374151"><tspan style="font-weight:700">3. FP16 ALU gives no throughput advantage:</tspan> HFMA2 per-element = FP32 throughput. Half-precision acceleration is Tensor Core exclusive on SM_120.</text>

    <text x="0" y="98" style="font:500 10px 'Inter',sans-serif;fill:#374151"><tspan style="font-weight:700">4. FP64 is consumer-tier (1:32 ratio):</tspan> Non-pipelined 64-cyc DFMA. Use only for address math or accumulator precision, not bulk compute.</text>

    <text x="0" y="126" style="font:500 10px 'Inter',sans-serif;fill:#374151"><tspan style="font-weight:700">5. SFU wrappers dominate transcendental cost:</tspan> Bare MUFU is 18c but PTX rcp/rsqrt is 40-44c. Consider CuAssembler SASS patching for critical paths.</text>

    <text x="0" y="154" style="font:500 10px 'Inter',sans-serif;fill:#374151"><tspan style="font-weight:700">6. Avoid shuffle-based reductions:</tspan> 29c per shfl makes butterfly reductions 10× slower than Ampere. Use smem (40c) or atomicAdd.shared (24c) instead.</text>

    <text x="0" y="182" style="font:500 10px 'Inter',sans-serif;fill:#374151"><tspan style="font-weight:700">7. Integer division is catastrophic:</tspan> div.u64 costs 422c (211× IADD3). Always strength-reduce with magic-number multiply or bitwise AND.</text>
  </g>
</svg>
