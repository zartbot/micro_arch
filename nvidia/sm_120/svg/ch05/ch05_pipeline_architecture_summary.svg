  <rect x="30" y="120" width="160" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.3"/>
  <rect x="30" y="136" width="160" height="6" fill="#dcfce7"/>
  <text x="110" y="136" text-anchor="middle" style="font:700 9.5px 'JetBrains Mono',monospace;fill:#15803d">P0-lite (fmalite)</text>
  <text x="42" y="158" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">IADD3   2c</text>
  <text x="42" y="172" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">LOP3    4c</text>
  <text x="42" y="186" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">ISETP   5c</text>
  <text x="42" y="200" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">FFMA    4c</text>
  <text x="42" y="214" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">FADD    4c</text>
  <rect x="42" y="228" width="136" height="18" rx="3" fill="#065f46" opacity="0.85"/>
  <text x="110" y="241" text-anchor="middle" style="font:700 8.5px 'JetBrains Mono',monospace;fill:#fff">1.0 ops/cyc</text>

  <!-- P0-heavy (fmaheavy) -->
