  <text x="540" y="48" text-anchor="middle" style="font:italic 11px 'Inter','Segoe UI',sans-serif;fill:#64748b">Six execution pipes — co-issue matrix, latency spectrum from 2 to 422 cycles, and architectural implications</text>

