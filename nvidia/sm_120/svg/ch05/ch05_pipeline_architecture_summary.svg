    <text x="348" y="18" style="font:700 9px 'JetBrains Mono',monospace;fill:#94a3b8">—</text>
    <text x="400" y="18" style="font:900 14px 'Inter',sans-serif;fill:#16a34a">✓</text>

    <!-- P0-heavy row -->
    <text x="0" y="36" style="font:600 8px 'JetBrains Mono',monospace;fill:#475569">P0-hvy</text>
    <text x="82" y="36" style="font:900 14px 'Inter',sans-serif;fill:#16a34a">✓</text>
    <text x="142" y="36" style="font:700 9px 'JetBrains Mono',monospace;fill:#94a3b8">—</text>
    <text x="200" y="36" style="font:900 14px 'Inter',sans-serif;fill:#16a34a">✓</text>
    <text x="248" y="36" style="font:900 14px 'Inter',sans-serif;fill:#16a34a">✓</text>
    <text x="296" y="36" style="font:700 9px 'JetBrains Mono',monospace;fill:#94a3b8">—</text>
    <text x="348" y="36" style="font:700 9px 'JetBrains Mono',monospace;fill:#94a3b8">—</text>
    <text x="400" y="36" style="font:900 14px 'Inter',sans-serif;fill:#16a34a">✓</text>

    <!-- P1 row -->
    <text x="0" y="54" style="font:600 8px 'JetBrains Mono',monospace;fill:#475569">P1</text>
    <text x="82" y="54" style="font:900 14px 'Inter',sans-serif;fill:#16a34a">✓</text>
    <text x="142" y="54" style="font:900 14px 'Inter',sans-serif;fill:#16a34a">✓</text>
    <text x="200" y="54" style="font:700 9px 'JetBrains Mono',monospace;fill:#94a3b8">—</text>
    <text x="248" y="54" style="font:900 14px 'Inter',sans-serif;fill:#16a34a">✓</text>
    <text x="296" y="54" style="font:700 9px 'JetBrains Mono',monospace;fill:#94a3b8">—</text>
    <text x="348" y="54" style="font:700 9px 'JetBrains Mono',monospace;fill:#94a3b8">—</text>
    <text x="400" y="54" style="font:900 14px 'Inter',sans-serif;fill:#16a34a">✓</text>

    <!-- P2 row -->
    <text x="0" y="72" style="font:600 8px 'JetBrains Mono',monospace;fill:#475569">P2</text>
    <text x="82" y="72" style="font:900 14px 'Inter',sans-serif;fill:#16a34a">✓</text>
    <text x="142" y="72" style="font:900 14px 'Inter',sans-serif;fill:#16a34a">✓</text>
    <text x="200" y="72" style="font:900 14px 'Inter',sans-serif;fill:#16a34a">✓</text>
