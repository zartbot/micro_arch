<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 730" role="img" aria-label="SM_120 Complete Pipeline Architecture — Six Execution Pipes with Co-Issue Matrix and Latency Spectrum">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#475569"/>
