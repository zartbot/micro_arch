  <rect x="206" y="120" width="160" height="22" rx="7" fill="#fef08a" stroke="#ca8a04" stroke-width="1.3"/>
  <rect x="206" y="136" width="160" height="6" fill="#fef08a"/>
  <text x="286" y="136" text-anchor="middle" style="font:700 9.5px 'JetBrains Mono',monospace;fill:#854d0e">P0-heavy (fmaheavy)</text>
  <text x="218" y="158" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">IMAD    4c</text>
  <text x="218" y="172" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">SHF     4c</text>
  <text x="218" y="186" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">PRMT    4c</text>
  <text x="218" y="200" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">HFMA2   4c/2i</text>
  <text x="218" y="214" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">IDP.4A  4c</text>
  <rect x="218" y="228" width="136" height="18" rx="3" fill="#78350f" opacity="0.85"/>
  <text x="286" y="241" text-anchor="middle" style="font:700 8.5px 'JetBrains Mono',monospace;fill:#fff">1.0 ops/cyc</text>

