<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" role="img" aria-label="SM_120 HFMA2 Time-Multiplexed Half-Precision — 2-Cycle Issue Model vs SM_80/SM_90 Wide Datapath">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1080" height="480" fill="#fafbfc"/>

  <!-- Title -->
  <text x="540" y="28" text-anchor="middle" style="font:700 15px 'Inter','Segoe UI',sans-serif;fill:#0f172a">SM_120 HFMA2: Time-Multiplexed FP16 on a 32-bit FMA Datapath</text>
  <text x="540" y="48" text-anchor="middle" style="font:italic 11px 'Inter','Segoe UI',sans-serif;fill:#64748b">2-cycle issue interval, 4-cycle latency — NO throughput advantage over scalar FP32</text>

  <!-- ═══════ Left: SM_120 Pipeline Timing Diagram ═══════ -->
  <g transform="translate(30,64)">
    <rect x="0" y="0" width="540" height="260" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="270" y="22" text-anchor="middle" style="font:700 11.5px 'Inter',sans-serif;fill:#991b1b">SM_120: Single 32-bit FMA Datapath (Time-Multiplexed)</text>

    <!-- Pipeline stages header -->
    <text x="140" y="52" text-anchor="middle" style="font:600 8.5px 'JetBrains Mono',monospace;fill:#6b7280">Stage 1</text>
    <text x="220" y="52" text-anchor="middle" style="font:600 8.5px 'JetBrains Mono',monospace;fill:#6b7280">Stage 2</text>
    <text x="300" y="52" text-anchor="middle" style="font:600 8.5px 'JetBrains Mono',monospace;fill:#6b7280">Stage 3</text>
    <text x="380" y="52" text-anchor="middle" style="font:600 8.5px 'JetBrains Mono',monospace;fill:#6b7280">Stage 4</text>
    <text x="460" y="52" text-anchor="middle" style="font:600 8.5px 'JetBrains Mono',monospace;fill:#6b7280">Result</text>

    <!-- Cycle labels -->
    <text x="16" y="78" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Cyc 0</text>
    <text x="16" y="104" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Cyc 1</text>
    <text x="16" y="130" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Cyc 2</text>
    <text x="16" y="156" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Cyc 3</text>
    <text x="16" y="182" style="font:600 9px 'JetBrains Mono',monospace;fill:#374151">Cyc 4</text>

    <!-- f16[0] (low half) flow - orange -->
    <rect x="100" y="66" width="70" height="20" rx="3" fill="#f97316" opacity="0.8"/>
    <text x="135" y="80" text-anchor="middle" style="font:700 8px 'JetBrains Mono',monospace;fill:#fff">f16[0]</text>
    <rect x="180" y="92" width="70" height="20" rx="3" fill="#f97316" opacity="0.7"/>
    <text x="215" y="106" text-anchor="middle" style="font:600 7px 'JetBrains Mono',monospace;fill:#fff">f16[0]</text>
    <rect x="260" y="118" width="70" height="20" rx="3" fill="#f97316" opacity="0.6"/>
    <text x="295" y="132" text-anchor="middle" style="font:600 7px 'JetBrains Mono',monospace;fill:#fff">f16[0]</text>
    <rect x="340" y="144" width="70" height="20" rx="3" fill="#f97316" opacity="0.5"/>
    <text x="375" y="158" text-anchor="middle" style="font:600 7px 'JetBrains Mono',monospace;fill:#fff">f16[0]</text>
    <rect x="420" y="144" width="70" height="20" rx="3" fill="#16a34a" opacity="0.7"/>
    <text x="455" y="158" text-anchor="middle" style="font:700 7px 'JetBrains Mono',monospace;fill:#fff">READY</text>

    <!-- f16[1] (high half) flow - purple -->
    <rect x="100" y="92" width="70" height="20" rx="3" fill="#7c3aed" opacity="0.8"/>
    <text x="135" y="106" text-anchor="middle" style="font:700 8px 'JetBrains Mono',monospace;fill:#fff">f16[1]</text>
    <rect x="180" y="118" width="70" height="20" rx="3" fill="#7c3aed" opacity="0.7"/>
    <text x="215" y="132" text-anchor="middle" style="font:600 7px 'JetBrains Mono',monospace;fill:#fff">f16[1]</text>
    <rect x="260" y="144" width="70" height="20" rx="3" fill="#7c3aed" opacity="0.6"/>
    <text x="295" y="158" text-anchor="middle" style="font:600 7px 'JetBrains Mono',monospace;fill:#fff">f16[1]</text>
    <rect x="340" y="170" width="70" height="20" rx="3" fill="#7c3aed" opacity="0.5"/>
    <text x="375" y="184" text-anchor="middle" style="font:600 7px 'JetBrains Mono',monospace;fill:#fff">f16[1]</text>
    <rect x="420" y="170" width="70" height="20" rx="3" fill="#16a34a" opacity="0.7"/>
    <text x="455" y="184" text-anchor="middle" style="font:700 7px 'JetBrains Mono',monospace;fill:#fff">READY</text>

    <!-- Pipe occupied indicator -->
    <rect x="80" y="66" width="14" height="46" rx="2" fill="#dc2626" opacity="0.3"/>
    <text x="87" y="95" text-anchor="middle" style="font:700 7px 'Inter',sans-serif;fill:#dc2626;writing-mode:tb">BUSY</text>

    <!-- Summary metrics -->
    <g transform="translate(16,206)">
      <rect x="0" y="0" width="510" height="40" rx="4" fill="#7f1d1d" opacity="0.08"/>
      <text x="16" y="16" style="font:700 9.5px 'JetBrains Mono',monospace;fill:#991b1b">Issue interval: 2 cyc (pipe occupied for 2 consecutive cycles)</text>
      <text x="16" y="34" style="font:700 9.5px 'JetBrains Mono',monospace;fill:#991b1b">Latency: 4 cyc (both halves ready at cycle 4, packed into result register)</text>
    </g>
  </g>

  <!-- ═══════ Right: SM_80/90 vs SM_120 Comparison ═══════ -->
  <g transform="translate(590,64)">
    <rect x="0" y="0" width="460" height="260" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="230" y="22" text-anchor="middle" style="font:700 11.5px 'Inter',sans-serif;fill:#1d4ed8">Architecture Comparison</text>

    <!-- SM_80/90 model -->
    <g transform="translate(16,38)">
      <text x="0" y="14" style="font:700 10px 'Inter',sans-serif;fill:#166534">SM_80/SM_90 (Ampere/Hopper):</text>
      <text x="0" y="32" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">  Dedicated 2×16-bit wide FMA datapath</text>
      <text x="0" y="48" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">  Both f16 lanes processed in parallel</text>
      <text x="0" y="64" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">  Issue interval: 1 cyc → 2× throughput vs FP32</text>
      <rect x="0" y="72" width="420" height="18" rx="3" fill="#16a34a" opacity="0.15"/>
      <text x="210" y="86" text-anchor="middle" style="font:700 9px 'JetBrains Mono',monospace;fill:#166534">FP16 throughput = 2× FP32 throughput</text>
    </g>

    <!-- SM_120 model -->
    <g transform="translate(16,130)">
      <text x="0" y="14" style="font:700 10px 'Inter',sans-serif;fill:#991b1b">SM_120 (Blackwell consumer):</text>
      <text x="0" y="32" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">  Single 32-bit FMA reused for both halves</text>
      <text x="0" y="48" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">  f16 lanes processed sequentially (TDM)</text>
      <text x="0" y="64" style="font:500 9.5px 'JetBrains Mono',monospace;fill:#374151">  Issue interval: 2 cyc → same throughput as FP32</text>
      <rect x="0" y="72" width="420" height="18" rx="3" fill="#dc2626" opacity="0.15"/>
      <text x="210" y="86" text-anchor="middle" style="font:700 9px 'JetBrains Mono',monospace;fill:#991b1b">FP16 throughput = 1× FP32 throughput (NO advantage)</text>
    </g>

    <!-- Throughput comparison -->
    <g transform="translate(16,222)">
      <text x="0" y="14" style="font:600 9.5px 'Inter',sans-serif;fill:#475569">For FP16 compute on SM_120: use Tensor Cores (258× ALU throughput)</text>
    </g>
  </g>

  <!-- ═══════ Bottom: Evidence Summary ═══════ -->
  <g transform="translate(30,340)">
    <rect x="0" y="0" width="1020" height="126" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.8"/>
    <text x="510" y="22" text-anchor="middle" style="font:700 11.5px 'Inter',sans-serif;fill:#1e293b">Measurement Evidence (3 independent confirmations)</text>

    <g transform="translate(16,38)">
      <!-- Evidence 1 -->
      <rect x="0" y="0" width="320" height="72" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="0.8"/>
      <text x="160" y="16" text-anchor="middle" style="font:700 9px 'Inter',sans-serif;fill:#1e40af">ILP Saturation</text>
      <text x="12" y="34" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">HFMA2 saturates at ILP=2</text>
      <text x="12" y="50" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">FFMA  saturates at ILP=4</text>
      <text x="12" y="66" style="font:italic 8px 'Inter',sans-serif;fill:#6b7280">→ HFMA2 pipeline depth = latency/issue = 4/2 = 2</text>

      <!-- Evidence 2 -->
      <rect x="340" y="0" width="320" height="72" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="0.8"/>
      <text x="500" y="16" text-anchor="middle" style="font:700 9px 'Inter',sans-serif;fill:#92400e">Mixed Execution (Case 55)</text>
      <text x="352" y="34" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">HFMA2+FFMA measured: 194 cyc</text>
      <text x="352" y="50" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">Serialization predicted: 192 cyc</text>
      <text x="352" y="66" style="font:italic 8px 'Inter',sans-serif;fill:#6b7280">→ Same pipe, zero overlap (compete for slot)</text>

      <!-- Evidence 3 -->
      <rect x="680" y="0" width="320" height="72" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="0.8"/>
      <text x="840" y="16" text-anchor="middle" style="font:700 9px 'Inter',sans-serif;fill:#166534">Element Throughput</text>
      <text x="692" y="34" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">HFMA2: 2 f16 / 2 cyc = 1 elem/cyc</text>
      <text x="692" y="50" style="font:500 8.5px 'JetBrains Mono',monospace;fill:#374151">FFMA:  1 f32 / 1 cyc = 1 elem/cyc</text>
      <text x="692" y="66" style="font:italic 8px 'Inter',sans-serif;fill:#6b7280">→ Identical per-element throughput</text>
    </g>
  </g>
</svg>
