    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#374151"/>
    </marker>
    <style><![CDATA[
      .eyebrow{font:600 11px "JetBrains Mono",monospace;letter-spacing:0.14em;text-transform:uppercase}
      .title{font:500 22px "Fraunces",serif;fill:#0b1220;letter-spacing:-0.02em}
      .sub{font:italic 11px "Fraunces",serif;fill:#5b6679}
      .sect{font:600 11px "JetBrains Mono",monospace;letter-spacing:0.05em;text-transform:uppercase;fill:#374151}
      .lbl{font:600 11px "JetBrains Mono",monospace;fill:#2a3548}
      .lbl-sm{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .kpi-val{font:700 18px "JetBrains Mono",monospace}
      .kpi-sm{font:700 14px "JetBrains Mono",monospace}
      .kpi-unit{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .stage{font:600 10px "JetBrains Mono",monospace;fill:#fff}
      .num{font:700 13px "JetBrains Mono",monospace}
      .cliff-txt{font:700 11px "JetBrains Mono",monospace}
      .disc-title{font:600 11px "JetBrains Mono",monospace}
