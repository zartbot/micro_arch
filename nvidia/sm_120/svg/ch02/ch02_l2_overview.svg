<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" role="img"
     aria-label="SM_120 L2 Cache Overview — 96 MB, 12 partitions, XOR-hashed, 13768 GB/s aggregate bandwidth">
  <defs>
    <linearGradient id="l2G" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E0E7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="partG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DBEAFE"/><stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="mcG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FEF3C7"/><stop offset="1" stop-color="#FFFBEB"/>
    </linearGradient>
    <linearGradient id="dramG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FEE2E2"/><stop offset="1" stop-color="#FEF2F2"/>
    </linearGradient>
    <linearGradient id="smG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D1FAE5"/><stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="hashG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3E8FF"/><stop offset="1" stop-color="#FAF5FF"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
    <style><![CDATA[
      .ttl{font:600 15px "Fraunces",serif;fill:#0b1220}
      .sub{font:italic 11px "Fraunces",serif;fill:#5b6679}
      .lbl{font:600 11px "JetBrains Mono",monospace;fill:#2a3548}
      .lbl-sm{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .num{font:700 13px "JetBrains Mono",monospace}
      .num-lg{font:700 20px "JetBrains Mono",monospace}
      .num-xl{font:700 26px "JetBrains Mono",monospace}
      .stage{font:600 10px "JetBrains Mono",monospace;fill:#fff}
      .sect{font:600 12px "Fraunces",serif;fill:#374151}
      .badge-txt{font:700 10px "JetBrains Mono",monospace;fill:#fff}
      .insight{font:600 10.5px "IBM Plex Sans",sans-serif;fill:#9f1239}
      .metric-val{font:700 15px "JetBrains Mono",monospace}
      .metric-lbl{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
    ]]></style>
  </defs>
  <rect width="1080" height="540" fill="#ffffff"/>

  <!-- Title -->
  <text x="36" y="28" class="ttl">SM_120 L2 Cache — Architecture Overview</text>
  <text x="36" y="46" class="sub">96 MB unified L2 with XOR-hashed set indexing, 12 partitions (one per memory controller), 4.17× bandwidth amplification over DRAM</text>

  <!-- ═══════════ TOP ROW: KEY METRICS ═══════════ -->
  <!-- Capacity -->
  <g transform="translate(36,62)">
    <rect width="165" height="72" rx="10" fill="url(#l2G)" stroke="#4338CA" stroke-width="1.2"/>
    <text x="82" y="22" class="metric-lbl" text-anchor="middle">CAPACITY</text>
    <text x="82" y="48" class="num-xl" fill="#4338CA" text-anchor="middle">96 MB</text>
    <text x="82" y="64" class="lbl-sm" text-anchor="middle">API confirmed</text>
  </g>

  <!-- Partitions -->
  <g transform="translate(215,62)">
    <rect width="165" height="72" rx="10" fill="url(#l2G)" stroke="#4338CA" stroke-width="1.2"/>
    <text x="82" y="22" class="metric-lbl" text-anchor="middle">PARTITIONS</text>
    <text x="82" y="48" class="num-xl" fill="#4338CA" text-anchor="middle">12</text>
    <text x="82" y="64" class="lbl-sm" text-anchor="middle">1 per memory controller</text>
  </g>

  <!-- Latency -->
  <g transform="translate(394,62)">
    <rect width="165" height="72" rx="10" fill="url(#l2G)" stroke="#4338CA" stroke-width="1.2"/>
    <text x="82" y="22" class="metric-lbl" text-anchor="middle">HIT LATENCY</text>
    <text x="82" y="48" class="num-xl" fill="#4338CA" text-anchor="middle">354</text>
    <text x="82" y="64" class="lbl-sm" text-anchor="middle">cycles (pointer-chase)</text>
  </g>

  <!-- Aggregate BW -->
  <g transform="translate(573,62)">
    <rect width="195" height="72" rx="10" fill="url(#smG)" stroke="#059669" stroke-width="1.2"/>
    <text x="97" y="22" class="metric-lbl" text-anchor="middle">AGGREGATE BW</text>
    <text x="97" y="48" class="num-lg" fill="#059669" text-anchor="middle">13,768 GB/s</text>
    <text x="97" y="64" class="lbl-sm" text-anchor="middle">4.17× over DRAM</text>
  </g>

  <!-- Line/Sector -->
  <g transform="translate(782,62)">
    <rect width="135" height="72" rx="10" fill="url(#mcG)" stroke="#D97706" stroke-width="1.2"/>
    <text x="67" y="22" class="metric-lbl" text-anchor="middle">LINE / SECTOR</text>
    <text x="67" y="44" class="num" fill="#92400E" text-anchor="middle">128B tag</text>
    <text x="67" y="62" class="num" fill="#92400E" text-anchor="middle">32B fetch</text>
  </g>

  <!-- Associativity -->
  <g transform="translate(931,62)">
    <rect width="113" height="72" rx="10" fill="url(#hashG)" stroke="#7C3AED" stroke-width="1.2"/>
    <text x="56" y="22" class="metric-lbl" text-anchor="middle">ASSOC.</text>
    <text x="56" y="48" class="num-lg" fill="#7C3AED" text-anchor="middle">~16</text>
    <text x="56" y="64" class="lbl-sm" text-anchor="middle">way XOR-hash</text>
  </g>

  <!-- ═══════════ MIDDLE: PARTITION ARCHITECTURE ═══════════ -->
  <text x="36" y="160" class="sect">12-PARTITION ARCHITECTURE — XOR Hash Interleaving (uniform ~370 cyc across all strides)</text>

  <!-- L1/SM cluster at top -->
  <g transform="translate(36,175)">
    <rect width="1008" height="36" rx="8" fill="url(#smG)" stroke="#059669" stroke-width="1"/>
    <text x="504" y="14" class="lbl" fill="#065F46" text-anchor="middle">110 SMs → GXBAR Crossbar → L2 Partitions (GPU-scope coherence point: fence.gpu = 285 cyc)</text>
    <text x="504" y="28" class="lbl-sm" text-anchor="middle">L1 miss → L2 access: 8.0× latency cliff (44 cyc → 354 cyc) — THE MEMORY WALL on SM_120</text>
  </g>

  <!-- 12 partition boxes -->
  <g transform="translate(36,222)">
    <!-- Partition 0 -->
    <rect x="0" y="0" width="80" height="70" rx="6" fill="url(#partG)" stroke="#2563EB" stroke-width="1"/>
    <text x="40" y="16" class="badge-txt" fill="#1D4ED8" text-anchor="middle">P0</text>
    <text x="40" y="32" class="lbl-sm" text-anchor="middle">8 MB</text>
    <text x="40" y="46" class="lbl-sm" text-anchor="middle">~16-way</text>
    <text x="40" y="60" class="lbl-sm" text-anchor="middle">pseudo-LRU</text>
    <!-- P1 -->
    <rect x="84" y="0" width="80" height="70" rx="6" fill="url(#partG)" stroke="#2563EB" stroke-width="1"/>
    <text x="124" y="16" class="badge-txt" fill="#1D4ED8" text-anchor="middle">P1</text>
    <text x="124" y="32" class="lbl-sm" text-anchor="middle">8 MB</text>
    <text x="124" y="46" class="lbl-sm" text-anchor="middle">~16-way</text>
    <text x="124" y="60" class="lbl-sm" text-anchor="middle">pseudo-LRU</text>
    <!-- P2 -->
    <rect x="168" y="0" width="80" height="70" rx="6" fill="url(#partG)" stroke="#2563EB" stroke-width="1"/>
    <text x="208" y="16" class="badge-txt" fill="#1D4ED8" text-anchor="middle">P2</text>
    <text x="208" y="32" class="lbl-sm" text-anchor="middle">8 MB</text>
    <text x="208" y="46" class="lbl-sm" text-anchor="middle">~16-way</text>
    <text x="208" y="60" class="lbl-sm" text-anchor="middle">pseudo-LRU</text>
    <!-- P3-P5 dots -->
    <rect x="252" y="0" width="80" height="70" rx="6" fill="url(#partG)" stroke="#2563EB" stroke-width="0.6" stroke-dasharray="3 2"/>
    <text x="292" y="38" class="lbl-sm" text-anchor="middle">P3</text>
    <rect x="336" y="0" width="80" height="70" rx="6" fill="url(#partG)" stroke="#2563EB" stroke-width="0.6" stroke-dasharray="3 2"/>
    <text x="376" y="38" class="lbl-sm" text-anchor="middle">P4</text>
    <rect x="420" y="0" width="80" height="70" rx="6" fill="url(#partG)" stroke="#2563EB" stroke-width="0.6" stroke-dasharray="3 2"/>
    <text x="460" y="38" class="lbl-sm" text-anchor="middle">...</text>
    <!-- P9 -->
    <rect x="504" y="0" width="80" height="70" rx="6" fill="url(#partG)" stroke="#2563EB" stroke-width="0.6" stroke-dasharray="3 2"/>
    <text x="544" y="38" class="lbl-sm" text-anchor="middle">P9</text>
    <!-- P10 -->
    <rect x="588" y="0" width="80" height="70" rx="6" fill="url(#partG)" stroke="#2563EB" stroke-width="1"/>
    <text x="628" y="16" class="badge-txt" fill="#1D4ED8" text-anchor="middle">P10</text>
    <text x="628" y="32" class="lbl-sm" text-anchor="middle">8 MB</text>
    <text x="628" y="46" class="lbl-sm" text-anchor="middle">~16-way</text>
    <text x="628" y="60" class="lbl-sm" text-anchor="middle">pseudo-LRU</text>
    <!-- P11 -->
    <rect x="672" y="0" width="80" height="70" rx="6" fill="url(#partG)" stroke="#2563EB" stroke-width="1"/>
    <text x="712" y="16" class="badge-txt" fill="#1D4ED8" text-anchor="middle">P11</text>
    <text x="712" y="32" class="lbl-sm" text-anchor="middle">8 MB</text>
    <text x="712" y="46" class="lbl-sm" text-anchor="middle">~16-way</text>
    <text x="712" y="60" class="lbl-sm" text-anchor="middle">pseudo-LRU</text>

    <!-- XOR hash annotation -->
    <g transform="translate(770,0)">
      <rect width="238" height="70" rx="8" fill="url(#hashG)" stroke="#7C3AED" stroke-width="1"/>
      <text x="119" y="18" class="lbl" fill="#7C3AED" text-anchor="middle">XOR Hash Interleave</text>
      <text x="119" y="36" class="lbl-sm" text-anchor="middle">Eliminates stride-dependent</text>
      <text x="119" y="50" class="lbl-sm" text-anchor="middle">conflicts across ALL partitions</text>
      <text x="119" y="64" class="lbl-sm" text-anchor="middle">Uniform ~370 cyc any stride</text>
    </g>
  </g>

  <!-- Arrows down to MC/DRAM -->
  <g transform="translate(36,298)">
    <line x1="40" y1="0" x2="40" y2="18" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="124" y1="0" x2="124" y2="18" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="208" y1="0" x2="208" y2="18" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="628" y1="0" x2="628" y2="18" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="712" y1="0" x2="712" y2="18" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
  </g>

  <!-- Memory controllers -->
  <g transform="translate(36,320)">
    <rect width="752" height="30" rx="6" fill="url(#mcG)" stroke="#D97706" stroke-width="1"/>
    <text x="376" y="20" class="lbl" fill="#92400E" text-anchor="middle">12 × Memory Controllers (MC) — 32-bit GDDR7 channels — closed-page auto-precharge — 4-way bank group interleave</text>
  </g>

  <!-- Arrow to DRAM -->
  <g transform="translate(36,354)">
    <line x1="376" y1="0" x2="376" y2="18" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
  </g>

  <!-- DRAM -->
  <g transform="translate(36,376)">
    <rect width="752" height="30" rx="6" fill="url(#dramG)" stroke="#DC2626" stroke-width="1"/>
    <text x="376" y="20" class="lbl" fill="#DC2626" text-anchor="middle">GDDR7 DRAM — 72 GB — 384-bit bus (12×32b) — 1231 GB/s read — 362 cyc latency — L2→DRAM ratio = 1.02×</text>
  </g>

  <!-- ═══════════ BOTTOM: KEY CHARACTERISTICS ═══════════ -->
  <text x="36" y="430" class="sect">KEY L2 CHARACTERISTICS</text>

  <!-- Feature boxes -->
  <g transform="translate(36,442)">
    <!-- BW Amplification -->
    <rect width="240" height="52" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1"/>
    <text x="15" y="18" class="lbl" fill="#065F46">4.17× BW Amplification</text>
    <text x="15" y="34" class="lbl-sm">L2: 5110 GB/s vs DRAM: 1227 GB/s</text>
    <text x="15" y="46" class="lbl-sm">Thrashing cliff at 96–112 MB WS</text>
  </g>
  <g transform="translate(290,442)">
    <!-- Contention invariant -->
    <rect width="240" height="52" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
    <text x="15" y="18" class="lbl" fill="#1D4ED8">Contention Invariant</text>
    <text x="15" y="34" class="lbl-sm">~372 cyc stable at 0–109 CTAs</text>
    <text x="15" y="46" class="lbl-sm">Latency unaffected by traffic</text>
  </g>
  <g transform="translate(544,442)">
    <!-- Persistence -->
    <rect width="240" height="52" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
    <text x="15" y="18" class="lbl" fill="#92400E">Persistence Window</text>
    <text x="15" y="34" class="lbl-sm">60 MB max persisting region</text>
    <text x="15" y="46" class="lbl-sm">13.3% latency reduction when active</text>
  </g>
  <g transform="translate(798,442)">
    <!-- Partition camping -->
    <rect width="240" height="52" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1"/>
    <text x="15" y="18" class="lbl" fill="#DC2626">⚠ Partition Camping</text>
    <text x="15" y="34" class="lbl-sm">stride=64B → 8.6% of peak (11.6×)</text>
    <text x="15" y="46" class="lbl-sm">3×-multiples also affected (GDDR7)</text>
  </g>

  <!-- Bottom insight -->
  <g transform="translate(36,508)">
    <rect width="1008" height="24" rx="5" fill="#F0FDF4" stroke="#059669" stroke-width="0.8"/>
    <text x="20" y="16" class="insight">L2's primary value is BANDWIDTH (4.17× over DRAM), not latency (1.02× ratio). The true "memory wall" is L1→L2 at 8.0× (44→354 cyc).</text>
  </g>
</svg>
