<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" role="img"
     aria-label="SM_120 Synchronization Primitives — decision tree showing scope, mechanism, cost, and PTX/SASS for each synchronization level">
  <defs>
    <linearGradient id="warpG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D1FAE5"/><stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="ctaG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DBEAFE"/><stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="clusterG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3E8FF"/><stop offset="1" stop-color="#FAF5FF"/>
    </linearGradient>
    <linearGradient id="gpuG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FEF3C7"/><stop offset="1" stop-color="#FFFBEB"/>
    </linearGradient>
    <linearGradient id="sysG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FEE2E2"/><stop offset="1" stop-color="#FEF2F2"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
    <style><![CDATA[
      .ttl{font:600 15px "Fraunces",serif;fill:#0b1220}
      .sub{font:italic 11px "Fraunces",serif;fill:#5b6679}
      .lbl{font:600 11px "JetBrains Mono",monospace;fill:#2a3548}
      .lbl-sm{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .code{font:500 10px "JetBrains Mono",monospace}
      .num{font:700 13px "JetBrains Mono",monospace}
      .num-lg{font:700 18px "JetBrains Mono",monospace}
      .stage{font:600 10px "JetBrains Mono",monospace;fill:#fff}
      .sect{font:600 12px "Fraunces",serif;fill:#374151}
      .insight{font:600 10.5px "IBM Plex Sans",sans-serif;fill:#9f1239}
    ]]></style>
  </defs>
  <rect width="1080" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="36" y="28" class="ttl">SM_120 Synchronization Primitives — Scope Selection Guide</text>
  <text x="36" y="46" class="sub">Choose the narrowest sufficient scope: cost spans 1800x from intra-warp (0 cyc) to system-scope (920 cyc)</text>

  <!-- Root question -->
  <g transform="translate(380,60)">
    <rect width="320" height="32" rx="16" fill="#374151"/>
    <text x="160" y="21" class="stage" text-anchor="middle" style="font-size:11px">What scope of visibility do you need?</text>
  </g>

  <!-- Connecting lines from root to 5 branches -->
  <line x1="420" y1="92" x2="108" y2="120" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="470" y1="92" x2="310" y2="120" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="540" y1="92" x2="540" y2="120" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="610" y1="92" x2="750" y2="120" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="660" y1="92" x2="952" y2="120" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ═══════ BRANCH 1: Intra-Warp ═══════ -->
  <g transform="translate(16,124)">
    <rect width="192" height="190" rx="10" fill="url(#warpG)" stroke="#059669" stroke-width="1.2"/>
    <rect x="8" y="6" width="90" height="16" rx="4" fill="#059669"/>
    <text x="53" y="18" class="stage" text-anchor="middle">INTRA-WARP</text>
    <text x="96" y="40" class="num-lg" fill="#059669" text-anchor="middle">0–1 cyc</text>
    <text x="12" y="60" class="lbl">Primitives:</text>
    <text x="12" y="76" class="code" fill="#065F46">__shfl_sync()</text>
    <text x="12" y="90" class="code" fill="#065F46">__ballot_sync()</text>
    <text x="12" y="104" class="code" fill="#065F46">__syncwarp()</text>
    <text x="12" y="122" class="lbl-sm">SASS: SHFL / VOTE / NOP</text>
    <text x="12" y="138" class="lbl-sm">No memory ordering</text>
    <text x="12" y="154" class="lbl-sm">Register-to-register only</text>
    <text x="12" y="172" class="code" fill="#059669">Cost: 0 cyc (elided)</text>
  </g>

  <!-- ═══════ BRANCH 2: Intra-CTA ═══════ -->
  <g transform="translate(220,124)">
    <rect width="192" height="190" rx="10" fill="url(#ctaG)" stroke="#2563EB" stroke-width="1.2"/>
    <rect x="8" y="6" width="80" height="16" rx="4" fill="#2563EB"/>
    <text x="48" y="18" class="stage" text-anchor="middle">INTRA-CTA</text>
    <text x="96" y="40" class="num-lg" fill="#1D4ED8" text-anchor="middle">1–7 cyc</text>
    <text x="12" y="60" class="lbl">Primitives:</text>
    <text x="12" y="76" class="code" fill="#1D4ED8">bar.sync (1 cyc)</text>
    <text x="12" y="90" class="code" fill="#1D4ED8">fence.acq_rel.cta (7)</text>
    <text x="12" y="104" class="code" fill="#1D4ED8">fence.sc.cta (6)</text>
    <text x="12" y="122" class="lbl-sm">SASS: BAR.SYNC.DEFER</text>
    <text x="12" y="136" class="lbl-sm">      MEMBAR.SC.CTA</text>
    <text x="12" y="154" class="lbl-sm">Store buffer → L1 drain</text>
    <text x="12" y="172" class="code" fill="#1D4ED8">Visible: single SM</text>
  </g>

  <!-- ═══════ BRANCH 3: Intra-Cluster ═══════ -->
  <g transform="translate(424,124)">
    <rect width="210" height="190" rx="10" fill="url(#clusterG)" stroke="#7C3AED" stroke-width="1.2"/>
    <rect x="8" y="6" width="110" height="16" rx="4" fill="#7C3AED"/>
    <text x="63" y="18" class="stage" text-anchor="middle">INTRA-CLUSTER</text>
    <text x="105" y="40" class="num-lg" fill="#7C3AED" text-anchor="middle">85–376 cyc</text>
    <text x="12" y="60" class="lbl">Primitives:</text>
    <text x="12" y="76" class="code" fill="#6D28D9">barrier.cluster.relaxed</text>
    <text x="12" y="90" class="code" fill="#6D28D9">  (85 cyc)</text>
    <text x="12" y="104" class="code" fill="#6D28D9">barrier.cluster (376)</text>
    <text x="12" y="118" class="code" fill="#6D28D9">mbarrier.arrive (31)</text>
    <text x="12" y="136" class="lbl-sm">SASS: UCGABAR_ARV</text>
    <text x="12" y="150" class="lbl-sm">CGA barrier fabric</text>
    <text x="12" y="166" class="lbl-sm">O(1) scaling with size</text>
    <text x="12" y="180" class="code" fill="#6D28D9">Visible: cluster SMs</text>
  </g>

  <!-- ═══════ BRANCH 4: Cross-SM (GPU) ═══════ -->
  <g transform="translate(646,124)">
    <rect width="198" height="190" rx="10" fill="url(#gpuG)" stroke="#D97706" stroke-width="1.2"/>
    <rect x="8" y="6" width="80" height="16" rx="4" fill="#D97706"/>
    <text x="48" y="18" class="stage" text-anchor="middle">GPU-WIDE</text>
    <text x="99" y="40" class="num-lg" fill="#92400E" text-anchor="middle">285–393 cyc</text>
    <text x="12" y="60" class="lbl">Primitives:</text>
    <text x="12" y="76" class="code" fill="#92400E">fence.acq_rel.gpu (285)</text>
    <text x="12" y="90" class="code" fill="#92400E">ld.acquire.gpu (393)</text>
    <text x="12" y="104" class="code" fill="#92400E">st.release.gpu (920)</text>
    <text x="12" y="122" class="lbl-sm">SASS: MEMBAR.ALL.GPU</text>
    <text x="12" y="136" class="lbl-sm">      LDG.E.STRONG.GPU</text>
    <text x="12" y="154" class="lbl-sm">GXBAR + L2 drain + ack</text>
    <text x="12" y="172" class="code" fill="#92400E">Visible: all 110 SMs</text>
  </g>

  <!-- ═══════ BRANCH 5: System ═══════ -->
  <g transform="translate(856,124)">
    <rect width="192" height="190" rx="10" fill="url(#sysG)" stroke="#DC2626" stroke-width="1.2"/>
    <rect x="8" y="6" width="70" height="16" rx="4" fill="#DC2626"/>
    <text x="43" y="18" class="stage" text-anchor="middle">SYSTEM</text>
    <text x="96" y="40" class="num-lg" fill="#DC2626" text-anchor="middle">920+ cyc</text>
    <text x="12" y="60" class="lbl">Primitives:</text>
    <text x="12" y="76" class="code" fill="#DC2626">fence.acq_rel.sys (920)</text>
    <text x="12" y="90" class="code" fill="#DC2626">st.release.sys (1320)</text>
    <text x="12" y="104" class="code" fill="#DC2626">fence.proxy.alias(853)</text>
    <text x="12" y="122" class="lbl-sm">SASS: MEMBAR.SC.GPU+SYS</text>
    <text x="12" y="140" class="lbl-sm">GPU drain + PCIe bridge</text>
    <text x="12" y="154" class="lbl-sm">ordering round-trip</text>
    <text x="12" y="172" class="code" fill="#DC2626">Visible: CPU + GPUs</text>
  </g>

  <!-- ═══════ BOTTOM: Cost ratio bar ═══════ -->
  <text x="36" y="330" class="sect">COST HIERARCHY — logarithmic scale (1800x range from cheapest to most expensive)</text>

  <g transform="translate(36,345)">
    <!-- Scale bar -->
    <rect x="0" y="0" width="1008" height="24" rx="4" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="0.5"/>
    <!-- Segments proportional to log scale -->
    <rect x="0" y="0" width="2" height="24" rx="2" fill="#059669"/>
    <rect x="30" y="0" width="50" height="24" fill="#2563EB" opacity="0.7"/>
    <rect x="160" y="0" width="180" height="24" fill="#7C3AED" opacity="0.5"/>
    <rect x="480" y="0" width="200" height="24" fill="#D97706" opacity="0.5"/>
    <rect x="780" y="0" width="228" height="24" fill="#DC2626" opacity="0.4"/>
    <!-- Labels -->
    <text x="1" y="40" class="lbl-sm">0 cyc</text>
    <text x="55" y="40" class="lbl-sm">7 cyc</text>
    <text x="250" y="40" class="lbl-sm">85–376 cyc</text>
    <text x="570" y="40" class="lbl-sm">285–393 cyc</text>
    <text x="870" y="40" class="lbl-sm">920–1320 cyc</text>
  </g>

  <!-- ═══════ BOTTOM: Proxy fences ═══════ -->
  <text x="36" y="416" class="sect">PROXY FENCES — specialized ordering for async operations (TMA, cp.async)</text>

  <g transform="translate(36,430)">
    <rect width="320" height="55" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
    <text x="15" y="18" class="lbl" fill="#065F46">fence.proxy.async.shared::cta</text>
    <text x="15" y="34" class="num" fill="#059669">7 cyc</text>
    <text x="80" y="34" class="lbl-sm">— CTA-local async ordering</text>
    <text x="15" y="48" class="lbl-sm">Use: TMA pipeline (near-free)</text>
  </g>
  <g transform="translate(376,430)">
    <rect width="320" height="55" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
    <text x="15" y="18" class="lbl" fill="#92400E">fence.proxy.async (global)</text>
    <text x="15" y="34" class="num" fill="#D97706">163 cyc</text>
    <text x="80" y="34" class="lbl-sm">— global async ordering</text>
    <text x="15" y="48" class="lbl-sm">Use: cross-CTA async completion</text>
  </g>
  <g transform="translate(716,430)">
    <rect width="320" height="55" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1"/>
    <text x="15" y="18" class="lbl" fill="#DC2626">fence.proxy.alias</text>
    <text x="15" y="34" class="num" fill="#DC2626">853 cyc</text>
    <text x="80" y="34" class="lbl-sm">— full system alias fence</text>
    <text x="15" y="48" class="lbl-sm">Use: memory re-interpretation (rare)</text>
  </g>

  <!-- Key insight -->
  <g transform="translate(36,500)">
    <rect width="1008" height="44" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="0.8"/>
    <text x="20" y="16" class="insight">KEY: SC = acq_rel on SM_120 (zero overhead for sequential consistency at any scope). SM_120 is already TSO-like.</text>
    <text x="20" y="34" class="lbl-sm">Rule: Always use the narrowest scope that satisfies your visibility requirement. CTA→GPU cliff is 40.7x; GPU→SYS cliff is 3.2x.</text>
  </g>
</svg>
