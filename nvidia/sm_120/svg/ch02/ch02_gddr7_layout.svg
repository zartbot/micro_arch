<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" role="img"
     aria-label="GDDR7 channel architecture: 16 channels × 4 bank groups × N banks, closed-page row policy">
  <defs>
    <linearGradient id="chG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFEDD5"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FEF3C7"/>
      <stop offset="1" stop-color="#FFFBEB"/>
    </linearGradient>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#9a3412"/>
    </marker>
    <style><![CDATA[
      .ttl{font:600 14px "Fraunces",serif;fill:#0b1220}
      .sub{font:italic 11px "Fraunces",serif;fill:#5b6679}
      .lbl{font:600 11px "JetBrains Mono",monospace;fill:#2a3548}
      .lbl-sm{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .num{font:600 18px "Fraunces",serif;fill:#0b1220}
    ]]></style>
  </defs>
  <rect width="1080" height="480" fill="#ffffff"/>
  <text x="36" y="32" class="ttl">GDDR7 Channel Architecture · 16 channels × 4 bank groups · 128 B interleave · closed-page</text>
  <text x="36" y="52" class="sub">384-bit aggregate bus = 16 × 24-bit PAM3 channels · 28 Gbps/pin · auto-precharge (no row-buffer hit benefit)</text>

  <!-- Channel rack -->
  <g transform="translate(36,80)">
    <rect x="0" y="0" width="1008" height="200" rx="12" fill="#fcfbf6" stroke="#e6e4da"/>
    <text x="20" y="22" class="lbl">16 Channels (showing channel 0 expansion)</text>

    <!-- Row of 16 channel boxes -->
    <g transform="translate(20,36)">
      <rect x="0"   y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/>
      <text x="28"  y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 0</text>
      <text x="28"  y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text>
      <g transform="translate(60,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 1</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(120,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 2</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(180,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 3</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(240,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 4</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(300,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 5</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(360,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 6</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(420,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 7</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(480,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 8</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(540,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 9</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(600,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 10</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(660,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 11</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(720,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 12</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(780,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 13</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(840,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 14</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
      <g transform="translate(900,0)"><rect x="0" y="0" width="56" height="36" rx="6" fill="url(#chG)" stroke="#ea580c" stroke-width="0.8"/><text x="28" y="14" class="lbl-sm" fill="#9a3412" text-anchor="middle">CH 15</text><text x="28" y="28" class="lbl-sm" fill="#9a3412" text-anchor="middle">24-bit</text></g>
    </g>

    <!-- expansion arrow -->
    <path d="M48 76 L48 100" stroke="#9a3412" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

    <!-- 4 bank groups in channel 0 -->
    <g transform="translate(20,108)">
      <text x="0" y="0" class="lbl" fill="#9a3412">Channel 0 — 4 Bank Groups (128 B interleaved)</text>
      <g transform="translate(0,8)">
        <rect x="0"   y="0" width="240" height="68" rx="8" fill="url(#bgG)" stroke="#b45309" stroke-width="0.8"/>
        <text x="120" y="20" class="lbl" fill="#92400e" text-anchor="middle">Bank Group 0</text>
        <text x="120" y="40" class="lbl-sm" fill="#92400e" text-anchor="middle">N banks (parallel access within group)</text>
        <text x="120" y="56" class="lbl-sm" fill="#92400e" text-anchor="middle">addresses 0..127, 512..639, ...</text>

        <g transform="translate(244,0)"><rect x="0" y="0" width="240" height="68" rx="8" fill="url(#bgG)" stroke="#b45309" stroke-width="0.8"/><text x="120" y="20" class="lbl" fill="#92400e" text-anchor="middle">Bank Group 1</text><text x="120" y="40" class="lbl-sm" fill="#92400e" text-anchor="middle">N banks (parallel access within group)</text><text x="120" y="56" class="lbl-sm" fill="#92400e" text-anchor="middle">addresses 128..255, 640..767, ...</text></g>
        <g transform="translate(488,0)"><rect x="0" y="0" width="240" height="68" rx="8" fill="url(#bgG)" stroke="#b45309" stroke-width="0.8"/><text x="120" y="20" class="lbl" fill="#92400e" text-anchor="middle">Bank Group 2</text><text x="120" y="40" class="lbl-sm" fill="#92400e" text-anchor="middle">N banks (parallel access within group)</text><text x="120" y="56" class="lbl-sm" fill="#92400e" text-anchor="middle">addresses 256..383, 768..895, ...</text></g>
        <g transform="translate(732,0)"><rect x="0" y="0" width="240" height="68" rx="8" fill="url(#bgG)" stroke="#b45309" stroke-width="0.8"/><text x="120" y="20" class="lbl" fill="#92400e" text-anchor="middle">Bank Group 3</text><text x="120" y="40" class="lbl-sm" fill="#92400e" text-anchor="middle">N banks (parallel access within group)</text><text x="120" y="56" class="lbl-sm" fill="#92400e" text-anchor="middle">addresses 384..511, 896..1023, ...</text></g>
      </g>
    </g>
  </g>

  <!-- Latency / closed-page summary -->
  <g transform="translate(36,300)">
    <rect x="0" y="0" width="496" height="158" rx="10" fill="#fcfbf6" stroke="#e6e4da"/>
    <text x="14" y="22" class="lbl">Closed-page (auto-precharge) row policy</text>
    <text x="14" y="40" class="lbl-sm">No intra-row hit benefit · every access pays full ACT + CAS</text>
    <text x="14" y="74" class="num">362 ± 10<tspan font-size="11" dx="6" fill="#5b6679">cyc · pattern-independent</tspan></text>
    <text x="14" y="92" class="lbl-sm">page-hit / page-miss delta only ~10 cyc</text>
    <text x="14" y="120" class="lbl">Same-bank serialization (closed-page tRP wait)</text>
    <text x="14" y="140" class="lbl-sm">stride &lt; 640 B → +445 cyc penalty (S24/case_8)</text>
  </g>
  <g transform="translate(548,300)">
    <rect x="0" y="0" width="496" height="158" rx="10" fill="#fcfbf6" stroke="#e6e4da"/>
    <text x="14" y="22" class="lbl">Bandwidth &amp; R/W asymmetry</text>
    <text x="14" y="40" class="lbl-sm">Read 1231 GB/s · Write 1186 GB/s · ratio 1.02–1.07 (near-symmetric)</text>
    <text x="14" y="74" class="num">1344<tspan font-size="11" dx="6" fill="#5b6679">GB/s theoretical</tspan></text>
    <text x="14" y="92" class="lbl-sm">measured 91.6% of theoretical · CV &lt; 1%</text>
    <text x="14" y="120" class="lbl">3× stride pathology (GDDR7-specific)</text>
    <text x="14" y="140" class="lbl-sm">stride 768 B = 258 GB/s (bank-group conflict, all hit BG0)</text>
  </g>
</svg>
