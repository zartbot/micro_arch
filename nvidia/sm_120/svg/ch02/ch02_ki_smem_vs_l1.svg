  </g>
  <g transform="translate(416,38)">
    <rect width="260" height="55" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
    <text x="130" y="20" class="lbl" fill="#1D4ED8" text-anchor="middle">L1 Cache</text>
    <text x="130" y="44" class="num-lg" fill="#2563EB" text-anchor="middle">44.0 cyc</text>
  </g>
