<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 920" role="img"
     aria-label="Chapter 01 summary: SM_120 Architecture Overview — chip topology, SM microstructure, memory hierarchy, tensor core, feature matrix vs SM_100, and 5 key insights">
  <defs>
    <linearGradient id="gHero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b1220"/><stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9F3D2"/><stop offset="1" stop-color="#F4FAE2"/>
    </linearGradient>
    <style><![CDATA[
      .eyebrow{font:600 10px "JetBrains Mono",monospace;letter-spacing:0.16em;text-transform:uppercase}
      .title  {font:500 24px "Fraunces",serif;fill:#ffffff;letter-spacing:-0.02em}
      .chip   {font:700 13px "JetBrains Mono",monospace;fill:#76b900}
      .sub    {font:italic 11px "Fraunces",serif;fill:#94a3b8}
      .ttl    {font:600 12px "JetBrains Mono",monospace;letter-spacing:0.04em}
      .lbl    {font:600 11px "JetBrains Mono",monospace;fill:#2a3548}
      .lbl-sm {font:500 9.5px "JetBrains Mono",monospace;fill:#5b6679}
      .lbl-xs {font:400 8.5px "JetBrains Mono",monospace;fill:#6b7280}
      .kpi-val{font:700 20px "Fraunces",serif;fill:#0b1220;letter-spacing:-0.01em}
      .kpi-unit{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .insight{font:500 11px "IBM Plex Sans",sans-serif;fill:#2a3548}
      .section{font:600 12px "IBM Plex Sans",sans-serif}
      .badge  {font:700 9px "JetBrains Mono",monospace;fill:#ffffff}
      .perf   {font:700 10px "JetBrains Mono",monospace;fill:#9f1239}
    ]]></style>
  </defs>
  <rect width="1080" height="920" fill="#fcfbf6"/>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- HERO BANNER -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="1080" height="80" fill="url(#gHero)"/>
  <rect x="0" y="78" width="1080" height="3" fill="#76b900"/>
  <text x="36" y="36" class="title">Architecture Overview</text>
  <text x="36" y="52" class="eyebrow" fill="#76b900">SM_120 / GB202 Blackwell · RTX PRO 5000 72 GB · 1542 microbenchmark cases</text>
  <!-- Chip badge -->
  <rect x="820" y="16" width="240" height="48" rx="8" fill="#1e293b" stroke="#76b900" stroke-width="1"/>
  <text x="840" y="36" class="chip">SM_120 · CC 12.0</text>
  <text x="840" y="54" class="lbl-sm" fill="#e9ebef">GB202 die · Blackwell family</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- ROW 1: CHIP TOPOLOGY (3 columns) -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <g transform="translate(24,96)">
    <text x="12" y="18" class="ttl" fill="#5a8e00">CHIP TOPOLOGY</text>

    <!-- KPI cards row -->
    <g transform="translate(0,28)">
      <!-- SM Count -->
      <rect x="0" y="0" width="160" height="66" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <rect x="0" y="0" width="160" height="3" rx="8" fill="#5a8e00"/>
      <text x="12" y="20" class="lbl-sm">SM Count</text>
      <text x="12" y="48" class="kpi-val">110</text>
      <text x="47" y="48" class="kpi-unit">of ~120 </text>
      <text x="42" y="60" class="kpi-unit">(8.3% harvest)</text>

      <!-- GPC layout -->
      <rect x="172" y="0" width="160" height="66" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <rect x="172" y="0" width="160" height="3" rx="8" fill="#5a8e00"/>
      <text x="184" y="20" class="lbl-sm">GPC × SM/GPC</text>
      <text x="184" y="48" class="kpi-val">11 × 10</text>
      <text x="260" y="48" class="kpi-unit">5 TPC×2</text>

      <!-- Clock -->
      <rect x="344" y="0" width="160" height="66" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <rect x="344" y="0" width="160" height="3" rx="8" fill="#5a8e00"/>
      <text x="356" y="20" class="lbl-sm">Boost Clock (locked)</text>
      <text x="356" y="48" class="kpi-val">2572</text>
      <text x="416" y="48" class="kpi-unit">MHz</text>

      <!-- TDP -->
      <rect x="516" y="0" width="160" height="66" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <rect x="516" y="0" width="160" height="3" rx="8" fill="#5a8e00"/>
      <text x="528" y="20" class="lbl-sm">Max Power (measured)</text>
      <text x="528" y="48" class="kpi-val">232 W</text>
      <text x="600" y="48" class="kpi-unit">/ 350 TDP</text>

      <!-- PCIe -->
      <rect x="688" y="0" width="160" height="66" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <rect x="688" y="0" width="160" height="3" rx="8" fill="#5a8e00"/>
      <text x="700" y="20" class="lbl-sm">Interconnect</text>
      <text x="700" y="48" class="kpi-val">PCIe 5</text>
      <text x="754" y="48" class="kpi-unit">×16 · No NVLink</text>

      <!-- CUDA -->
      <rect x="860" y="0" width="172" height="66" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <rect x="860" y="0" width="172" height="3" rx="8" fill="#5a8e00"/>
      <text x="872" y="20" class="lbl-sm">CUDA Toolkit</text>
      <text x="872" y="48" class="kpi-val">13.3</text>
      <text x="916" y="48" class="kpi-unit">Driver 610.43</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- ROW 2: SM MICROSTRUCTURE + MEMORY HIERARCHY (two panels) -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <g transform="translate(24,204)">
    <!-- SM Microstructure panel -->
    <rect x="0" y="0" width="520" height="210" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="16" y="22" class="ttl" fill="#1d4ed8">SM MICROSTRUCTURE</text>

    <!-- 4 SMSP mini-blocks -->
    <g transform="translate(16,34)">
      <rect x="0" y="0" width="110" height="56" rx="5" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8"/>
      <text x="55" y="16" class="lbl" text-anchor="middle" fill="#1d4ed8">SMSP 0</text>
      <text x="55" y="32" class="lbl-xs" text-anchor="middle">12 warps</text>
      <text x="55" y="46" class="lbl-xs" text-anchor="middle">1 insn/cyc</text>

      <rect x="118" y="0" width="110" height="56" rx="5" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8"/>
      <text x="173" y="16" class="lbl" text-anchor="middle" fill="#1d4ed8">SMSP 1</text>
      <text x="173" y="32" class="lbl-xs" text-anchor="middle">12 warps</text>
      <text x="173" y="46" class="lbl-xs" text-anchor="middle">1 insn/cyc</text>

      <rect x="236" y="0" width="110" height="56" rx="5" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.7"/>
      <text x="291" y="30" class="lbl-xs" text-anchor="middle">SMSP 2</text>

      <rect x="354" y="0" width="110" height="56" rx="5" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.7"/>
      <text x="409" y="30" class="lbl-xs" text-anchor="middle">SMSP 3</text>
    </g>

    <!-- Pipe backends -->
    <g transform="translate(16,100)">
      <text x="0" y="12" class="lbl" fill="#1d4ed8">6 Independent Pipes per SMSP:</text>
      <g transform="translate(0,20)">
        <rect x="0" y="0" width="72" height="22" rx="4" fill="#16a34a"/><text x="36" y="15" class="badge" text-anchor="middle">FMA-lite</text>
        <rect x="76" y="0" width="78" height="22" rx="4" fill="#047857"/><text x="115" y="15" class="badge" text-anchor="middle">FMA-heavy</text>
        <rect x="158" y="0" width="56" height="22" rx="4" fill="#475569"/><text x="186" y="15" class="badge" text-anchor="middle">XU</text>
        <rect x="218" y="0" width="56" height="22" rx="4" fill="#b45309"/><text x="246" y="15" class="badge" text-anchor="middle">LSU</text>
        <rect x="278" y="0" width="56" height="22" rx="4" fill="#6d28d9"/><text x="306" y="15" class="badge" text-anchor="middle">FP64</text>
        <rect x="338" y="0" width="72" height="22" rx="4" fill="#dc2626"/><text x="374" y="15" class="badge" text-anchor="middle">Tensor</text>
      </g>
      <text x="0" y="56" class="lbl-xs">FMA: 4 cyc · XU: 18-44 cyc · LSU/L1: 44 cyc · FP64: 64 cyc · TC: 29 cyc</text>
      <text x="0" y="70" class="lbl-xs">CGGTY scheduler · IPC ceiling 4.0 (measured 3.66) · 0-cyc ctx switch</text>
      <text x="0" y="84" class="lbl-xs">2-bank RF (R%2) · RFC ≥24 entries · 6 SB counters/warp · ILP=2 saturates</text>
    </g>
  </g>

  <!-- Memory Hierarchy panel -->
  <g transform="translate(556,204)">
    <rect x="0" y="0" width="500" height="210" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
    <text x="16" y="22" class="ttl" fill="#92400e">MEMORY HIERARCHY</text>

    <!-- Latency ladder (simplified) -->
    <g transform="translate(16,36)">
      <!-- L1 -->
      <rect x="0" y="0" width="460" height="32" rx="5" fill="#ffffff" stroke="#d97706" stroke-width="0.6"/>
      <rect x="0" y="0" width="40" height="32" rx="5" fill="#16a34a"/>
      <text x="20" y="20" class="badge" text-anchor="middle">L1</text>
      <text x="54" y="14" class="lbl" fill="#15803d">89 KB</text>
      <text x="54" y="28" class="lbl-xs">44 cyc · 116.5 B/cyc · pattern-invariant</text>
      <text x="370" y="20" class="perf">44 cyc</text>

      <!-- L2 -->
      <rect x="0" y="38" width="460" height="32" rx="5" fill="#ffffff" stroke="#d97706" stroke-width="0.6"/>
      <rect x="0" y="38" width="40" height="32" rx="5" fill="#3b82f6"/>
      <text x="20" y="58" class="badge" text-anchor="middle">L2</text>
      <text x="54" y="52" class="lbl" fill="#1d4ed8">96 MB (12 partitions)</text>
      <text x="54" y="66" class="lbl-xs">354 cyc · 13768 GB/s aggregate · XOR hash</text>
      <text x="370" y="58" class="perf">354 cyc</text>

      <!-- DRAM -->
      <rect x="0" y="76" width="460" height="32" rx="5" fill="#ffffff" stroke="#d97706" stroke-width="0.6"/>
      <rect x="0" y="76" width="40" height="32" rx="5" fill="#7c3aed"/>
      <text x="20" y="96" class="badge" text-anchor="middle">DRAM</text>
      <text x="54" y="90" class="lbl" fill="#5b21b6">72 GB GDDR7</text>
      <text x="54" y="104" class="lbl-xs">362±10 cyc · 1231 GB/s (91.6%) · 12 MC</text>
      <text x="370" y="96" class="perf">362 cyc</text>
    </g>

    <!-- Key memory facts -->
    <g transform="translate(16,154)">
      <text x="0" y="12" class="lbl-xs">• XOR-hash interleaving: no partition camping (flat BW, CV ~2%)</text>
      <text x="0" y="28" class="lbl-xs">• Closed-page policy: +445 cyc same-bank penalty (stride &lt; 640B)</text>
      <text x="0" y="44" class="lbl-xs">• Near-symmetric R/W: 1.02-1.07× ratio (independent channels)</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- ROW 3: TENSOR CORE + FEATURE DELTA vs SM_100 -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <g transform="translate(24,430)">
    <!-- Tensor Core panel -->
    <rect x="0" y="0" width="420" height="180" rx="10" fill="#fff1f2" stroke="#dc2626" stroke-width="1"/>
    <text x="16" y="22" class="ttl" fill="#991b1b">TENSOR CORE (mma.sync only)</text>

    <g transform="translate(16,36)">
      <!-- MMA families -->
      <rect x="0" y="0" width="86" height="24" rx="4" fill="#dc2626"/><text x="43" y="16" class="badge" text-anchor="middle">HMMA</text>
      <rect x="90" y="0" width="86" height="24" rx="4" fill="#e11d48"/><text x="133" y="16" class="badge" text-anchor="middle">QMMA</text>
      <rect x="180" y="0" width="86" height="24" rx="4" fill="#be123c"/><text x="223" y="16" class="badge" text-anchor="middle">QMMA.SF</text>
      <rect x="270" y="0" width="86" height="24" rx="4" fill="#9f1239"/><text x="313" y="16" class="badge" text-anchor="middle">OMMA.SF</text>

      <rect x="0" y="30" width="86" height="24" rx="4" fill="#7f1d1d"/><text x="43" y="46" class="badge" text-anchor="middle">IMMA</text>
      <rect x="90" y="30" width="86" height="24" rx="4" fill="#450a0a"/><text x="133" y="46" class="badge" text-anchor="middle">DMMA</text>
      <rect x="180" y="30" width="86" height="24" rx="4" fill="#881337"/><text x="223" y="46" class="badge" text-anchor="middle">HMMA.SP</text>

      <text x="0" y="76" class="lbl-xs">Latency: 29 cyc (HMMA/QMMA) · 27 cyc (IMMA) · 579 cyc (DMMA)</text>
      <text x="0" y="92" class="lbl-xs">Throughput: 15.88 cyc/mma · IMMA: 6.55 cyc/mma</text>
      <text x="0" y="108" class="perf">MX block-scale: ZERO cost (15.59 vs 15.88 = Δ1.8%)</text>
      <text x="0" y="126" class="lbl-xs">FP8/FP6/FP4 dense + MX formats · 22+ shape/type variants</text>
      <text x="0" y="140" class="lbl-xs">No wgmma · No tcgen05 · No Tensor Memory</text>
    </g>
  </g>

  <!-- Feature Delta panel (SM_120 vs SM_100) -->
  <g transform="translate(460,430)">
    <rect x="0" y="0" width="596" height="180" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1"/>
    <text x="16" y="22" class="ttl" fill="#334155">SM_120 vs SM_100 — CRITICAL DELTAS</text>

    <g transform="translate(16,36)">
      <!-- Present on SM_120 -->
      <text x="0" y="12" class="lbl" fill="#15803d">✓ Present on SM_120:</text>
      <text x="0" y="28" class="lbl-xs">mma.sync (all shapes) · TMA unicast · Cluster+DSMEM · FP8/FP6/FP4 MMA</text>
      <text x="0" y="42" class="lbl-xs">MX block-scale · setmaxnreg (a/f) · Sparse MMA · SIMD 8×4 · 256-bit LDG/STG</text>

      <!-- Absent on SM_120 -->
      <text x="0" y="68" class="lbl" fill="#991b1b">✗ Absent on SM_120 (vs SM_100):</text>
      <g transform="translate(0,76)">
        <rect x="0" y="0" width="120" height="20" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="0.5"/><text x="60" y="14" class="lbl-xs" text-anchor="middle" fill="#991b1b">Tensor Memory</text>
        <rect x="126" y="0" width="80" height="20" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="0.5"/><text x="166" y="14" class="lbl-xs" text-anchor="middle" fill="#991b1b">tcgen05</text>
        <rect x="212" y="0" width="72" height="20" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="0.5"/><text x="248" y="14" class="lbl-xs" text-anchor="middle" fill="#991b1b">wgmma</text>
        <rect x="290" y="0" width="100" height="20" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="0.5"/><text x="340" y="14" class="lbl-xs" text-anchor="middle" fill="#991b1b">TMA multicast</text>
        <rect x="396" y="0" width="72" height="20" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="0.5"/><text x="432" y="14" class="lbl-xs" text-anchor="middle" fill="#991b1b">NVLink</text>
        <rect x="474" y="0" width="100" height="20" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="0.5"/><text x="524" y="14" class="lbl-xs" text-anchor="middle" fill="#991b1b">2SM coop</text>
      </g>

      <!-- Implication -->
      <text x="0" y="114" class="lbl-xs">→ Warp-level mma.sync with explicit SMEM staging (no register-fed wgmma)</text>
      <text x="0" y="128" class="lbl-xs">→ CUTLASS: ClusterShape&lt;1,1,1&gt; forced (no operand sharing)</text>
      <text x="0" y="142" class="lbl-xs">→ Optimization: maximize per-CTA tile size, avoid cluster-cooperative patterns</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- ROW 4: KEY INSIGHTS (full-width) -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <g transform="translate(24,626)">
    <rect x="0" y="0" width="1032" height="274" rx="12" fill="url(#gGreen)" stroke="#76b900" stroke-width="1"/>
    <text x="20" y="24" class="ttl" fill="#5a8e00">5 KEY ARCHITECTURAL INSIGHTS</text>

    <!-- KI-1.1 -->
    <g transform="translate(16,40)">
      <rect x="0" y="0" width="490" height="66" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <rect x="0" y="0" width="4" height="66" rx="2" fill="#dc2626"/>
      <text x="14" y="16" class="lbl" fill="#991b1b">KI-1.1 TMA Multicast Hardware Absent</text>
      <text x="14" y="34" class="lbl-xs">SW-emulated via CALL.ABS.NOINC · 2000-8000× latency penalty</text>
      <text x="14" y="48" class="lbl-xs">~4,300 cyc/byte vs unicast 2-4 cyc/byte</text>
      <text x="14" y="62" class="perf">CUTLASS: ClusterShape&lt;1,1,1&gt; mandatory</text>
    </g>

    <!-- KI-1.2 -->
    <g transform="translate(520,40)">
      <rect x="0" y="0" width="496" height="66" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <rect x="0" y="0" width="4" height="66" rx="2" fill="#16a34a"/>
      <text x="14" y="16" class="lbl" fill="#15803d">KI-1.2 Block-Scale (MX) MMA Zero-Cost</text>
      <text x="14" y="34" class="lbl-xs">QMMA.SF = 15.59 cyc/mma vs dense QMMA = 15.88 (Δ=1.8%)</text>
      <text x="14" y="48" class="lbl-xs">Barrel-shift sideband in reduction tree · zero pipeline stages added</text>
      <text x="14" y="62" class="perf">MX quantization is FREE at compute level</text>
    </g>

    <!-- KI-1.3 -->
    <g transform="translate(16,114)">
      <rect x="0" y="0" width="490" height="66" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <rect x="0" y="0" width="4" height="66" rx="2" fill="#1d4ed8"/>
      <text x="14" y="16" class="lbl" fill="#1d4ed8">KI-1.3 Strict 4-SMSP Single-Issue</text>
      <text x="14" y="34" class="lbl-xs">Per-SMSP IPC = 0.92 · Aggregate = 3.66/4.0 · ILP=2 saturates</text>
      <text x="14" y="48" class="lbl-xs">Throughput scales via WLP only (not per-warp ILP beyond 2)</text>
      <text x="14" y="62" class="perf">Unrolling beyond ILP=2 is wasteful</text>
    </g>

    <!-- KI-1.4 -->
    <g transform="translate(520,114)">
      <rect x="0" y="0" width="496" height="66" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <rect x="0" y="0" width="4" height="66" rx="2" fill="#7c3aed"/>
      <text x="14" y="16" class="lbl" fill="#6d28d9">KI-1.4 XOR-Hash L2 — No Partition Camping</text>
      <text x="14" y="34" class="lbl-xs">Flat BW 1056-1121 GB/s (CV ~2%) across all strides 128B-2048B</text>
      <text x="14" y="48" class="lbl-xs">stride=1536B: 99.8% of baseline (vs 8% under modular)</text>
      <text x="14" y="62" class="perf">No padding/swizzle needed for L2/MC</text>
    </g>

    <!-- KI-1.5 -->
    <g transform="translate(16,188)">
      <rect x="0" y="0" width="1000" height="66" rx="8" fill="#ffffff" stroke="#e6e4da"/>
      <rect x="0" y="0" width="4" height="66" rx="2" fill="#b45309"/>
      <text x="14" y="16" class="lbl" fill="#92400e">KI-1.5 GDDR7 Near-Symmetric R/W · Closed-Page · Bank-Level Parallelism</text>
      <text x="14" y="34" class="lbl-xs">Read 1231 GB/s / Write 1171 GB/s (ratio 1.02-1.07×) · Base latency 362 cyc · Same-bank penalty +445 cyc</text>
      <text x="14" y="48" class="lbl-xs">Closed-page (auto-precharge) policy · Bank-level parallelism via stride ≥ 1KB · P99/P50 refresh jitter = 2.48×</text>
      <text x="14" y="62" class="perf">Store-heavy kernels: no HBM write penalty · Tail-latency: keep WS ≤ 96 MB L2</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="36" y="912" class="lbl-xs">SM_120 · GB202 · RTX PRO 5000 72 GB · CUDA 13.3 · 2572 MHz locked · test_results/SM_120/ sections 0-3, 8-13, 20-26</text>
</svg>
