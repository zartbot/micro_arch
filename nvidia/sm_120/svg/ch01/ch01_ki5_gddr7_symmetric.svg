<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 440" role="img"
     aria-label="KI-1.5: GDDR7 closed-page policy with bank-level parallelism — near-symmetric R/W, +445 cyc same-bank penalty">
<defs>
  <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
    <path d="M0,0 L7,3.5 L0,7 z" fill="#475569"/>
  </marker>
  <style><![CDATA[
    .ttl{font:700 14px "Fraunces",serif;fill:#0b1220}
    .sub{font:italic 11px "Fraunces",serif;fill:#5b6679}
    .lbl{font:600 11px "JetBrains Mono",monospace;fill:#2a3548}
    .lbl-sm{font:500 9.5px "JetBrains Mono",monospace;fill:#5b6679}
    .lbl-xs{font:400 8.5px "JetBrains Mono",monospace;fill:#040404}
    .perf{font:700 10px "JetBrains Mono",monospace;fill:#9f1239}
    .badge{font:700 9px "JetBrains Mono",monospace;fill:#ffffff}
    .section{font:600 12px "IBM Plex Sans",sans-serif}
  ]]></style>
</defs>
<rect width="1100" height="440" fill="#ffffff"/>
<text x="36" y="28" class="ttl">KI-1.5: GDDR7 Closed-Page Policy with Bank-Level Parallelism</text>
<text x="36" y="46" class="sub">Source: S8/case_81, S21/case_74-75, S24/case_8,11 · 12 MC × 28 Gbps GDDR7 · Near-symmetric R/W</text>

<!-- === LEFT: Timing diagram === -->
<g transform="translate(36,66)">
  <rect x="0" y="0" width="560" height="350" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/>
  <text x="280" y="22" class="section" text-anchor="middle" fill="#92400e">DRAM Access Timeline (Closed-Page)</text>

  <!-- Same-bank access (bad) -->
  <g transform="translate(20,42)">
    <text x="0" y="12" class="lbl" fill="#991b1b">Same-Bank Consecutive Access (stride &lt; 640B):</text>
    <!-- Timeline bar -->
    <rect x="0" y="22" width="520" height="28" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="0.6"/>
    <!-- Phases -->
    <rect x="2" y="24" width="36" height="24" rx="2" fill="#93c5fd"/><text x="20" y="40" class="lbl-xs" text-anchor="middle">L2</text>
    <rect x="40" y="24" width="50" height="24" rx="2" fill="#a5b4fc"/><text x="65" y="40" class="lbl-xs" text-anchor="middle">MC Q</text>
    <rect x="92" y="24" width="60" height="24" rx="2" fill="#818cf8"/><text x="122" y="40" class="lbl-xs" text-anchor="middle">ACT</text>
    <rect x="154" y="24" width="60" height="24" rx="2" fill="#6366f1"/><text x="184" y="40" class="lbl-xs" text-anchor="middle" fill="#fff">CAS</text>
    <rect x="216" y="24" width="190" height="24" rx="2" fill="#dc2626"/><text x="311" y="40" class="lbl-xs" text-anchor="middle" fill="#fff">tRP wait (+445 cyc!)</text>
    <rect x="408" y="24" width="110" height="24" rx="2" fill="#a78bfa"/><text x="463" y="40" class="lbl-xs" text-anchor="middle">data ret</text>
    <text x="0" y="68" class="perf">Total: ~880 cyc (matches S21/case_73: 882.7 cyc)</text>
  </g>

  <!-- Different-bank access (good) -->
  <g transform="translate(20,132)">
    <text x="0" y="12" class="lbl" fill="#15803d">Different-Bank Access (stride ≥ 1280B):</text>
    <!-- Timeline bar -->
    <rect x="0" y="22" width="300" height="28" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="0.6"/>
    <!-- Phases (no tRP wait!) -->
    <rect x="2" y="24" width="36" height="24" rx="2" fill="#93c5fd"/><text x="20" y="40" class="lbl-xs" text-anchor="middle">L2</text>
    <rect x="40" y="24" width="50" height="24" rx="2" fill="#a5b4fc"/><text x="65" y="40" class="lbl-xs" text-anchor="middle">MC Q</text>
    <rect x="92" y="24" width="60" height="24" rx="2" fill="#818cf8"/><text x="122" y="40" class="lbl-xs" text-anchor="middle">ACT</text>
    <rect x="154" y="24" width="60" height="24" rx="2" fill="#6366f1"/><text x="184" y="40" class="lbl-xs" text-anchor="middle" fill="#fff">CAS</text>
    <rect x="216" y="24" width="80" height="24" rx="2" fill="#a78bfa"/><text x="256" y="40" class="lbl-xs" text-anchor="middle">data</text>
    <text x="310" y="40" class="lbl-sm" fill="#16a34a">← tRP overlaps with next bank ACT</text>
    <text x="0" y="68" class="perf" fill="#16a34a">Total: ~370 cyc (S24/case_8 baseline)</text>
  </g>

  <!-- R/W symmetry -->
  <g transform="translate(20,220)">
    <rect x="0" y="0" width="520" height="110" rx="6" fill="#ffffff" stroke="#d97706" stroke-width="0.8"/>
    <text x="10" y="18" class="lbl" fill="#92400e">Near-Symmetric R/W Bandwidth:</text>

    <!-- Read bar -->
    <text x="10" y="40" class="lbl-sm">Read:</text>
    <rect x="60" y="28" width="390" height="18" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.5"/>
    <text x="255" y="42" class="perf" text-anchor="middle">1231 GB/s (91.6%)</text>

    <!-- Write bar -->
    <text x="10" y="68" class="lbl-sm">Write:</text>
    <rect x="60" y="56" width="370" height="18" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="0.5"/>
    <text x="245" y="70" class="perf" text-anchor="middle">1171 GB/s (87.1%)</text>

    <!-- Ratio -->
    <text x="10" y="96" class="lbl-sm">R/W ratio: 1.02–1.07× (near 1:1) — independent R/W channels</text>
  </g>
</g>

<!-- === RIGHT: Bank parallelism model === -->
<g transform="translate(630,66)">
  <rect x="0" y="0" width="430" height="350" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1"/>
  <text x="215" y="22" class="section" text-anchor="middle" fill="#1e3a5f">Bank-Level Parallelism Model</text>

  <!-- GDDR7 channel structure -->
  <g transform="translate(20,40)">
    <text x="0" y="12" class="lbl" fill="#334155">GDDR7 Channel (×12 MCs):</text>
    <!-- 4 bank groups -->
    <g transform="translate(0,22)">
      <rect x="0" y="0" width="90" height="60" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.8"/>
      <text x="45" y="16" class="lbl-xs" text-anchor="middle">Bank Group 0</text>
      <rect x="8" y="22" width="34" height="16" rx="2" fill="#3b82f6"/><text x="25" y="34" class="lbl-xs" text-anchor="middle" fill="#fff">B0</text>
      <rect x="48" y="22" width="34" height="16" rx="2" fill="#3b82f6"/><text x="65" y="34" class="lbl-xs" text-anchor="middle" fill="#fff">B1</text>
      <text x="45" y="54" class="lbl-xs" text-anchor="middle">2 banks</text>

      <rect x="100" y="0" width="90" height="60" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.8"/>
      <text x="145" y="16" class="lbl-xs" text-anchor="middle">Bank Group 1</text>
      <rect x="108" y="22" width="34" height="16" rx="2" fill="#3b82f6"/><text x="125" y="34" class="lbl-xs" text-anchor="middle" fill="#fff">B2</text>
      <rect x="148" y="22" width="34" height="16" rx="2" fill="#3b82f6"/><text x="165" y="34" class="lbl-xs" text-anchor="middle" fill="#fff">B3</text>
      <text x="145" y="54" class="lbl-xs" text-anchor="middle">2 banks</text>

      <rect x="200" y="0" width="90" height="60" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-width="0.8" stroke-dasharray="3 2"/>
      <text x="245" y="34" class="lbl-xs" text-anchor="middle">BG 2..3</text>
    </g>

    <text x="0" y="100" class="lbl-sm">4 bank groups × 2 banks = 8 banks/channel</text>
    <text x="0" y="116" class="lbl-sm">16 channels total (12 MC × dual-channel)</text>
  </g>

  <!-- Key metrics -->
  <g transform="translate(20,180)">
    <rect x="0" y="0" width="390" height="160" rx="6" fill="#fffbeb" stroke="#fde68a"/>
    <text x="10" y="20" class="lbl" fill="#92400e">Key Measured Parameters:</text>
    <text x="10" y="40" class="lbl-sm">Base latency (different bank): 362±10 cyc</text>
    <text x="10" y="58" class="lbl-sm">Same-bank penalty: +445 cyc (tRP serialization)</text>
    <text x="10" y="76" class="lbl-sm">Threshold stride: ≥1280B → different bank</text>
    <text x="10" y="94" class="lbl-sm">Refresh jitter: P99/P50 = 2.48× ratio</text>
    <text x="10" y="118" class="perf">Optimization: stride ≥ 1KB avoids penalty</text>
    <text x="10" y="138" class="lbl-sm">TMA benefits from many parallel requests,</text>
    <text x="10" y="152" class="lbl-sm">not page hits — saturate bank groups</text>
  </g>
</g>
</svg>
