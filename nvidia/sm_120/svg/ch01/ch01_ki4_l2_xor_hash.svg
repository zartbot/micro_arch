<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400" role="img"
     aria-label="KI-1.4: XOR-hash L2 interleaving eliminates partition camping — flat BW across all strides">
<defs>
  <style><![CDATA[
    .ttl{font:700 14px "Fraunces",serif;fill:#0b1220}
    .sub{font:italic 11px "Fraunces",serif;fill:#5b6679}
    .lbl{font:600 11px "JetBrains Mono",monospace;fill:#2a3548}
    .lbl-sm{font:500 9.5px "JetBrains Mono",monospace;fill:#5b6679}
    .lbl-xs{font:400 8.5px "JetBrains Mono",monospace;fill:#0b0c0c}
    .perf{font:700 10px "JetBrains Mono",monospace;fill:#9f1239}
    .badge{font:700 9px "JetBrains Mono",monospace;fill:#ffffff}
    .section{font:600 12px "IBM Plex Sans",sans-serif}
  ]]></style>
</defs>
<rect width="1100" height="400" fill="#ffffff"/>
<text x="36" y="28" class="ttl">KI-1.4: XOR-Hash L2 Interleaving — Partition Camping Eliminated on SM_120</text>
<text x="36" y="46" class="sub">Source: S3/case_6, S3/case_7 · 12 MC partitions · flat BW (CV ~2%) across 128B–2048B strides</text>

<!-- === LEFT: Hash comparison === -->
<g transform="translate(36,66)">
  <rect x="0" y="0" width="440" height="310" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.2"/>
  <text x="220" y="22" class="section" text-anchor="middle" fill="#1e3a5f">Address Hashing Comparison</text>

  <!-- Modular (bad) -->
  <g transform="translate(20,40)">
    <rect x="0" y="0" width="400" height="120" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="0.8"/>
    <text x="10" y="18" class="lbl" fill="#991b1b">Modular Interleaving (legacy)</text>
    <text x="10" y="36" class="lbl-sm">partition = (addr / 128B) % 12</text>
    <!-- MC partition boxes -->
    <g transform="translate(10,46)">
      <rect x="0" y="0" width="30" height="24" rx="3" fill="#fecaca"/><text x="15" y="16" class="lbl-xs" text-anchor="middle">MC0</text>
      <rect x="33" y="0" width="30" height="24" rx="3" fill="#fecaca"/><text x="48" y="16" class="lbl-xs" text-anchor="middle">MC1</text>
      <rect x="66" y="0" width="30" height="24" rx="3" fill="#fecaca"/><text x="81" y="16" class="lbl-xs" text-anchor="middle">MC2</text>
      <rect x="99" y="0" width="20" height="24" rx="3" fill="#fecaca"/><text x="109" y="16" class="lbl-xs" text-anchor="middle">..</text>
      <rect x="122" y="0" width="35" height="24" rx="3" fill="#dc2626"/><text x="140" y="16" class="lbl-xs" text-anchor="middle" fill="#fff">MC11</text>
    </g>
    <text x="10" y="86" class="perf">stride=1536B → ALL traffic to 1 MC!</text>
    <text x="10" y="104" class="lbl-sm">~92% BW loss at stride = 128B × 12 MCs</text>
  </g>

  <!-- XOR Hash (good) -->
  <g transform="translate(20,172)">
    <rect x="0" y="0" width="400" height="120" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="0.8"/>
    <text x="10" y="18" class="lbl" fill="#15803d">XOR-Hash Interleaving (SM_120)</text>
    <text x="10" y="36" class="lbl-sm">partition = bits[11:6] ⊕ bits[17:12] ⊕ bits[23:18]</text>
    <!-- MC partition boxes - all green (uniform) -->
    <g transform="translate(10,46)">
      <rect x="0" y="0" width="30" height="24" rx="3" fill="#bbf7d0"/><text x="15" y="16" class="lbl-xs" text-anchor="middle">MC0</text>
      <rect x="33" y="0" width="30" height="24" rx="3" fill="#bbf7d0"/><text x="48" y="16" class="lbl-xs" text-anchor="middle">MC1</text>
      <rect x="66" y="0" width="30" height="24" rx="3" fill="#bbf7d0"/><text x="81" y="16" class="lbl-xs" text-anchor="middle">MC2</text>
      <rect x="99" y="0" width="20" height="24" rx="3" fill="#bbf7d0"/><text x="109" y="16" class="lbl-xs" text-anchor="middle">..</text>
      <rect x="122" y="0" width="35" height="24" rx="3" fill="#bbf7d0"/><text x="140" y="16" class="lbl-xs" text-anchor="middle">MC11</text>
      <text x="180" y="16" class="lbl-sm" fill="#16a34a">← uniform load</text>
    </g>
    <text x="10" y="86" class="perf" fill="#16a34a">stride=1536B → 99.8% of baseline BW!</text>
    <text x="10" y="104" class="lbl-sm">No stride produces partition camping</text>
  </g>
</g>

<!-- === RIGHT: BW curve === -->
<g transform="translate(520,66)">
  <rect x="0" y="0" width="540" height="310" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1"/>
  <text x="270" y="22" class="section" text-anchor="middle" fill="#1e3a5f">Measured BW vs Stride (S3/case_6)</text>

  <!-- Chart area -->
  <g transform="translate(60,40)">
    <!-- Y axis -->
    <path d="M0 0 L0 220" stroke="#94a3b8" stroke-width="0.8"/>
    <text x="-8" y="8" class="lbl-xs" text-anchor="end">1200</text>
    <text x="-8" y="58" class="lbl-xs" text-anchor="end">1000</text>
    <text x="-8" y="113" class="lbl-xs" text-anchor="end">800</text>
    <text x="-8" y="168" class="lbl-xs" text-anchor="end">600</text>
    <text x="-8" y="218" class="lbl-xs" text-anchor="end">400</text>
    <text x="-48" y="110" class="lbl-xs" text-anchor="middle" transform="rotate(-90,-48,110)">GB/s</text>

    <!-- X axis -->
    <path d="M0 220 L430 220" stroke="#94a3b8" stroke-width="0.8"/>
    <text x="0" y="236" class="lbl-xs">128B</text>
    <text x="80" y="236" class="lbl-xs">256B</text>
    <text x="160" y="236" class="lbl-xs">512B</text>
    <text x="240" y="236" class="lbl-xs">1KB</text>
    <text x="290" y="236" class="lbl-xs">1.5KB</text>
    <text x="360" y="236" class="lbl-xs">2KB</text>
    <text x="200" y="254" class="lbl-sm" text-anchor="middle">Access Stride</text>

    <!-- XOR hash: FLAT line (SM_120 measured) -->
    <polyline points="0,22 40,20 80,18 120,22 160,20 200,18 240,22 290,20 320,22 360,20 400,24 430,28"
      fill="none" stroke="#16a34a" stroke-width="2.5"/>
    <text x="435" y="28" class="lbl-sm" fill="#16a34a">SM_120</text>

    <!-- Modular: catastrophic drop at stride=1536B -->
    <polyline points="0,22 40,20 80,22 120,24 160,22 200,20 240,26 290,200 320,30 360,24 400,22 430,24"
      fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="435" y="200" class="lbl-xs" fill="#dc2626">modular</text>

    <!-- 1536B annotation -->
    <path d="M290 0 L290 220" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="2 2"/>
    <text x="292" y="190" class="perf" fill="#dc2626">1536B</text>
    <text x="292" y="206" class="lbl-xs" fill="#dc2626">(128×12)</text>

    <!-- Flat BW band annotation -->
    <rect x="0" y="14" width="430" height="18" rx="3" fill="#16a34a" opacity="0.08"/>
    <text x="100" y="10" class="lbl-sm" fill="#16a34a">1056–1121 GB/s (CV ~2%)</text>
  </g>
</g>
</svg>
