<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" role="img"
     aria-label="§ 8.2.1 GEMV L2 Caching Sweet Spot — precision-dependent threshold, bandwidth amplification, decode implications">
  <defs>
    <style><![CDATA[
      .eyebrow { font: 600 11px "JetBrains Mono", monospace; letter-spacing: 0.16em; text-transform: uppercase }
      .title   { font: 500 24px "Fraunces", serif; fill: #0b1220; letter-spacing: -0.02em }
      .sub     { font: italic 12px "Fraunces", serif; fill: #5b6679 }
      .panel-h { font: 600 13px "JetBrains Mono", monospace; letter-spacing: 0.06em; fill: #0b1220 }
      .panel-sub { font: italic 11px "Fraunces", serif; fill: #5b6679 }
      .lbl-sm  { font: 500 9px "JetBrains Mono", monospace; fill: #5b6679; letter-spacing: 0.05em; text-transform: uppercase }
      .lbl     { font: 500 11px "IBM Plex Sans", sans-serif; fill: #2a3548 }
      .lbl-mono{ font: 500 10px "JetBrains Mono", monospace; fill: #2a3548 }
      .lbl-mono-em { font: 700 10px "JetBrains Mono", monospace; fill: #0b1220 }
      .lbl-w   { font: 600 10px "IBM Plex Sans", sans-serif; fill: #ffffff }
      .lbl-w-mono { font: 500 9px "JetBrains Mono", monospace; fill: #ffffff }
      .big-num { font: 700 23px "Fraunces", serif }
    ]]></style>
  </defs>

  <rect width="1280" height="900" fill="#fcfbf6"/>

  <!-- ============ Header ============ -->
  <g transform="translate(40,32)">
    <text x="0" y="0" class="eyebrow" fill="#7c3aed">SECTION 8.2.1 · L2 CACHING SWEET SPOT</text>
    <text x="0" y="28" class="title">GEMV L2 Caching Architecture — Precision-Dependent Threshold</text>
    <text x="0" y="50" class="sub">Weight matrix size vs 96 MB L2 capacity determines bandwidth regime; narrower types extend the sweet spot</text>
    <text x="0" y="68" class="lbl-sm">Source: [S19/case_17] · [S21/case_54] · L2 capacity = 96 MB · DRAM peak = 860 GB/s</text>
  </g>

  <!-- ============ Panel A: L2 Threshold Model ============ -->
  <g transform="translate(40,108)">
    <rect x="0" y="0" width="600" height="330" rx="6" fill="#ffffff" stroke="#e2d8c8" stroke-width="0.8"/>
    <text x="14" y="22" class="panel-h">A · L2 CACHE THRESHOLD MODEL</text>
    <text x="14" y="38" class="panel-sub">Weight matrix size = N x K x bytes/elem; L2 capacity = 96 MB</text>

    <!-- Y-axis label -->
    <text x="14" y="70" class="lbl-sm">WEIGHT MATRIX SIZE (MB)</text>

    <!-- L2 capacity line -->
    <line x1="80" y1="140" x2="500" y2="140" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="505" y="144" class="lbl-mono-em" fill="#dc2626">96 MB (L2 cap)</text>

    <!-- Matrix size bars for different precisions at N=K=4096 -->
    <g transform="translate(80,70)">
      <!-- FP32 @ N=4096 -->
      <rect x="20" y="6" width="40" height="128" rx="3" fill="#f59e0b" opacity="0.7"/>
      <text x="40" y="148" class="lbl-sm" text-anchor="middle">FP32</text>
      <text x="40" y="0" class="lbl-mono-em" text-anchor="middle" fill="#b45309">128MB</text>

      <!-- FP16 @ N=4096 -->
      <rect x="100" y="70" width="40" height="64" rx="3" fill="#2563eb" opacity="0.7"/>
      <text x="120" y="148" class="lbl-sm" text-anchor="middle">FP16</text>
      <text x="120" y="64" class="lbl-mono-em" text-anchor="middle" fill="#2563eb">32MB</text>

      <!-- BF16 @ N=4096 -->
      <rect x="180" y="70" width="40" height="64" rx="3" fill="#7c3aed" opacity="0.7"/>
      <text x="200" y="148" class="lbl-sm" text-anchor="middle">BF16</text>
      <text x="200" y="64" class="lbl-mono-em" text-anchor="middle" fill="#7c3aed">32MB</text>

      <!-- INT8 @ N=4096 -->
      <rect x="260" y="102" width="40" height="32" rx="3" fill="#16a34a" opacity="0.7"/>
      <text x="280" y="148" class="lbl-sm" text-anchor="middle">INT8</text>
      <text x="280" y="96" class="lbl-mono-em" text-anchor="middle" fill="#16a34a">16MB</text>
    </g>

    <text x="80" y="240" class="lbl-sm">AT N=K=4096</text>

    <!-- Threshold table -->
    <g transform="translate(80,254)">
      <rect x="0" y="0" width="490" height="60" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.6"/>
      <text x="12" y="16" class="lbl-sm" fill="#5b6679">L2 FITS UP TO (N=K)</text>
      <line x1="12" y1="22" x2="478" y2="22" stroke="#cbd5e1" stroke-width="0.5"/>
      <text x="12" y="38" class="lbl-mono">INT8: N=K ≤ 9800</text>
      <text x="170" y="38" class="lbl-mono">FP16/BF16: N=K ≤ 6930</text>
      <text x="370" y="38" class="lbl-mono">FP32: N=K ≤ 4900</text>
      <text x="12" y="54" class="lbl-mono" fill="#5b6679">Formula: N*K*bytes ≤ 96 MB → N=K ≤ sqrt(96M / bytes_per_elem)</text>
    </g>
  </g>

  <!-- ============ Panel B: Bandwidth by Regime ============ -->
  <g transform="translate(660,108)">
    <rect x="0" y="0" width="580" height="330" rx="6" fill="#ffffff" stroke="#e2d8c8" stroke-width="0.8"/>
    <text x="14" y="22" class="panel-h">B · MEASURED BANDWIDTH BY PRECISION AND REGIME</text>
    <text x="14" y="38" class="panel-sub">Below threshold = L2-cached (super-DRAM); above threshold = DRAM-saturated</text>

    <!-- DRAM peak reference line -->
    <line x1="180" y1="280" x2="180" y2="54" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="4,2"/>
    <text x="185" y="64" class="lbl-sm" fill="#dc2626">DRAM PEAK 860 GB/s</text>

    <!-- Bandwidth bars (horizontal) -->
    <!-- INT8 N=8192 (L2-cached) -->
    <g transform="translate(14,72)">
      <text x="0" y="12" class="lbl-mono-em" fill="#16a34a">INT8 @N=8192</text>
      <rect x="120" y="0" width="360" height="22" rx="3" fill="#16a34a" opacity="0.75"/>
      <text x="488" y="14" class="lbl-mono-em" fill="#16a34a">2780 GB/s</text>
      <text x="124" y="14" class="lbl-w-mono">L2-CACHED (3.2x DRAM)</text>
    </g>

    <!-- BF16 N=4096 (L2-cached) -->
    <g transform="translate(14,106)">
      <text x="0" y="12" class="lbl-mono-em" fill="#7c3aed">BF16 @N=4096</text>
      <rect x="120" y="0" width="296" height="22" rx="3" fill="#7c3aed" opacity="0.7"/>
      <text x="424" y="14" class="lbl-mono-em" fill="#7c3aed">2297 GB/s</text>
      <text x="124" y="14" class="lbl-w-mono">L2-CACHED (2.7x DRAM)</text>
    </g>

    <!-- FP16 N=4096 (L2-cached) -->
    <g transform="translate(14,140)">
      <text x="0" y="12" class="lbl-mono-em" fill="#2563eb">FP16 @N=4096</text>
      <rect x="120" y="0" width="236" height="22" rx="3" fill="#2563eb" opacity="0.7"/>
      <text x="364" y="14" class="lbl-mono-em" fill="#2563eb">1832 GB/s</text>
      <text x="124" y="14" class="lbl-w-mono">L2-CACHED (2.1x DRAM)</text>
    </g>

    <!-- FP32 N=1024 (L2-cached) -->
    <g transform="translate(14,174)">
      <text x="0" y="12" class="lbl-mono-em" fill="#f59e0b">FP32 @N=1024</text>
      <rect x="120" y="0" width="164" height="22" rx="3" fill="#f59e0b" opacity="0.7"/>
      <text x="292" y="14" class="lbl-mono-em" fill="#b45309">1269 GB/s</text>
      <text x="124" y="14" class="lbl-w-mono">L2-CACHED (1.5x)</text>
    </g>

    <!-- Separator -->
    <line x1="14" y1="210" x2="560" y2="210" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="4,2"/>
    <text x="14" y="224" class="lbl-sm" fill="#dc2626">ABOVE THRESHOLD → DRAM-BOUND</text>

    <!-- FP16 N=8192 (DRAM-bound) -->
    <g transform="translate(14,236)">
      <text x="0" y="12" class="lbl-mono" fill="#5b6679">FP16 @N=8192</text>
      <rect x="120" y="0" width="112" height="22" rx="3" fill="#94a3b8" opacity="0.6"/>
      <text x="240" y="14" class="lbl-mono" fill="#5b6679">860-879 GB/s (98% DRAM peak)</text>
    </g>

    <!-- Key insight -->
    <g transform="translate(14,274)">
      <rect x="0" y="0" width="546" height="40" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="0.6"/>
      <text x="12" y="16" class="lbl-mono-em" fill="#15803d">KEY INSIGHT: Bandwidth jumps 2-3x when weight matrix fits in L2</text>
      <text x="12" y="32" class="lbl-mono" fill="#15803d">Narrower types extend the sweet spot to larger N×K dimensions</text>
    </g>
  </g>

  <!-- ============ Panel C: L2 Amplification Factor ============ -->
  <g transform="translate(40,458)">
    <rect x="0" y="0" width="580" height="220" rx="6" fill="#ffffff" stroke="#e2d8c8" stroke-width="0.8"/>
    <text x="14" y="22" class="panel-h">C · L2 AMPLIFICATION FACTOR (BW / DRAM_PEAK)</text>
    <text x="14" y="38" class="panel-sub">How much faster than DRAM when weight matrix fits in L2 cache</text>

    <!-- Amplification bars -->
    <g transform="translate(14,56)">
      <!-- INT8: 3.2x -->
      <text x="0" y="14" class="lbl-mono-em">INT8:</text>
      <rect x="60" y="2" width="320" height="18" rx="2" fill="#16a34a" opacity="0.7"/>
      <text x="388" y="14" class="big-num" fill="#16a34a" font-size="16">3.2x</text>
      <text x="70" y="14" class="lbl-mono" fill="#5b6679">4x smaller matrix → much better L2 reuse</text>

      <!-- BF16: 2.7x -->
      <text x="0" y="46" class="lbl-mono-em">BF16:</text>
      <rect x="60" y="34" width="270" height="18" rx="2" fill="#7c3aed" opacity="0.7"/>
      <text x="338" y="46" class="big-num" fill="#7c3aed" font-size="16">2.7x</text>
      <text x="70" y="46" class="lbl-mono" fill="#5b6679">cuBLAS BF16 kernel more L2-optimized</text>

      <!-- FP16: 2.1x -->
      <text x="0" y="78" class="lbl-mono-em">FP16:</text>
      <rect x="60" y="66" width="210" height="18" rx="2" fill="#2563eb" opacity="0.7"/>
      <text x="278" y="78" class="big-num" fill="#2563eb" font-size="16">2.1x</text>
      <text x="70" y="78" class="lbl-mono" fill="#5b6679">L2 serves from cache, not DRAM</text>

      <!-- FP32: 1.5x -->
      <text x="0" y="110" class="lbl-mono-em">FP32:</text>
      <rect x="60" y="98" width="150" height="18" rx="2" fill="#f59e0b" opacity="0.7"/>
      <text x="218" y="110" class="big-num" fill="#b45309" font-size="16">1.5x</text>
      <text x="270" y="110" class="lbl-mono" fill="#5b6679">Larger element → fewer cache lines reused</text>
    </g>

    <!-- Formula -->
    <g transform="translate(14,180)">
      <rect x="0" y="0" width="546" height="26" rx="3" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.5"/>
      <text x="12" y="17" class="lbl-mono" fill="#5b6679">Amplification = Measured_BW / DRAM_peak (860 GB/s) · Valid only when N*K*bytes ≤ 96 MB</text>
    </g>
  </g>

  <!-- ============ Panel D: Decode Implications ============ -->
  <g transform="translate(640,458)">
    <rect x="0" y="0" width="600" height="220" rx="6" fill="#ffffff" stroke="#e2d8c8" stroke-width="0.8"/>
    <text x="14" y="22" class="panel-h">D · DECODE INFERENCE IMPLICATIONS</text>
    <text x="14" y="38" class="panel-sub">Practical guidance for LLM serving architecture based on L2 threshold</text>

    <!-- Two-zone model -->
    <g transform="translate(14,56)">
      <!-- L2-cached zone -->
      <rect x="0" y="0" width="270" height="100" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="0.8"/>
      <text x="12" y="18" class="lbl-sm" fill="#15803d">L2-CACHED ZONE</text>
      <text x="12" y="36" class="lbl-mono">hidden_dim ≤ 4096</text>
      <text x="12" y="52" class="lbl-mono">(GPT-3 scale)</text>
      <text x="12" y="72" class="lbl-mono-em" fill="#15803d">BW: 1832-2780 GB/s</text>
      <text x="12" y="88" class="lbl-mono" fill="#15803d">W8 quant: 3.2x speedup</text>

      <!-- DRAM-bound zone -->
      <rect x="290" y="0" width="270" height="100" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="0.8"/>
      <text x="302" y="18" class="lbl-sm" fill="#dc2626">DRAM-BOUND ZONE</text>
      <text x="302" y="36" class="lbl-mono">hidden_dim ≥ 8192</text>
      <text x="302" y="52" class="lbl-mono">(LLaMA-70B scale)</text>
      <text x="302" y="72" class="lbl-mono-em" fill="#dc2626">BW: ~860 GB/s (capped)</text>
      <text x="302" y="88" class="lbl-mono" fill="#dc2626">Quant still helps via 2x N fit</text>
    </g>

    <!-- Key takeaway -->
    <g transform="translate(14,168)">
      <rect x="0" y="0" width="566" height="38" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="0.6"/>
      <text x="12" y="16" class="lbl-mono-em" fill="#b45309">QUANTIZATION JUSTIFICATION:</text>
      <text x="12" y="32" class="lbl-mono" fill="#b45309">W4/W8 throughput gain comes from L2 caching behavior, NOT faster compute</text>
    </g>
  </g>

  <!-- ============ Panel E: BF16 > FP16 Anomaly ============ -->
  <g transform="translate(40,698)">
    <rect x="0" y="0" width="1200" height="188" rx="6" fill="#ffffff" stroke="#e2d8c8" stroke-width="0.8"/>
    <text x="14" y="22" class="panel-h">E · BF16 > FP16 ANOMALY AND ARCHITECTURAL SUMMARY</text>

    <!-- BF16 vs FP16 comparison -->
    <g transform="translate(14,42)">
      <rect x="0" y="0" width="460" height="134" rx="4" fill="#f5f3ff" stroke="#7c3aed" stroke-width="0.6"/>
      <text x="12" y="18" class="lbl-sm" fill="#7c3aed">BF16 vs FP16 AT SAME N=K=4096</text>
      <line x1="12" y1="24" x2="448" y2="24" stroke="#7c3aed" stroke-width="0.3"/>

      <text x="12" y="42" class="lbl-mono">BF16 GEMV bandwidth:</text>
      <text x="200" y="42" class="lbl-mono-em" fill="#7c3aed">2297 GB/s</text>

      <text x="12" y="62" class="lbl-mono">FP16 GEMV bandwidth:</text>
      <text x="200" y="62" class="lbl-mono-em" fill="#2563eb">1832 GB/s</text>

      <text x="12" y="82" class="lbl-mono">Difference:</text>
      <text x="200" y="82" class="lbl-mono-em" fill="#dc2626">+25% (BF16 faster)</text>

      <text x="12" y="104" class="lbl-mono" fill="#5b6679">Same HMMA.16816 pipe → difference is purely</text>
      <text x="12" y="118" class="lbl-mono" fill="#5b6679">in cuBLAS kernel memory access pattern (tiling/prefetch)</text>
    </g>

    <!-- Architecture summary -->
    <g transform="translate(490,42)">
      <rect x="0" y="0" width="696" height="134" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.6"/>
      <text x="12" y="18" class="lbl-sm" fill="#5b6679">ARCHITECTURAL SUMMARY</text>
      <line x1="12" y1="24" x2="684" y2="24" stroke="#cbd5e1" stroke-width="0.5"/>

      <text x="12" y="42" class="lbl-mono-em">L2 capacity:</text>
      <text x="140" y="42" class="lbl-mono">96 MB</text>
      <text x="380" y="42" class="lbl-mono-em">DRAM peak BW:</text>
      <text x="480" y="42" class="lbl-mono">860 GB/s sustained</text>

      <text x="12" y="62" class="lbl-mono-em">L2 hit BW:</text>
      <text x="140" y="62" class="lbl-mono">1832-2780 GB/s (2.1-3.2x DRAM)</text>
      <text x="380" y="62" class="lbl-mono-em">GDDR7 spec:</text>
      <text x="480" y="62" class="lbl-mono">1283 GB/s theoretical</text>

      <text x="12" y="82" class="lbl-mono-em">INT8 advantage:</text>
      <text x="140" y="82" class="lbl-mono">3.0x FP16 throughput (5.56 vs 1.83 T)</text>
      <text x="380" y="82" class="lbl-mono-em">Sweet spot N:</text>
      <text x="480" y="82" class="lbl-mono">≤4096 (FP16) / ≤9800 (INT8)</text>

      <text x="12" y="102" class="lbl-mono-em">Batch scaling:</text>
      <text x="140" y="102" class="lbl-mono">212→3.3 us/token (M=1 to 64)</text>
      <text x="380" y="102" class="lbl-mono-em">Saturation:</text>
      <text x="480" y="102" class="lbl-mono">N≥8192 reaches 98% DRAM peak</text>

      <line x1="12" y1="110" x2="684" y2="110" stroke="#cbd5e1" stroke-width="0.5"/>
      <text x="12" y="122" class="lbl-mono" fill="#5b6679">Optimization: W4/W8 quantization → extend L2 residency → 2-3x bandwidth gain for decode</text>
    </g>
  </g>

</svg>
