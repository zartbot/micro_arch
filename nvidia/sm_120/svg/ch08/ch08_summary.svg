<text x="46" y="58" class="title-lg" font-size="20">Workload Analysis — Executive Summary</text>
<text x="46" y="74" class="subtitle">588-shape GEMM sweep · FlashAttention decomposition · GEMV decode · Power efficiency · Multi-precision roofline</text>

