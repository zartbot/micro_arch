<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" role="img"
     aria-label="Stall counter trust model — silent corruption boundary at write-back latency">
  <defs>
    <linearGradient id="safeG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9F3D2"/>
      <stop offset="1" stop-color="#F4FAE2"/>
    </linearGradient>
    <linearGradient id="dangG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE4E6"/>
      <stop offset="1" stop-color="#FFF1F2"/>
    </linearGradient>
    <style><![CDATA[
      .ttl{font:600 14px "Fraunces",serif;fill:#0b1220}
      .sub{font:italic 11px "Fraunces",serif;fill:#5b6679}
      .lbl{font:600 11px "JetBrains Mono",monospace;fill:#2a3548}
      .lbl-sm{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .axL{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .num{font:600 14px "Fraunces",serif;fill:#0b1220}
    ]]></style>
  </defs>
  <rect width="1080" height="460" fill="#ffffff"/>
  <text x="36" y="32" class="ttl">Stall Counter Trust Model · Silent Corruption Boundary at Write-Back Latency</text>
  <text x="36" y="52" class="sub">stall &lt; write_back_latency → silent stale read · no trap, no CUDA error · only stall=0 triggers HW safety net</text>

  <!-- Number line / axis -->
  <g transform="translate(60,110)">
    <!-- Bar: 4-bit stall counter [0..15] -->
    <rect x="0" y="0" width="960" height="40" rx="6" fill="url(#dangG)" stroke="#e11d48" stroke-width="0.8"/>
    <!-- safe region (stall ≥ wb_latency) -->
    <rect x="384" y="0" width="576" height="40" rx="6" fill="url(#safeG)" stroke="#76b900" stroke-width="0.8"/>

    <!-- ticks 0..15 -->
    <g class="axL">
      <line x1="0"   y1="40" x2="0"   y2="56" stroke="#5b6679"/><text x="0"   y="74" text-anchor="middle">0</text>
      <line x1="64"  y1="40" x2="64"  y2="48" stroke="#5b6679"/><text x="64"  y="64" text-anchor="middle">1</text>
      <line x1="128" y1="40" x2="128" y2="48" stroke="#5b6679"/><text x="128" y="64" text-anchor="middle">2</text>
      <line x1="192" y1="40" x2="192" y2="48" stroke="#5b6679"/><text x="192" y="64" text-anchor="middle">3</text>
      <line x1="256" y1="40" x2="256" y2="48" stroke="#5b6679"/><text x="256" y="64" text-anchor="middle">4</text>
      <line x1="320" y1="40" x2="320" y2="48" stroke="#5b6679"/><text x="320" y="64" text-anchor="middle">5</text>
      <line x1="384" y1="40" x2="384" y2="56" stroke="#5b6679"/><text x="384" y="74" text-anchor="middle">6</text>
      <line x1="448" y1="40" x2="448" y2="48" stroke="#5b6679"/><text x="448" y="64" text-anchor="middle">7</text>
      <line x1="512" y1="40" x2="512" y2="48" stroke="#5b6679"/><text x="512" y="64" text-anchor="middle">8</text>
      <line x1="576" y1="40" x2="576" y2="48" stroke="#5b6679"/><text x="576" y="64" text-anchor="middle">9</text>
      <line x1="640" y1="40" x2="640" y2="48" stroke="#5b6679"/><text x="640" y="64" text-anchor="middle">10</text>
      <line x1="704" y1="40" x2="704" y2="48" stroke="#5b6679"/><text x="704" y="64" text-anchor="middle">11</text>
      <line x1="768" y1="40" x2="768" y2="56" stroke="#5b6679"/><text x="768" y="74" text-anchor="middle">12</text>
      <line x1="832" y1="40" x2="832" y2="48" stroke="#5b6679"/><text x="832" y="64" text-anchor="middle">13</text>
      <line x1="896" y1="40" x2="896" y2="56" stroke="#5b6679"/><text x="896" y="74" text-anchor="middle">14</text>
      <line x1="960" y1="40" x2="960" y2="56" stroke="#5b6679"/><text x="960" y="74" text-anchor="middle">15</text>
    </g>

    <!-- Region labels -->
    <text x="192" y="-12" class="lbl" fill="#9f1239" text-anchor="middle">⚠ Silent Corruption Zone</text>
    <text x="192" y="24" class="lbl-sm" fill="#9f1239" text-anchor="middle">stall &lt; write-back latency</text>
    <text x="672" y="-12" class="lbl" fill="#5a8e00" text-anchor="middle">✓ Safe Region (stall ≥ wb_latency)</text>
    <text x="672" y="24" class="lbl-sm" fill="#5a8e00" text-anchor="middle">stall ≥ instruction write-back latency</text>

    <!-- Pointer at boundary stall=6 (typical FFMA wb=4-6 cyc) -->
    <g transform="translate(384,90)">
      <text x="0" y="14" class="lbl" fill="#9f1239" text-anchor="middle">stall ≥ wb_latency</text>
      <text x="0" y="28" class="lbl-sm" text-anchor="middle">(boundary varies per instruction)</text>
    </g>

    <!-- Sentinels -->
    <g transform="translate(0,90)">
      <text x="0" y="14" class="lbl" fill="#9f1239" text-anchor="middle">stall=0</text>
      <text x="0" y="28" class="lbl-sm" text-anchor="middle">HW safety net (uses scoreboard)</text>
    </g>
    <g transform="translate(896,90)">
      <text x="0" y="14" class="lbl" fill="#0b1220" text-anchor="middle">14 / 15 sentinels</text>
      <text x="0" y="28" class="lbl-sm" text-anchor="middle">special semantics (yield)</text>
    </g>
  </g>

  <!-- Three operating regimes -->
  <g transform="translate(60,250)">
    <rect x="0" y="0" width="312" height="174" rx="10" fill="#fff5f7" stroke="#e11d48" stroke-width="0.6"/>
    <text x="14" y="22" class="lbl" fill="#9f1239">Regime A · stall = 0</text>
    <text x="14" y="42" class="lbl-sm" fill="#9f1239">HW scoreboard fallback path</text>
    <text x="14" y="62" class="num">31–34<tspan font-size="11" dx="6" fill="#5b6679">cyc/inst</tspan></text>
    <text x="14" y="82" class="lbl-sm" fill="#9f1239">17× optimal IADD3 throughput</text>
    <text x="14" y="100" class="lbl-sm" fill="#9f1239">FFMA: 31.10 cyc/inst (S21/case_16)</text>
    <text x="14" y="118" class="lbl-sm" fill="#9f1239">IADD3: 34 cyc/inst (S11/case_129)</text>
    <text x="14" y="148" class="lbl-sm" fill="#9f1239">→ Use only as defensive fallback</text>

    <g transform="translate(324,0)">
      <rect x="0" y="0" width="312" height="174" rx="10" fill="#fff5f7" stroke="#e11d48" stroke-width="0.6"/>
      <text x="14" y="22" class="lbl" fill="#9f1239">Regime B · 0 &lt; stall &lt; wb_lat</text>
      <text x="14" y="42" class="lbl-sm" fill="#9f1239">⚠ Silent stale read</text>
      <text x="14" y="62" class="num" fill="#9f1239">CORRUPTION</text>
      <text x="14" y="82" class="lbl-sm" fill="#9f1239">No trap · no CUDA error</text>
      <text x="14" y="100" class="lbl-sm" fill="#9f1239">Result: indeterminate</text>
      <text x="14" y="118" class="lbl-sm" fill="#9f1239">[S11/case_132]</text>
      <text x="14" y="148" class="lbl-sm" fill="#9f1239">→ Never write code in this zone</text>
    </g>

    <g transform="translate(648,0)">
      <rect x="0" y="0" width="312" height="174" rx="10" fill="#f4faec" stroke="#76b900" stroke-width="0.6"/>
      <text x="14" y="22" class="lbl" fill="#5a8e00">Regime C · stall ≥ wb_lat</text>
      <text x="14" y="42" class="lbl-sm" fill="#5a8e00">Optimal pipelined throughput</text>
      <text x="14" y="62" class="num" fill="#5a8e00">1.0–4.0<tspan font-size="11" dx="6" fill="#5b6679">cyc/inst</tspan></text>
      <text x="14" y="82" class="lbl-sm" fill="#5a8e00">Linear stall ↔ throughput (1:1)</text>
      <text x="14" y="100" class="lbl-sm" fill="#5a8e00">CuAssembler stall=12 → +6.1% MMA</text>
      <text x="14" y="118" class="lbl-sm" fill="#5a8e00">[S21/case_82, S11/case_128]</text>
      <text x="14" y="148" class="lbl-sm" fill="#5a8e00">→ Tune stall just above wb_lat</text>
    </g>
  </g>
</svg>
