<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 820" role="img"
     aria-label="12.2.2a — SM_120 Stall Counter Hardware Architecture: Three Operating Modes">
  <defs>
    <style><![CDATA[
      .eyebrow{font:600 11px "JetBrains Mono",monospace;letter-spacing:0.14em;text-transform:uppercase}
      .title  {font:500 20px "Fraunces",serif;fill:#0b1220;letter-spacing:-0.02em}
      .sub    {font:italic 12px "Fraunces",serif;fill:#5b6679}
      .ttl    {font:600 12px "JetBrains Mono",monospace;letter-spacing:0.06em}
      .lbl-sm {font:500 9.5px "JetBrains Mono",monospace;fill:#5b6679;letter-spacing:0.05em;text-transform:uppercase}
      .data   {font:500 10.5px "JetBrains Mono",monospace;fill:#2a3548}
      .data-b {font:600 10.5px "JetBrains Mono",monospace;fill:#0b1220}
      .val    {font:600 16px "Fraunces",serif;fill:#0b1220}
      .val-sm {font:600 13px "Fraunces",serif;fill:#0b1220}
      .note   {font:500 10px "IBM Plex Sans",sans-serif;fill:#5b6679}
      .insight{font:500 12px "IBM Plex Sans",sans-serif;fill:#2a3548}
      .bit-lbl{font:600 8.5px "JetBrains Mono",monospace;fill:#fff;letter-spacing:0.04em}
      .bit-lbl2{font:600 8.5px "JetBrains Mono",monospace;fill:#3f3c3c;letter-spacing:0.04em}
      .bit-val{font:500 8px "JetBrains Mono",monospace;fill:#64748b}
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="820" fill="#fcfbf6"/>

  <!-- ═══ HEADER ═══ -->
  <g transform="translate(36,28)">
    <rect x="0" y="0" width="3" height="52" fill="#1e40af"/>
    <text x="16" y="16" class="eyebrow" fill="#1e40af">§12.2.2a · SM_120 STALL COUNTER HARDWARE MODEL</text>
    <text x="16" y="40" class="title">Three Operating Modes of the 4-bit Stall Counter</text>
    <text x="16" y="58" class="sub">CuAssembler-verified via Cases 9, 16, 17, 82 · Bits [44:41] of upper 64-bit control word</text>
  </g>

  <!-- ═══ BIT FIELD DIAGRAM ═══ -->
  <g transform="translate(36,100)">
    <rect x="0" y="0" width="1008" height="52" rx="8" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.6"/>
    <text x="16" y="18" class="lbl-sm" fill="#1e40af">128-BIT SASS INSTRUCTION WORD — UPPER 64-BIT CONTROL FIELDS</text>
    <!-- Bit boxes -->
    <g transform="translate(16,28)">
      <!-- Stall counter -->
      <rect x="0" y="0" width="120" height="18" rx="3" fill="#1e40af"/>
      <text x="60" y="12" class="bit-lbl" text-anchor="middle">STALL [44:41]</text>
      <!-- Yield -->
      <rect x="126" y="0" width="80" height="18" rx="3" fill="#6366f1"/>
      <text x="166" y="12" class="bit-lbl" text-anchor="middle">YIELD [45]</text>
      <!-- SB Wait -->
      <rect x="212" y="0" width="120" height="18" rx="3" fill="#7c3aed"/>
      <text x="272" y="12" class="bit-lbl" text-anchor="middle">SB WAIT [57:54]</text>
      <!-- Reuse -->
      <rect x="338" y="0" width="100" height="18" rx="3" fill="#9333ea"/>
      <text x="388" y="12" class="bit-lbl" text-anchor="middle">REUSE [60:58]</text>
      <!-- Other -->
      <rect x="444" y="0" width="140" height="18" rx="3" fill="#cbd5e1"/>
      <text x="514" y="12" class="bit-lbl2" text-anchor="middle" fill="#475569">OTHER CTRL BITS</text>
      <!-- Opcode lower -->
      <rect x="590" y="0" width="380" height="18" rx="3" fill="#e2e8f0"/>
      <text x="780" y="12" class="bit-lbl2" text-anchor="middle" fill="#64748b">LOWER 64-BIT: OPCODE + OPERANDS</text>
    </g>
  </g>

  <!-- ═══ MODE A: LINEAR INTERVAL ═══ -->
  <g transform="translate(36,172)">
    <rect x="0" y="0" width="330" height="320" rx="10" fill="#fff" stroke="#e6e4da"/>
    <rect x="0" y="0" width="330" height="4" rx="10" fill="#16a34a"/>
    <text x="16" y="26" class="ttl" fill="#16a34a">MODE A: LINEAR INTERVAL</text>
    <text x="16" y="42" class="lbl-sm">STALL ∈ [1..13] — DIRECT CYCLE CONTROL</text>

    <!-- Formula -->
    <g transform="translate(16,58)">
      <rect x="0" y="0" width="298" height="28" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="0.5"/>
      <text x="12" y="18" class="data-b" fill="#16a34a">dispatch_interval = stall_count cycles (1:1)</text>
    </g>

    <!-- Linear chart visualization -->
    <g transform="translate(20,100)">
      <text x="0" y="0" class="lbl-sm">EVIDENCE (CASE 17, 5 FFMAS)</text>
      <!-- Axis -->
      <line x1="30" y1="20" x2="30" y2="150" stroke="#cbd5e1" stroke-width="0.8"/>
      <line x1="30" y1="150" x2="280" y2="150" stroke="#cbd5e1" stroke-width="0.8"/>
      <text x="155" y="168" class="bit-val" text-anchor="middle">Stall count</text>
      <text x="10" y="85" class="bit-val" text-anchor="middle" transform="rotate(-90,10,85)">Total cyc</text>
      <!-- Data points with linear trend -->
      <line x1="30" y1="145" x2="270" y2="20" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5"/>
      <!-- stall=1: 7 cyc -->
      <circle cx="60" cy="140" r="4" fill="#16a34a"/>
      <text x="60" y="156" class="bit-val" text-anchor="middle">1</text>
      <!-- stall=2: 11 cyc -->
      <circle cx="90" cy="132" r="4" fill="#16a34a"/>
      <text x="90" y="156" class="bit-val" text-anchor="middle">2</text>
      <!-- stall=4: 21 cyc -->
      <circle cx="120" cy="112" r="4" fill="#16a34a"/>
      <text x="120" y="156" class="bit-val" text-anchor="middle">4</text>
      <!-- stall=8: 41 cyc -->
      <circle cx="180" cy="72" r="4" fill="#16a34a"/>
      <text x="180" y="156" class="bit-val" text-anchor="middle">8</text>
      <!-- stall=13: 66 cyc -->
      <circle cx="270" cy="22" r="4" fill="#16a34a"/>
      <text x="270" y="156" class="bit-val" text-anchor="middle">13</text>
      <!-- Annotations -->
      <text x="70" y="125" class="bit-val">7 cyc</text>
      <text x="100" y="122" class="bit-val">11</text>
      <text x="130" y="102" class="bit-val">21</text>
      <text x="190" y="64" class="bit-val">41</text>
      <text x="248" y="16" class="bit-val">66</text>
    </g>

    <!-- Summary -->
    <g transform="translate(56,282)">
      <text x="0" y="0" class="data">total_cycles = stall × N + constant</text>
      <text x="0" y="16" class="note">Constant (+1-2 cyc) = clock64 overhead</text>
      <text x="0" y="30" class="note">ptxas optimal for ALU: FFMA=1, loops=4</text>
    </g>
  </g>

  <!-- ═══ MODE B: SENTINEL / HW DEPENDENCY ═══ -->
  <g transform="translate(382,172)">
    <rect x="0" y="0" width="310" height="320" rx="10" fill="#fff" stroke="#e6e4da"/>
    <rect x="0" y="0" width="310" height="4" rx="10" fill="#dc2626"/>
    <text x="16" y="26" class="ttl" fill="#dc2626">MODE B: SENTINEL (HW REPLAY)</text>
    <text x="16" y="42" class="lbl-sm">STALL ∈ {0, 14, 15} — FULL DEPENDENCY RESOLVE</text>

    <!-- Warning box -->
    <g transform="translate(16,58)">
      <rect x="0" y="0" width="278" height="28" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="0.5"/>
      <text x="12" y="18" class="data-b" fill="#dc2626">Bypasses linear mechanism → full replay</text>
    </g>

    <!-- Data table -->
    <g transform="translate(16,110)">
      <text x="0" y="0" class="lbl-sm">MEASURED EVIDENCE</text>
      <!-- Header -->
      <text x="0" y="20" class="data-b">Instr</text>
      <text x="60" y="20" class="data-b">Stall</text>
      <text x="110" y="20" class="data-b">cyc/op</text>
      <text x="170" y="20" class="data-b">Effect</text>
      <!-- Row 1 -->
      <text x="0" y="38" class="data">FFMA</text>
      <text x="60" y="38" class="data">0</text>
      <text x="110" y="38" class="data" fill="#dc2626">31.10</text>
      <text x="170" y="38" class="data">22× slowdown</text>
      <!-- Row 2 -->
      <text x="0" y="54" class="data">FFMA</text>
      <text x="60" y="54" class="data">15</text>
      <text x="110" y="54" class="data" fill="#dc2626">32.20</text>
      <text x="170" y="54" class="data">full replay</text>
      <!-- Row 3 -->
      <text x="0" y="70" class="data">HMMA</text>
      <text x="60" y="70" class="data">14</text>
      <text x="110" y="70" class="data" fill="#dc2626">55.51</text>
      <text x="170" y="70" class="data">dep resolution</text>
      <!-- Row 4 -->
      <text x="0" y="86" class="data">HMMA</text>
      <text x="60" y="86" class="data">15</text>
      <text x="110" y="86" class="data" fill="#dc2626">55.51</text>
      <text x="170" y="86" class="data">same as 14</text>
    </g>

    <!-- Forbidden zone diagram -->
    <g transform="translate(16,226)">
      <text x="0" y="0" class="lbl-sm">STALL VALUE DANGER MAP</text>
      <!-- Bar showing danger zones -->
      <g transform="translate(0,14)">
        <!-- 0 -->
        <rect x="0" y="0" width="18" height="18" rx="3" fill="#dc2626"/>
        <text x="9" y="13" class="bit-lbl" text-anchor="middle">0</text>
        <!-- 1-13 safe zone -->
        <rect x="22" y="0" width="170" height="18" rx="3" fill="#16a34a" opacity="0.8"/>
        <text x="107" y="13" class="bit-lbl" text-anchor="middle">1  2  3 ... 11  12  13</text>
        <!-- 14 -->
        <rect x="196" y="0" width="22" height="18" rx="3" fill="#dc2626"/>
        <text x="207" y="13" class="bit-lbl" text-anchor="middle">14</text>
        <!-- 15 -->
        <rect x="222" y="0" width="22" height="18" rx="3" fill="#dc2626"/>
        <text x="233" y="13" class="bit-lbl" text-anchor="middle">15</text>
      </g>
      <text x="0" y="48" class="note">Red = sentinel (catastrophic slowdown)</text>
      <text x="0" y="62" class="note">Green = linear (safe, predictable)</text>
      <text x="0" y="78" class="data-b">ptxas NEVER emits stall=0/14/15</text>
    </g>
  </g>

  <!-- ═══ MODE C: PIPELINE-ALIGNED ═══ -->
  <g transform="translate(708,172)">
    <rect x="0" y="0" width="328" height="320" rx="10" fill="#fff" stroke="#e6e4da"/>
    <rect x="0" y="0" width="328" height="4" rx="10" fill="#f59e0b"/>
    <text x="16" y="26" class="ttl" fill="#b45309">MODE C: PIPELINE ALIGNMENT</text>
    <text x="16" y="42" class="lbl-sm">HMMA SWEEP (CASE 82, 16-DEEP CHAIN)</text>

    <!-- Chart area -->
    <g transform="translate(16,58)">
      <text x="0" y="0" class="lbl-sm">CYC/HMMA vs STALL VALUE</text>
      <!-- Chart background -->
      <rect x="0" y="10" width="296" height="160" rx="4" fill="#fffbeb" stroke="#fde68a" stroke-width="0.5"/>
      <!-- Y-axis labels -->
      <text x="4" y="28" class="bit-val">55</text>
      <text x="4" y="58" class="bit-val">45</text>
      <text x="4" y="88" class="bit-val">35</text>
      <text x="4" y="118" class="bit-val">32</text>
      <text x="4" y="158" class="bit-val">20</text>
      <!-- Gridlines -->
      <line x1="26" y1="25" x2="290" y2="25" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="2,2"/>
      <line x1="26" y1="55" x2="290" y2="55" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="2,2"/>
      <line x1="26" y1="85" x2="290" y2="85" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="2,2"/>
      <line x1="26" y1="115" x2="290" y2="115" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="2,2"/>
      <!-- Data bars -->
      <!-- stall=8: 32.30 -->
      <rect x="36" y="110" width="24" height="48" rx="2" fill="#16a34a" opacity="0.7"/>
      <text x="48" y="166" class="bit-val" text-anchor="middle">8</text>
      <text x="48" y="106" class="bit-val" text-anchor="middle">32.3</text>
      <!-- stall=9: 32.32 -->
      <rect x="66" y="110" width="24" height="48" rx="2" fill="#16a34a" opacity="0.7"/>
      <text x="78" y="166" class="bit-val" text-anchor="middle">9</text>
      <!-- stall=10: 33.33 -->
      <rect x="96" y="100" width="24" height="58" rx="2" fill="#eab308" opacity="0.7"/>
      <text x="108" y="166" class="bit-val" text-anchor="middle">10</text>
      <text x="108" y="96" class="bit-val" text-anchor="middle">33.3</text>
      <!-- stall=11: 34.34 (ptxas default - SUBOPTIMAL) -->
      <rect x="126" y="88" width="24" height="70" rx="2" fill="#f97316" opacity="0.8"/>
      <text x="138" y="166" class="bit-val" text-anchor="middle">11</text>
      <text x="138" y="84" class="bit-val" text-anchor="middle" fill="#dc2626">34.3</text>
      <!-- stall=12: 32.23 ★ OPTIMAL -->
      <rect x="156" y="112" width="24" height="46" rx="2" fill="#1e40af"/>
      <text x="168" y="166" class="bit-val" text-anchor="middle">12</text>
      <text x="168" y="108" class="bit-val" text-anchor="middle" fill="#1e40af">32.2</text>
      <!-- stall=13: 32.23 -->
      <rect x="186" y="112" width="24" height="46" rx="2" fill="#1e40af" opacity="0.7"/>
      <text x="198" y="166" class="bit-val" text-anchor="middle">13</text>
      <!-- stall=14: 55.51 SENTINEL -->
      <rect x="220" y="20" width="24" height="138" rx="2" fill="#dc2626" opacity="0.7"/>
      <text x="232" y="166" class="bit-val" text-anchor="middle">14</text>
      <text x="232" y="16" class="bit-val" text-anchor="middle" fill="#dc2626">55.5</text>
      <!-- stall=15: 55.51 -->
      <rect x="250" y="20" width="24" height="138" rx="2" fill="#dc2626" opacity="0.7"/>
      <text x="262" y="166" class="bit-val" text-anchor="middle">15</text>
    </g>

    <!-- Annotations -->
    <g transform="translate(16,240)">
      <!-- ptxas default annotation -->
      <rect x="0" y="0" width="130" height="16" rx="3" fill="#fff7ed" stroke="#f97316" stroke-width="0.5"/>
      <text x="6" y="12" class="bit-val" fill="#f97316">stall=11 ptxas default</text>
      <!-- optimal annotation -->
      <rect x="140" y="0" width="130" height="16" rx="3" fill="#eff6ff" stroke="#1e40af" stroke-width="0.5"/>
      <text x="146" y="12" class="bit-val" fill="#1e40af">stall=12 ★ OPTIMAL</text>
      <!-- Delta -->
      <text x="0" y="34" class="data-b" fill="#1e40af">Δ = 6.1% throughput improvement</text>
      <text x="0" y="50" class="note">stall=12 aligns with TC writeback slot</text>
      <text x="0" y="64" class="note">stall=11 causes 1-cyc partial replay bubble</text>
    </g>
  </g>

  <!-- ═══ BOTTOM: MECHANISM EXPLANATION ═══ -->
  <g transform="translate(36,500)">
    <rect x="0" y="0" width="1008" height="150" rx="10" fill="#fff" stroke="#e6e4da"/>
    <rect x="0" y="0" width="1008" height="3" rx="10" fill="#1e40af" opacity="0.7"/>
    <text x="16" y="24" class="ttl" fill="#1e40af">PIPELINE ALIGNMENT MECHANISM — WHY stall=12 BEATS stall=11</text>

    <!-- TC Pipeline timing diagram -->
    <g transform="translate(16,44)">
      <!-- Timeline -->
      <text x="0" y="0" class="data-b">HMMA issue timeline (TC pipeline latency = 29 cyc, throughput = 15.88 cyc/op):</text>

      <!-- stall=11 row -->
      <text x="0" y="24" class="data" fill="#f97316">stall=11:</text>
      <rect x="80" y="14" width="110" height="14" rx="3" fill="#f97316" opacity="0.3"/>
      <text x="135" y="25" class="bit-val" text-anchor="middle">HMMA₁ (29 cyc lat)</text>
      <rect x="191" y="14" width="110" height="14" rx="3" fill="#f97316" opacity="0.3"/>
      <text x="246" y="25" class="bit-val" text-anchor="middle">HMMA₂ (issue@+11)</text>
      <!-- Bubble marker -->
      <rect x="190" y="30" width="5" height="6" rx="1" fill="#dc2626"/>
      <text x="200" y="36" class="bit-val" fill="#dc2626">↑ 1-cyc bubble (writeback misalign)</text>

      <!-- stall=12 row -->
      <text x="0" y="60" class="data" fill="#1e40af">stall=12:</text>
      <rect x="80" y="50" width="110" height="14" rx="3" fill="#1e40af" opacity="0.2"/>
      <text x="135" y="61" class="bit-val" text-anchor="middle">HMMA₁ (29 cyc lat)</text>
      <rect x="200" y="50" width="110" height="14" rx="3" fill="#1e40af" opacity="0.2"/>
      <text x="255" y="61" class="bit-val" text-anchor="middle">HMMA₂ (issue@+12)</text>
      <!-- Clean alignment -->
      <text x="200" y="74" class="bit-val" fill="#16a34a">✓ aligned with writeback slot</text>

      <!-- stall=8-9 row -->
      <text x="0" y="94" class="data" fill="#16a34a">stall=8-9:</text>
      <rect x="80" y="84" width="110" height="14" rx="3" fill="#16a34a" opacity="0.2"/>
      <text x="135" y="95" class="bit-val" text-anchor="middle">HMMA₁</text>
      <rect x="145" y="84" width="110" height="14" rx="3" fill="#16a34a" opacity="0.2"/>
      <text x="200" y="95" class="bit-val" text-anchor="middle">HMMA₂ (issue@+8)</text>
      <text x="260" y="95" class="bit-val" fill="#16a34a">→ HW SB kicks in, resolves optimally</text>
    </g>
  </g>

  <!-- ═══ KEY INSIGHT PANEL ═══ -->
  <g transform="translate(36,658)">
    <rect x="0" y="0" width="1008" height="148" rx="12" fill="#EEF2FF" stroke="#1e40af" stroke-width="0.8"/>
    <text x="20" y="24" class="ttl" fill="#1e40af">Key Architectural Insights</text>
    <g transform="translate(20,44)">
      <circle cx="6" cy="-4" r="3" fill="#1e40af"/>
      <text x="18" y="0" class="insight">The stall counter is NOT a uniform delay knob — it has 3 completely different hardware modes depending on value</text>
      <circle cx="6" cy="18" r="3" fill="#1e40af"/>
      <text x="18" y="22" class="insight">Sentinels (0, 14, 15) bypass linear scheduling → invoke full hardware dependency resolution replay</text>
      <circle cx="6" cy="40" r="3" fill="#1e40af"/>
      <text x="18" y="44" class="insight">ptxas uses stall=11 for HMMA (conservative); CuAssembler patch to stall=12 recovers +6.1% (the ONLY SASS headroom on SM_120)</text>
      <circle cx="6" cy="62" r="3" fill="#1e40af"/>
      <text x="18" y="66" class="insight">At stall=8-9, the stall is so short that HW scoreboard auto-resolves the dependency, matching stall=12 throughput</text>
      <circle cx="6" cy="84" r="3" fill="#1e40af"/>
      <text x="18" y="88" class="insight">TC pipeline depth = 1.81 slots → ideal inter-MMA = 29/1.81 ≈ 16 cyc, but stall only controls SMSP dispatch, not TC internal re-issue</text>
    </g>
  </g>
</svg>
