<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 680" role="img"
     aria-label="SM_120 Two-Mechanism Interaction: stall counter AND scoreboard must both clear before instruction issues">
  <defs>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5b6679"/>
    </marker>
    <marker id="ar-green" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#16a34a"/>
    </marker>
    <marker id="ar-purple" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#6d28d9"/>
    </marker>
    <linearGradient id="stallBG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FEF3C7"/><stop offset="1" stop-color="#FFFBEB"/>
    </linearGradient>
    <linearGradient id="sbBG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DBEAFE"/><stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="issueBG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DCFCE7"/><stop offset="1" stop-color="#F0FDF4"/>
    </linearGradient>
    <style><![CDATA[
      .ttl{font:600 15px "Fraunces",serif;fill:#0b1220}
      .sub{font:italic 11.5px "Fraunces",serif;fill:#5b6679}
      .sect{font:600 13px "Fraunces",serif}
      .lbl{font:600 11.5px "JetBrains Mono",monospace}
      .lbl2{font:600 10.5px "JetBrains Mono",monospace}
      .lbl-sm{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .desc{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .badge{font:600 9.5px "JetBrains Mono",monospace}
      .note{font:500 9.5px "JetBrains Mono",monospace;fill:#8e97a5}
      .warn{font:600 10px "JetBrains Mono",monospace;fill:#dc2626}
      .safe{font:600 10px "JetBrains Mono",monospace;fill:#16a34a}
      .zone-t{font:600 12px "Fraunces",serif}
      .code{font:500 10.5px "JetBrains Mono",monospace;fill:#334155}
    ]]></style>
  </defs>

  <rect width="1080" height="680" fill="#ffffff"/>
  <text x="36" y="32" class="ttl">Two-Mechanism Interaction — Parallel AND Gate for Issue Eligibility</text>
  <text x="36" y="52" class="sub">warp_eligible = (stall_counter == 0) AND (wait_mask &amp; active_SB == 0) — both must clear before instruction issues</text>

  <!-- ═══════ TOP: AND-Gate Diagram ═══════ -->
  <g transform="translate(30, 74)">
    <rect x="0" y="0" width="1020" height="180" rx="12" fill="#f8fafc" stroke="#334155" stroke-width="1"/>
    <text x="16" y="24" class="sect" fill="#334155">Issue Eligibility Logic (evaluated every cycle per warp)</text>

    <!-- Stall counter gate -->
    <g transform="translate(40, 48)">
      <rect x="0" y="0" width="300" height="56" rx="8" fill="url(#stallBG)" stroke="#b45309" stroke-width="1"/>
      <text x="150" y="20" class="lbl" fill="#92400e" text-anchor="middle">Stall Counter Gate</text>
      <text x="150" y="38" class="code" text-anchor="middle">stall_countdown == 0 ?</text>
      <text x="150" y="52" class="note" text-anchor="middle">fixed-latency minimum delay</text>
    </g>

    <!-- SB gate -->
    <g transform="translate(40, 114)">
      <rect x="0" y="0" width="300" height="56" rx="8" fill="url(#sbBG)" stroke="#2563eb" stroke-width="1"/>
      <text x="150" y="20" class="lbl" fill="#1d4ed8" text-anchor="middle">Scoreboard Gate</text>
      <text x="150" y="38" class="code" text-anchor="middle">wait_mask &amp; active_SB == 0 ?</text>
      <text x="150" y="52" class="note" text-anchor="middle">variable-latency completion gate</text>
    </g>

    <!-- AND gate symbol -->
    <g transform="translate(380, 74)">
      <rect x="0" y="0" width="80" height="70" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
      <text x="40" y="28" class="lbl" fill="#334155" text-anchor="middle">AND</text>
      <text x="40" y="48" class="badge" fill="#334155" text-anchor="middle">both must</text>
      <text x="40" y="62" class="badge" fill="#334155" text-anchor="middle">be TRUE</text>
    </g>

    <!-- Arrows into AND -->
    <line x1="340" y1="76" x2="380" y2="96" stroke="#b45309" stroke-width="1.5" marker-end="url(#ar)"/>
    <line x1="340" y1="142" x2="380" y2="122" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ar)"/>

    <!-- Arrow out of AND to ISSUE -->
    <line x1="460" y1="109" x2="510" y2="109" stroke="#16a34a" stroke-width="2" marker-end="url(#ar-green)"/>

    <!-- ISSUE box -->
    <g transform="translate(514, 82)">
      <rect x="0" y="0" width="200" height="56" rx="8" fill="url(#issueBG)" stroke="#16a34a" stroke-width="1.5"/>
      <text x="100" y="20" class="lbl" fill="#16a34a" text-anchor="middle">ISSUE Instruction</text>
      <text x="100" y="38" class="safe" text-anchor="middle">warp eligible!</text>
      <text x="100" y="52" class="note" text-anchor="middle">+ load new stall value</text>
    </g>

    <!-- Blocked state -->
    <g transform="translate(750, 48)">
      <rect x="0" y="0" width="247" height="86" rx="8" fill="#FEE2E2" stroke="#dc2626" stroke-width="0.8"/>
      <text x="12" y="18" class="warn">If EITHER gate fails:</text>
      <text x="12" y="36" class="lbl-sm">• Warp stays ineligible this cycle</text>
      <text x="12" y="52" class="lbl-sm">• Scheduler tries next warp (CGGTY)</text>
      <text x="12" y="68" class="lbl-sm">• Re-evaluated next cycle</text>
      <text x="12" y="82" class="note">No deadlock: at least stall=0 will clear</text>
    </g>
  </g>

  <!-- ═══════ MIDDLE: Concrete LDG→FFMA Example ═══════ -->
  <g transform="translate(30, 272)">
    <rect x="0" y="0" width="1020" height="247" rx="12" fill="#f8fafc" stroke="#334155" stroke-width="1"/>
    <text x="16" y="24" class="sect" fill="#334155">Concrete Example: LDG → independent ALU → FFMA Consumer Chain</text>

    <!-- Timeline -->
    <g transform="translate(20, 50)">
      <!-- Instruction sequence -->
      <rect x="0" y="0" width="960" height="36" rx="6" fill="url(#sbBG)" stroke="#2563eb" stroke-width="0.8"/>
      <text x="8" y="14" class="badge" fill="#2563eb">INSN 1:</text>
      <text x="70" y="14" class="code">LDG R5, [R2]</text>
      <text x="230" y="14" class="desc">WrBarrier=SB3 (SB3++), stall=1</text>
      <text x="500" y="14" class="note">→ issues immediately, SB3 tracks completion</text>
      <text x="8" y="32" class="note">Role: PRODUCER. Fire-and-forget. Next insn can issue in 1 cycle.</text>

      <rect x="0" y="44" width="960" height="36" rx="6" fill="url(#stallBG)" stroke="#b45309" stroke-width="0.6"/>
      <text x="8" y="58" class="badge" fill="#92400e">INSN 2-4:</text>
      <text x="80" y="58" class="code">IADD3 R8,R8,R9 ; IADD3 R10,R10,R11 ; IMAD R12,R12,R13,R14</text>
      <text x="8" y="76" class="note">Role: INDEPENDENT ALU. stall=1 each. No WaitBarrier. Fill the LDG latency window.</text>

      <rect x="0" y="88" width="960" height="46" rx="6" fill="url(#issueBG)" stroke="#16a34a" stroke-width="0.8"/>
      <text x="8" y="102" class="badge" fill="#16a34a">INSN 5:</text>
      <text x="70" y="102" class="code">FFMA R7, R5, R6, R7</text>
      <text x="290" y="102" class="desc">WaitBarrier=0b001000 (wait SB3), stall=4</text>
      <text x="8" y="120" class="note">Role: CONSUMER. Blocked until SB3==0 (LDG complete). Then stall=4 gates ITS consumers.</text>
      <text x="8" y="132" class="safe">This instruction uses BOTH mechanisms: SB gate (wait for LDG) + stall counter (for its own dep chain)</text>
    </g>

    <!-- Timing annotation -->
    <g transform="translate(20, 184)">
      <text x="0" y="20" class="lbl2" fill="#334155">Timing: LDG dispatches at T=0, ALU fills T=1..3, FFMA eligible at T=max(4, SB3_complete)</text>
      <text x="0" y="38" class="lbl-sm">If L1 hit (44 cyc): FFMA waits ~44 cyc on SB3 gate (stall=4 is irrelevant, SB dominates)</text>
      <text x="0" y="54" class="note">If L2 hit (354 cyc): FFMA waits ~354 cyc on SB3 gate — same mechanism, longer wait</text>
    </g>
  </g>

  <!-- ═══════ BOTTOM: Silicon Efficiency Summary ═══════ -->
  <g transform="translate(30, 510)">
    <rect x="0" y="20" width="1020" height="130" rx="12" fill="#EDE7FB" stroke="#6d28d9" stroke-width="0.8"/>
    <text x="16" y="35" class="sect" fill="#6d28d9">Silicon Efficiency — Why Two Mechanisms Beat One</text>

    <g transform="translate(16, 44)">
      <!-- Cost breakdown -->
      <rect x="0" y="0" width="480" height="80" rx="8" fill="#ffffff" stroke="#6d28d9" stroke-width="0.6"/>
      <text x="12" y="18" class="lbl" fill="#6d28d9">SM_120 Actual State (per warp):</text>
      <text x="12" y="38" class="lbl-sm">• Stall counter: 4 bits</text>
      <text x="12" y="54" class="lbl-sm">• SB counters: 6 × 6 bits = 36 bits</text>
      <text x="12" y="70" class="lbl-sm">• Yield bit: 1 bit</text>
      <text x="220" y="38" class="safe">Total: 41 bits/warp</text>
      <text x="220" y="54" class="note">48 warps × 41 = 1,968 bits/SM</text>
      <text x="220" y="70" class="note">(~246 bytes total scheduling state)</text>

      <!-- Comparison -->
      <rect x="500" y="0" width="480" height="80" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="0.6"/>
      <text x="512" y="18" class="lbl" fill="#334155">Full HW Scoreboard Alternative:</text>
      <text x="512" y="38" class="lbl-sm">• Per-register tracking: 48 warps × 256 regs × 4 src</text>
      <text x="512" y="54" class="lbl-sm">• CAM comparators: ~48,000 entries</text>
      <text x="512" y="70" class="lbl-sm">• Bypass detection logic: additional ~20K gates</text>
      <text x="780" y="38" class="warn">~200× more state</text>
      <text x="780" y="54" class="note">Massive area + power cost</text>
    </g>

    <g transform="translate(16, 128)">
      <text x="0" y="10" class="safe">Result: SM_120 achieves equivalent correctness with 0.5% of the silicon cost, by trusting the compiler for fixed-latency and using minimal HW for variable-latency.</text>
    </g>
  </g>

  <text x="36" y="672" class="note">[source: S11/case_77 (issue condition), S13/case_12 (encoding), S12/case_23 (SB pool), patent US11768686 §5.1]</text>
</svg>
