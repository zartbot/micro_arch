<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" role="img"
     aria-label="SM_120 Scoreboard Counter System: 6 HW counters per warp with dual-regime exhaustion cliff">
  <defs>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5b6679"/>
    </marker>
    <marker id="ar-blue" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="ar-red" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#dc2626"/>
    </marker>
    <linearGradient id="sbG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DBEAFE"/><stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="cliffG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FEE2E2"/><stop offset="1" stop-color="#FEF2F2"/>
    </linearGradient>
    <style><![CDATA[
      .ttl{font:600 15px "Fraunces",serif;fill:#0b1220}
      .sub{font:italic 11.5px "Fraunces",serif;fill:#5b6679}
      .sect{font:600 13px "Fraunces",serif}
      .lbl{font:600 11.5px "JetBrains Mono",monospace}
      .lbl-sm{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .desc{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .badge{font:600 9.5px "JetBrains Mono",monospace}
      .note{font:500 9.5px "JetBrains Mono",monospace;fill:#8e97a5}
      .warn{font:600 10px "JetBrains Mono",monospace;fill:#dc2626}
      .safe{font:600 10px "JetBrains Mono",monospace;fill:#16a34a}
      .zone-t{font:600 12px "Fraunces",serif}
      .big-num{font:700 18px "JetBrains Mono",monospace}
    ]]></style>
  </defs>

  <rect width="1080" height="720" fill="#ffffff"/>
  <text x="36" y="32" class="ttl">SM_120 Scoreboard Counter System — 6 HW Counters for Variable-Latency Tracking</text>
  <text x="36" y="52" class="sub">Producer signals WrBarrier(SBn++), memory completes → SBn--, consumer blocked until WaitBarrier mask is clear [S11/case_44, S12/case_24]</text>

  <!-- ═══════ TOP: Producer-Consumer Protocol ═══════ -->
  <g transform="translate(30, 74)">
    <rect x="0" y="0" width="1020" height="200" rx="12" fill="url(#sbG)" stroke="#2563eb" stroke-width="1"/>
    <text x="16" y="24" class="sect" fill="#1d4ed8">Scoreboard Protocol: Producer → Memory → Consumer</text>

    <!-- 6 SB counter boxes -->
    <g transform="translate(20, 48)">
      <rect x="0" y="0" width="64" height="32" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
      <text x="32" y="20" class="lbl" fill="#2563eb" text-anchor="middle">SB0</text>
      <rect x="74" y="0" width="64" height="32" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
      <text x="106" y="20" class="lbl" fill="#2563eb" text-anchor="middle">SB1</text>
      <rect x="148" y="0" width="64" height="32" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
      <text x="180" y="20" class="lbl" fill="#2563eb" text-anchor="middle">SB2</text>
      <rect x="222" y="0" width="64" height="32" rx="6" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
      <text x="254" y="20" class="lbl" fill="#1d4ed8" text-anchor="middle">SB3</text>
      <rect x="296" y="0" width="64" height="32" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
      <text x="328" y="20" class="lbl" fill="#2563eb" text-anchor="middle">SB4</text>
      <rect x="370" y="0" width="64" height="32" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
      <text x="402" y="20" class="lbl" fill="#2563eb" text-anchor="middle">SB5</text>
      <text x="450" y="20" class="desc">← 6 counters per warp (ptxas assigns dynamically)</text>
    </g>

    <!-- Flow: Producer → Memory → Consumer -->
    <g transform="translate(20, 100)">
      <!-- Producer -->
      <rect x="0" y="0" width="240" height="58" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
      <text x="12" y="18" class="badge" fill="#2563eb">PRODUCER (dispatch)</text>
      <text x="12" y="36" class="lbl-sm">LDG R5, [addr] | WrBarrier=SB3</text>
      <text x="12" y="48" class="note">→ SB3++ (counter incremented)</text>

      <line x1="240" y1="24" x2="290" y2="24" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ar-blue)"/>
      <text x="243" y="14" class="note">dispatch</text>

      <!-- Memory subsystem -->
      <rect x="294" y="0" width="240" height="58" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="0.8"/>
      <text x="306" y="18" class="badge" fill="#334155">MEMORY (in-flight)</text>
      <text x="306" y="36" class="lbl-sm">L1 miss → L2 access (44-354 cyc)</text>
      <text x="306" y="48" class="note">warp continues issuing other insns</text>

      <line x1="534" y1="24" x2="584" y2="24" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ar)"/>
      <text x="536" y="14" class="note">complete</text>

      <!-- Completion -->
      <rect x="588" y="0" width="200" height="58" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
      <text x="600" y="18" class="badge" fill="#16a34a">COMPLETE</text>
      <text x="600" y="36" class="safe">SB3-- (counter decremented)</text>
      <text x="600" y="48" class="note">0-cycle visibility delay</text>

      <!-- Consumer (blocked until SB3==0) -->
      <rect x="820" y="0" width="170" height="58" rx="8" fill="#ffffff" stroke="#6d28d9" stroke-width="1"/>
      <text x="832" y="18" class="badge" fill="#6d28d9">CONSUMER</text>
      <text x="832" y="36" class="lbl-sm">FFMA R7, R5, R6</text>
      <text x="832" y="48" class="note">WaitBarrier = 0b001000</text>

      <line x1="788" y1="24" x2="818" y2="24" stroke="#6d28d9" stroke-width="1.2" stroke-dasharray="4,3"/>
      <text x="790" y="14" class="note">gate</text>
    </g>

    <!-- Key rule -->
    <g transform="translate(20, 162)">
      <text x="0" y="14" class="lbl" fill="#1d4ed8">Issue gate: WaitBarrier[121:116] AND active_counters == 0 → unblock consumer</text>
      <text x="560" y="14" class="note">Multiple consumers can share same SB · Producers reuse SB after consumption</text>
    </g>
  </g>

  <!-- ═══════ BOTTOM: Dual-Regime Exhaustion Cliff ═══════ -->
  <g transform="translate(30, 294)">
    <rect x="0" y="0" width="500" height="400" rx="12" fill="#f8fafc" stroke="#334155" stroke-width="1"/>
    <text x="16" y="24" class="sect" fill="#334155">SB Exhaustion Cliff — Two Regimes</text>

    <!-- Regime A: L1 cached -->
    <g transform="translate(16, 44)">
      <rect x="0" y="0" width="468" height="160" rx="8" fill="url(#cliffG)" stroke="#dc2626" stroke-width="0.8"/>
      <text x="12" y="20" class="zone-t" fill="#991b1b">Regime A: L1-Cached (1 LDG per SB)</text>
      <text x="12" y="38" class="lbl-sm">Each LDG gets its own WrBarrier → 5 usable SBs (SB0 reserved)</text>

      <!-- Visual cliff -->
      <g transform="translate(12, 50)">
        <rect x="0" y="0" width="40" height="14" rx="2" fill="#16a34a" opacity="0.3"/>
        <rect x="44" y="0" width="40" height="14" rx="2" fill="#16a34a" opacity="0.3"/>
        <rect x="88" y="0" width="40" height="14" rx="2" fill="#16a34a" opacity="0.3"/>
        <rect x="132" y="0" width="40" height="14" rx="2" fill="#16a34a" opacity="0.3"/>
        <rect x="176" y="0" width="40" height="14" rx="2" fill="#16a34a" opacity="0.3"/>
        <rect x="220" y="0" width="40" height="14" rx="2" fill="#dc2626" opacity="0.4"/>
        <text x="20" y="11" class="badge" fill="#16a34a" text-anchor="middle">N=2</text>
        <text x="64" y="11" class="badge" fill="#16a34a" text-anchor="middle">N=3</text>
        <text x="108" y="11" class="badge" fill="#16a34a" text-anchor="middle">N=4</text>
        <text x="152" y="11" class="badge" fill="#16a34a" text-anchor="middle">N=5</text>
        <text x="196" y="11" class="badge" fill="#b45309" text-anchor="middle">OK</text>
        <text x="240" y="11" class="badge" fill="#dc2626" text-anchor="middle">N=6</text>
        <text x="270" y="11" class="warn">← CLIFF!</text>
      </g>

      <text x="12" y="82" class="safe">N=2-5: 17 cycles (all overlap, flat)</text>
      <text x="12" y="100" class="warn">N=6:   761 cycles (44.8× stall!)</text>
      <text x="12" y="118" class="lbl-sm">N=7-9: ~870 cycles (batch-of-5 serialization)</text>
      <text x="12" y="140" class="note">Root cause: 6th LDG must wait for oldest SB to free</text>
      <text x="12" y="154" class="note">before it can allocate a WrBarrier slot</text>
    </g>

    <!-- Regime B: L2 forced -->
    <g transform="translate(16, 218)">
      <rect x="0" y="0" width="468" height="160" rx="8" fill="#FEF3C7" stroke="#b45309" stroke-width="0.8"/>
      <text x="12" y="20" class="zone-t" fill="#92400e">Regime B: L2-Forced (counter-mode, multiple LDG/SB)</text>
      <text x="12" y="38" class="lbl-sm">ptxas packs multiple LDG into each SB + uses DEPBAR.LE for batch waits</text>

      <!-- Visual: extended range -->
      <g transform="translate(12, 50)">
        <rect x="0" y="0" width="280" height="14" rx="2" fill="#16a34a" opacity="0.2"/>
        <text x="140" y="11" class="safe" text-anchor="middle">N=2-10: all overlap (counter sharing)</text>
        <rect x="290" y="0" width="60" height="14" rx="2" fill="#b45309" opacity="0.3"/>
        <text x="320" y="11" class="badge" fill="#92400e" text-anchor="middle">N=12</text>
        <text x="360" y="11" class="badge" fill="#92400e">← cliff</text>
      </g>

      <text x="12" y="82" class="safe">N=2-10: 358-391 cycles (flat, all overlap)</text>
      <text x="12" y="100" class="badge" fill="#92400e">N=12:   726 cycles (2× cliff — counter range exhausted)</text>
      <text x="12" y="118" class="lbl-sm">N=14-16: 749-752 cycles (plateau, batch serialization)</text>
      <text x="12" y="140" class="note">ptxas extends tracking via counter arithmetic:</text>
      <text x="12" y="154" class="note">~10-11 LDG packed into 6 SB counters (DEPBAR.LE batch wait)</text>
    </g>
  </g>

  <!-- ═══════ RIGHT: Why Cliff Differs + Combined View ═══════ -->
  <g transform="translate(550, 294)">
    <rect x="0" y="0" width="500" height="400" rx="12" fill="#f8fafc" stroke="#334155" stroke-width="1"/>
    <text x="16" y="24" class="sect" fill="#334155">Why the Cliff Differs + System View</text>

    <!-- Encoding comparison -->
    <g transform="translate(16, 44)">
      <rect x="0" y="0" width="468" height="130" rx="8" fill="#EDE7FB" stroke="#6d28d9" stroke-width="0.6"/>
      <text x="12" y="20" class="lbl" fill="#6d28d9">ptxas Adaptive SB Encoding Strategy:</text>

      <text x="12" y="44" class="badge" fill="#16a34a">L1-cached (short latency):</text>
      <text x="12" y="60" class="lbl-sm">1 LDG → 1 dedicated SB slot → WaitBarrier targets single ID</text>
      <text x="12" y="74" class="lbl-sm">Max parallel: 5 (SB0 reserved for descriptor loop)</text>

      <text x="12" y="96" class="badge" fill="#92400e">L2-forced (long latency):</text>
      <text x="12" y="112" class="lbl-sm">Multiple LDG share 1 SB → DEPBAR.LE for batch-style waits</text>
      <text x="12" y="126" class="lbl-sm">Max parallel: ~10-11 (counter arithmetic extends range)</text>
    </g>

    <!-- Combined system view -->
    <g transform="translate(16, 190)">
      <rect x="0" y="0" width="468" height="110" rx="8" fill="#ffffff" stroke="#334155" stroke-width="0.8"/>
      <text x="12" y="20" class="lbl" fill="#334155">Combined: LSU Queue + SB System</text>
      <text x="12" y="44" class="lbl-sm">• MSHR queue: 12-13 entries (hardware load tracking)</text>
      <text x="12" y="62" class="lbl-sm">• SB system: 5-6 or 10-11 (software dependence tracking)</text>
      <text x="12" y="80" class="lbl-sm">• Effective MLP/warp: min(MSHR, SB) = 5-11 parallel loads</text>
      <text x="12" y="98" class="safe">Together: extremely high memory-level parallelism per warp</text>
    </g>

    <!-- Practical implication -->
    <g transform="translate(16, 316)">
      <rect x="0" y="0" width="468" height="73" rx="8" fill="#DCFCE7" stroke="#16a34a" stroke-width="0.6"/>
      <text x="12" y="18" class="lbl" fill="#16a34a">Optimization Rule:</text>
      <text x="12" y="38" class="lbl-sm">• L1-resident data: keep outstanding loads ≤ 5 per warp</text>
      <text x="12" y="54" class="lbl-sm">• L2-streaming data: ptxas auto-extends to ~10 via counter mode</text>
      <text x="12" y="68" class="note">Exceeding these limits → catastrophic 2-45× stall</text>
    </g>
  </g>

  <text x="36" y="712" class="note">[source: S11/case_44 (L1 cliff), S12/case_24 (L2 cliff), S12/case_23 (6 SB pool), S13/case_12 (encoding)]</text>
</svg>
