<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" role="img"
     aria-label="KI-3.6: 1-issue-per-cycle dispatch tax — IPC=0.92 not 1.0 due to loop control overhead">
  <defs>
    <style><![CDATA[
      .ttl{font:600 14px "Fraunces",serif;fill:#0b1220}
      .sub{font:italic 11px "Fraunces",serif;fill:#5b6679}
      .lbl{font:600 11px "JetBrains Mono",monospace}
      .lbl-sm{font:500 10px "JetBrains Mono",monospace;fill:#5b6679}
      .badge{font:600 9.5px "JetBrains Mono",monospace}
      .note{font:500 9px "JetBrains Mono",monospace;fill:#8e97a5}
      .safe{font:600 10px "JetBrains Mono",monospace;fill:#16a34a}
      .warn{font:600 10px "JetBrains Mono",monospace;fill:#dc2626}
    ]]></style>
  </defs>
  <rect width="1080" height="300" fill="#ffffff"/>
  <text x="36" y="28" class="ttl">KI-3.6: The Dispatch Tax — IPC=0.92 (Not 1.0) Due to Loop Control Overhead</text>
  <text x="36" y="46" class="sub">BRA/ISETP consume the same single issue slot as FFMA. Unrolling eliminates the tax but adds I-cache pressure. [S22/case_2-4]</text>

  <!-- Left: timeline showing dispatch tax -->
  <g transform="translate(40, 66)">
    <rect x="0" y="0" width="560" height="210" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="0.8"/>
    <text x="12" y="20" class="lbl" fill="#334155">Issue Slot Timeline (single warp, ILP=16 FFMA loop)</text>

    <g transform="translate(16, 40)">
      <!-- 12-instruction loop body -->
      <rect x="0" y="0" width="60" height="22" rx="3" fill="#DCFCE7" stroke="#16a34a" stroke-width="0.5"/>
      <text x="30" y="15" class="badge" fill="#16a34a" text-anchor="middle">FFMA</text>
      <rect x="64" y="0" width="60" height="22" rx="3" fill="#DCFCE7" stroke="#16a34a" stroke-width="0.5"/>
      <text x="94" y="15" class="badge" fill="#16a34a" text-anchor="middle">FFMA</text>
      <rect x="128" y="0" width="60" height="22" rx="3" fill="#DCFCE7" stroke="#16a34a" stroke-width="0.5"/>
      <text x="158" y="15" class="badge" fill="#16a34a" text-anchor="middle">FFMA</text>
      <rect x="192" y="0" width="60" height="22" rx="3" fill="#DCFCE7" stroke="#16a34a" stroke-width="0.5"/>
      <text x="222" y="15" class="badge" fill="#16a34a" text-anchor="middle">FFMA</text>
      <rect x="256" y="0" width="60" height="22" rx="3" fill="#DCFCE7" stroke="#16a34a" stroke-width="0.5"/>
      <text x="286" y="15" class="badge" fill="#16a34a" text-anchor="middle">FFMA</text>
      <rect x="320" y="0" width="60" height="22" rx="3" fill="#DCFCE7" stroke="#16a34a" stroke-width="0.5"/>
      <text x="350" y="15" class="badge" fill="#16a34a" text-anchor="middle">FFMA</text>

      <!-- Control flow (the tax) -->
      <rect x="384" y="0" width="60" height="22" rx="3" fill="#FEE2E2" stroke="#dc2626" stroke-width="0.8"/>
      <text x="414" y="15" class="badge" fill="#dc2626" text-anchor="middle">ISETP</text>
      <rect x="448" y="0" width="60" height="22" rx="3" fill="#FEE2E2" stroke="#dc2626" stroke-width="0.8"/>
      <text x="478" y="15" class="badge" fill="#dc2626" text-anchor="middle">BRA</text>

      <text x="0" y="38" class="safe">← useful work (6 FFMA)</text>
      <text x="384" y="38" class="warn">← dispatch tax (2 control)</text>
    </g>

    <!-- IPC calculation -->
    <g transform="translate(16, 96)">
      <rect x="0" y="0" width="528" height="56" rx="6" fill="#FEF3C7" stroke="#b45309" stroke-width="0.5"/>
      <text x="12" y="18" class="lbl" fill="#92400e">IPC = useful / (useful + control) = 6/8 = 0.75</text>
      <text x="12" y="36" class="lbl-sm">Measured: IPC=0.92 (ILP=16, 14 FFMA + 2 control per iter)</text>
      <text x="12" y="50" class="note">The 8% "missing" IPC is entirely from BRA+ISETP consuming issue slots</text>
    </g>

    <!-- Unrolling trade-off -->
    <g transform="translate(16, 164)">
      <text x="0" y="0" class="lbl" fill="#334155">Fix: Loop unrolling eliminates BRA/ISETP →</text>
      <text x="0" y="18" class="safe">IPC approaches 1.0 (all slots = useful FFMA)</text>
      <text x="0" y="36" class="warn">BUT: I-cache cliff at 8-16 KB → 30% throughput loss if exceeded</text>
    </g>
  </g>

  <!-- Right: MMA window context -->
  <g transform="translate(620, 66)">
    <rect x="0" y="0" width="420" height="210" rx="10" fill="#EDE7FB" stroke="#6d28d9" stroke-width="0.8"/>
    <text x="12" y="20" class="lbl" fill="#6d28d9">Why Dispatch Tax Matters Less for GEMM</text>

    <text x="12" y="44" class="lbl-sm">MMA pipeline: 29 cyc latency, 15.88 cyc/mma throughput</text>
    <text x="12" y="62" class="lbl-sm">Pipeline depth = 29/15.88 = 1.83 MMA in flight</text>
    <text x="12" y="82" class="safe">Remaining 27 cycles = free dispatch window</text>
    <text x="12" y="100" class="lbl-sm">At IPC=1: 27 non-MMA insns fit per MMA cycle</text>

    <rect x="12" y="116" width="396" height="56" rx="6" fill="#ffffff" stroke="#6d28d9" stroke-width="0.5"/>
    <text x="24" y="134" class="lbl" fill="#6d28d9">256 FFMA epilogue cost:</text>
    <text x="24" y="152" class="lbl-sm">256 / 27 = 9.5 MMA windows consumed</text>
    <text x="24" y="166" class="safe">= only 2.2% overhead on 1842-cycle HMMA chain</text>

    <text x="12" y="194" class="note">Optimization: minimize total instruction count (reduce BRA/ISETP)</text>
    <text x="12" y="208" class="note">rather than focusing on per-pipe throughput.</text>
  </g>
</svg>
