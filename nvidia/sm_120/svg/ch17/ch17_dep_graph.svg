  <line x1="540" y1="588" x2="540" y2="612" stroke="#8e97a5" stroke-width="1" marker-end="url(#arr)" opacity="0.6"/>
  <line x1="865" y1="588" x2="650" y2="612" stroke="#8e97a5" stroke-width="1" marker-end="url(#arr)" opacity="0.6"/>

