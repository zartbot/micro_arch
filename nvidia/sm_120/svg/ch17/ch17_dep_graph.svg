  <line x1="540" y1="662" x2="540" y2="684" stroke="#8e97a5" stroke-width="1" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="640" y1="662" x2="865" y2="684" stroke="#8e97a5" stroke-width="1" marker-end="url(#arr)" opacity="0.7"/>

