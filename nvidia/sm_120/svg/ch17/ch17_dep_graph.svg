  <rect width="1080" height="760" fill="#ffffff"/>
  <text x="36" y="32" class="ttl">§17.3 Report Chapter Dependency Graph</text>
  <text x="36" y="52" class="sub">Methodology underpins everything · architecture explains memory / SM / TC primitives · all converge on system-level system / optimization layers</text>

  <!-- L0: Methodology root -->
  <text x="36" y="86" class="layer">Layer 0 · Methodology</text>
  <g transform="translate(440,98)">
