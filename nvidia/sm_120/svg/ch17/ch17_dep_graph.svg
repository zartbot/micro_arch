<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 760" role="img"
     aria-label="Report chapter dependency graph: methodology → architecture → memory/SM/TC → instruction → on-chip → scheduler/workload/power → system → optimization/ptxas/model">
  <defs>
